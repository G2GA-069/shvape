  update(dt){
    if (Input.pressed.down) this.selected = (this.selected+1)%this.options.length;
    if (Input.pressed.jump || Input.pressed.respect){
      this.options[this.selected].action();
    }
    // Touch tap on option
    if (IS_TOUCH){
      for (const id in activePointers){
        const p = activePointers[id];
        const oy = 360, gap = 50;
        for (let i=0;i<this.options.length;i++){
          if (p.y > oy+i*gap-25 && p.y < oy+i*gap+25 && Math.abs(p.x-CFG.W/2) < 200){
            if (!p.consumed){ this.selected = i; this.options[i].action(); p.consumed=true; }
          }
        }
      }
    }
  },
  draw(){
    Bg.draw();
    // Bin Run on title
    drawBinRun(CFG.W/2 - 32, CFG.GROUND_Y - CFG.PLAYER_H, Game.realT);
    // ALDA cloud idle
    if (Math.random() < 0.05){
      vapeCloud(CFG.W/2+10, CFG.GROUND_Y-CFG.PLAYER_H+20, 'ALDA');
    }
    // dim
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,CFG.W,CFG.H);
    // title
    ctx.font='bold 120px Bangers, sans-serif'; ctx.textAlign='center';
    ctx.strokeStyle='#000'; ctx.lineWidth=8;
    ctx.fillStyle='#ffd633';
    ctx.strokeText('SHVAPE', CFG.W/2, 160); ctx.fillText('SHVAPE', CFG.W/2, 160);
    ctx.font='18px "Press Start 2P"';
    ctx.fillStyle='#fff';
    ctx.strokeStyle='#000'; ctx.lineWidth=3;
    ctx.strokeText('Ein Mutschelbach-Abenteuer', CFG.W/2, 200);
    ctx.fillText('Ein Mutschelbach-Abenteuer', CFG.W/2, 200);
    // options
    if (!this.showLb){
      const oy = 360, gap = 50;
      for (let i=0;i<this.options.length;i++){
        ctx.fillStyle = i===this.selected ? '#ffd633' : '#fff';
        ctx.font='20px "Press Start 2P"';
        const t = this.options[i].label;
        ctx.strokeText(t, CFG.W/2, oy+i*gap);
        ctx.fillText(t, CFG.W/2, oy+i*gap);
      }
      ctx.fillStyle='#aaa'; ctx.font='10px "Press Start 2P"';
      ctx.fillText('↓ wechseln  •  SPACE/JUMP starten', CFG.W/2, oy + this.options.length*gap + 30);
    } else {
      ctx.fillStyle='#fff'; ctx.font='18px "Press Start 2P"';
      ctx.fillText('HIGHSCORES', CFG.W/2, 280);
      const lb = getLeaderboard(false);
      ctx.font='12px "Press Start 2P"';
      for (let i=0;i<Math.min(10,lb.length);i++){
        const e = lb[i];
        ctx.textAlign='left'; ctx.fillText(`${i+1}. ${e.name}`, CFG.W*0.3, 320+i*22);
        ctx.textAlign='right'; ctx.fillText(`${e.score}`, CFG.W*0.7, 320+i*22);
      }
      ctx.textAlign='center'; ctx.fillStyle='#aaa'; ctx.font='10px "Press Start 2P"';
      ctx.fillText('JUMP zum Zurück', CFG.W/2, 600);
    }
  }
};

// ===== GOOD ENDING =====
const Ending = {
  t: 0,
  init(){
    this.t = 0;
    Game.endingShown = true;
    Game.good = true;
    try { localStorage.setItem('shvape_freed', '1'); } catch(e){}
  },
  update(dt){
    this.t += dt;
    if (this.t > 14 && (Input.pressed.jump || Input.pressed.respect || Input.touchJump)) restartGame();
  },
  draw(){
    // dawn gradient
    const g = ctx.createLinearGradient(0,0,0,CFG.H);
    g.addColorStop(0, '#ff9966');
    g.addColorStop(0.5, '#ffcc99');
    g.addColorStop(1, '#7bbf6a');
    ctx.fillStyle = g; ctx.fillRect(0,0,CFG.W,CFG.H);
    // sun rising
    const sy = lerp(CFG.H+50, 200, clamp(this.t/6, 0, 1));
    ctx.fillStyle='rgba(255,235,150,0.95)';
    ctx.beginPath(); ctx.arc(CFG.W/2, sy, 80, 0, Math.PI*2); ctx.fill();
    // hilltop silhouette
    ctx.fillStyle='#3a5d20';
    ctx.beginPath();
    ctx.moveTo(0, CFG.GROUND_Y);
    ctx.bezierCurveTo(CFG.W*0.3, CFG.GROUND_Y-60, CFG.W*0.7, CFG.GROUND_Y-100, CFG.W, CFG.GROUND_Y-50);
    ctx.lineTo(CFG.W, CFG.H); ctx.lineTo(0, CFG.H); ctx.closePath(); ctx.fill();
    // Bin Run silhouette on hilltop
    drawBinRun(CFG.W/2-32, CFG.GROUND_Y-CFG.PLAYER_H-40, this.t);
    // throw vape arc at t=4
    if (this.t > 4 && this.t < 7){
      const tt = (this.t-4)/3;
      const vx = CFG.W/2 + 30 + tt*200;
      const vy = CFG.GROUND_Y-100 - Math.sin(tt*Math.PI)*120 + tt*tt*150;
      ctx.fillStyle='#222'; ctx.fillRect(vx, vy, 16, 8);
      ctx.fillStyle='#ff66aa'; ctx.fillRect(vx, vy-2, 16, 2);
    }
    // text
    if (this.t > 6){
      ctx.fillStyle='#fff'; ctx.font='32px Bangers, sans-serif'; ctx.textAlign='center';
      ctx.strokeStyle='#000'; ctx.lineWidth=4;
      ctx.strokeText('Du hast es geschafft, Bin Run.', CFG.W/2, 200);
      ctx.fillText('Du hast es geschafft, Bin Run.', CFG.W/2, 200);
    }
    if (this.t > 9){
      ctx.fillStyle='#fff'; ctx.font='28px Bangers, sans-serif';
      ctx.strokeText('Jetzt atme.', CFG.W/2, 250);
      ctx.fillText('Jetzt atme.', CFG.W/2, 250);
    }
    if (this.t > 12){
      ctx.fillStyle='#ffd633'; ctx.font='14px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText('Achievement: FREI', CFG.W/2, 320);
      ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"';
      ctx.fillText('Nochmal? [LEERTASTE]', CFG.W/2, 380);
    }
  }
};

// ===== RESET / RESTART =====
function resetForNewRun(){
  Game.t = 0; Game.realT = 0;
  Game.scrollX = 0;
  Game.speed = CFG.BASE_SPEED;
  Game.baseScore = 0;
  Game.combo = 1; Game.comboTimer = 0;
  Game.shake = 0; Game.hitstop = 0; Game.flash = 0;
  Game.bossIdx = 0; Game.bossDoneCount = 0; Game.inBoss = false;
  Game.inEncounter = false; Game.encounterCooldown = 30;
  Game.showTitleSmash = 0; Game.titleSmashShown = false;
  Game.doubleJumpUnlocked = false;
  Game.jumpsThisRun = 0; Game.legendeWatch = 0;
  Game.deathCause = '';
  Game.flyerOnGround = false;
  Game.konfBibel = false;
  Game.ersatzVape = false;
  Game.catchphrase = ['Alda, ey!','Krass!','Voll geil!','Digga!'];
  Game.good = false; Game.endingShown = false;
  Game.shvCam = 0;
  Game.lastPuffT = -10; Game.chainPuffs = 0;
  Game.paused = false;
  Player.reset();
  Krass.v = 30; Krass.pulseT = 0;
  Vape.v = 40; Vape.warned = false; Vape.podVoiceT = 0; Vape.flavor='erdbeer'; Vape.invertTimer=0;
  Boss.active = null; Encounter.active = null;
  Entities.length = 0; Particles.length = 0;
  Bg.far.length = 0; Bg.mid.length = 0; Bg.near.length = 0;
  Bg.init();
  Director.nextSpawn = 1.2; Director.firstSpawnDone = false;
  HUD.notes.length = 0;
}

function restartGame(){
  Menu.show = false;
  // Only show menu if user pressed Escape after death; otherwise quick restart
  resetForNewRun();
  Game.state = 'PLAY';
}

// Press Escape on death to go to menu
window.addEventListener('keydown', e=>{
  if (e.code==='KeyT' && Game.state==='DEATH'){
    // share — copy canvas image to clipboard
    try{
      canvas.toBlob(b=>{
        if (b && navigator.clipboard && navigator.clipboard.write){
          navigator.clipboard.write([new ClipboardItem({'image/png': b})]).then(()=>{
            HUD.note('Bild in Zwischenablage kopiert!', '#ffd633');
          }).catch(()=>{
            HUD.note('Teilen nicht verfügbar', '#aaa');
          });
        }
      });
    } catch(err){ HUD.note('Teilen nicht verfügbar', '#aaa'); }
  }
});

// ===== ENCOUNTER DIRECTOR =====
const EncDirector = {
  update(dt){
    if (Game.inBoss || Game.inEncounter || Game.state!=='PLAY') return;
    Game.encounterCooldown -= dt;
    if (Game.encounterCooldown <= 0){
      const k = choice(ENCOUNTER_KEYS);
      Encounter.start(k);
    }
  }
};

// ===== MAIN GAME LOOP =====
let lastT = performance.now();
function frame(now){
  let dt = (now - lastT) / 1000;
  if (dt > 0.05) dt = 0.05; // clamp
  lastT = now;
  // hitstop
  if (Game.hitstop > 0){ Game.hitstop -= dt; dt = 0; }
  Game.realT += dt;
  // skip game updates while paused (but keep rendering)
  let updateDt = (Game.paused || Game.state==='DEATH' || Game.state==='ENDING' || Game.state==='MENU') ? 0 : dt;
  // Pressed keys reset (consume one frame)
  // Update touch input
  updateTouchInput();

  // Title smash
  if (!Game.titleSmashShown && Game.realT > 2){
    Game.showTitleSmash = 1.0;
    Game.titleSmashShown = true;
  }
  if (Game.showTitleSmash > 0) Game.showTitleSmash -= dt;
  // Shvape cam timer
  if (Game.shvCam > 0) Game.shvCam -= dt;

  // Run state-specific update
  if (Game.state === 'MENU'){
    Menu.update(dt);
  } else if (Game.state === 'DEATH'){
    Death.update(dt);
  } else if (Game.state === 'ENDING'){
    Ending.update(dt);
  } else if (Game.state === 'PLAY'){
    Game.t += updateDt;
    // scroll
    Game.scrollX += Game.speed * updateDt;
    Player.update(updateDt);
    Vape.update(updateDt);
    // boring detect: no recent puff & no airtime activity
    const isBoring = (Game.realT - Game.lastPuffT > 5) && Player.onGround;
    Krass.update(updateDt, isBoring);
    Bg.update(updateDt);
    Director.update(updateDt);
    EncDirector.update(updateDt);
    updateEntities(updateDt);
    for (const e of Entities) specialEntityHook(e);
    // boss timing
    if (Game.bossIdx < BOSS_TIMES.length && Game.realT >= BOSS_TIMES[Game.bossIdx] && !Game.inBoss && !Game.inEncounter){
      Boss.start(Game.bossIdx);
    }
    // good ending check
    if (Game.realT >= 600 && !Game.endingShown){
      Game.state = 'ENDING';
      Ending.init();
    }
  } else if (Game.state === 'BOSS'){
    Game.t += updateDt;
    Game.scrollX += Game.speed * updateDt;
    Bg.update(updateDt);
    Boss.update(updateDt);
    updateEntities(updateDt);
    for (const e of Entities) specialEntityHook(e);
  } else if (Game.state === 'ENCOUNTER'){
    Game.t += updateDt;
    Game.scrollX += Game.speed * 0.5 * updateDt; // slowed during encounters
    Bg.update(updateDt);
    Encounter.update(updateDt);
    updateEntities(updateDt);
    for (const e of Entities) specialEntityHook(e);
  }

  // particles update always
  updateParticles(dt);
  HUD.update(dt);

  // ===== RENDER =====
  ctx.save();
  // shake
  if (Game.shake > 0 && !CFG.REDUCED_MOTION){
    ctx.translate(rand(-Game.shake, Game.shake), rand(-Game.shake, Game.shake));
    Game.shake *= 0.85;
    if (Game.shake < 0.3) Game.shake = 0;
  }

  if (Game.state === 'MENU'){
    Menu.draw();
  } else if (Game.state === 'ENDING'){
    Ending.draw();
  } else {
    Bg.draw();
    drawEntities();
    drawSpecialEntities();
    drawParticles(0);
    drawBinRun(Player.x, Player.y, Game.realT);
    if (Game.state === 'BOSS') Boss.draw();
    if (Game.state === 'ENCOUNTER') Encounter.draw();
    HUD.draw();
    if (Game.state === 'DEATH') Death.draw();
  }

  // flash
  if (Game.flash > 0){
    ctx.fillStyle = Game.flashColor;
    ctx.globalAlpha = Game.flash * 3.5;
    ctx.fillRect(0,0,CFG.W,CFG.H);
    ctx.globalAlpha = 1;
    Game.flash -= 1/60;
  }

  // touch overlay (translucent zone hints)
  if (IS_TOUCH && Game.state==='PLAY'){
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = '#fff';
    ctx.fillRect(CFG.W/2, 0, CFG.W/2, CFG.H);
    ctx.globalAlpha = 0.04;
    ctx.fillStyle = '#7af';
    ctx.fillRect(0, 0, CFG.W/2, CFG.H);
    ctx.globalAlpha = 1;
    if (Game.realT < 6){
      ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='14px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText('LINKS = bewegen', CFG.W*0.25, CFG.H-40);
      ctx.fillText('RECHTS = JUMP', CFG.W*0.75, CFG.H-40);
    }
  }

  ctx.restore();

  // Clear pressed (one-frame pulses)
  for (const k in Input.pressed) Input.pressed[k] = false;
  // Re-scheduling is owned by kickFrame() at init; do not call rAF here.
}

// ===== INIT =====
loadBest();
Bg.init();
Menu.init();
// Cold open: skip menu, go straight to PLAY
Game.state = 'PLAY';
setSeed(seedFromString('cold-open-' + Date.now()));
// Show menu only when explicitly requested via Escape after a death
window.addEventListener('keydown', e=>{
  if (e.code === 'Escape' && Game.state === 'DEATH'){
    Menu.show = true; Game.state = 'MENU';
  }
});

// rAF driver with watchdog — re-kicks on visibility change and via setInterval
// in case the browser pauses rAF (hidden tab / iframe). Frame is idempotent
// and uses lastT for delta calc so it's safe to drive from either source.
let _rafScheduled = false;
function kickFrame(){
  if (_rafScheduled) return;
  _rafScheduled = true;
  requestAnimationFrame(now=>{ _rafScheduled = false; frame(now); kickFrame(); });
}
kickFrame();
// Watchdog: if rAF hasn't fired for >250ms (hidden tab), force a step so
// the game continues to advance and re-renders the moment the tab comes back.
let _lastFrameAt = performance.now();
const _origFrame = frame;
frame = function(now){ _lastFrameAt = performance.now(); _origFrame(now); };
setInterval(()=>{
  if (performance.now() - _lastFrameAt > 250){
    // tab was throttled. Step once with a clamped dt and re-kick rAF.
    frame(performance.now());
    kickFrame();
  }
}, 500);
document.addEventListener('visibilitychange', ()=>{ if (!document.hidden) kickFrame(); });

// Mobile tap on death-screen restart button
canvas.addEventListener('pointerdown', e=>{
  if (Game.state === 'DEATH' && IS_TOUCH){
    const p = pointerToCanvas(e);
    if (p.y > 660 && p.y < 710 && Math.abs(p.x - CFG.W/2) < 120) restartGame();
  }
  if (Game.state === 'ENDING' && IS_TOUCH){
    if (Ending.t > 12) restartGame();
  }
});
