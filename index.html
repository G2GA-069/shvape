// Pfifferling pickup handling for Schwarzwald boss + kirschtorte hurtboxes
// override Entity collision behavior via type
function specialEntityHook(e){
  if (e.type==='kirschtorte'){
    const hb = Player.hb();
    if (aabb(hb, {x:e.x-Game.scrollX, y:e.y, w:e.w, h:e.h}) && e.alive){
      Player.hit(20, 'KIRSCHTORTE!');
      e.alive = false;
    }
  }
}
function drawSpecialEntities(){
  // PFIFFERLING-SINN — pickups about to enter the screen (within ~600px to
  // the right of the visible edge) are previewed as a small glowing chevron
  // pinned at the screen edge. Telegraphs incoming Pods/Energy/Pfand.
  if (Game.abilities.pfifferling && !(Game.cursesSuspendedT>0)){
    const aheadX = Game.scrollX + CFG.W;
    const lookahead = aheadX + 600;
    let stack = 0;
    for (const e of Entities){
      if (!e.pickup || !e.alive) continue;
      if (e.x < aheadX || e.x > lookahead) continue;
      const colorMap = {'vape-pod':'#ff66aa', 'energy':'#3072ff', 'pfand':'#7fff7f'};
      const c = colorMap[e.type] || '#ffd633';
      const pulse = 0.5 + 0.5*Math.sin(Game.realT*8 + stack*0.7);
      const x = CFG.W - 20, y = 220 + stack*36;
      ctx.save();
      ctx.globalAlpha = 0.4 + pulse*0.5;
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x-22, y-12); ctx.lineTo(x-22, y+12); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.stroke();
      ctx.restore();
      stack++; if (stack > 6) break;
    }
  }
  for (const e of Entities){
    const x = e.x - Game.scrollX;
    if (x<-100 || x>CFG.W+50) continue;
    if (e.type==='pfifferling'){
      const bob = Math.sin(e.animT*4)*3;
      ctx.save(); ctx.translate(x, e.y+bob);
      ctx.fillStyle='#f3a838';
      ctx.beginPath(); ctx.arc(15, 14, 14, Math.PI, 2*Math.PI); ctx.fill();
      ctx.fillStyle='#e08828'; ctx.fillRect(12, 14, 6, 14);
      ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.stroke();
      ctx.restore();
    } else if (e.type==='kirschtorte'){
      ctx.save(); ctx.translate(x, e.y);
      ctx.fillStyle='#3a1a10'; ctx.fillRect(0, 6, 36, 24);
      ctx.fillStyle='#fff'; ctx.fillRect(0, 0, 36, 8);
      ctx.fillStyle='#cc1818'; ctx.beginPath(); ctx.arc(18, 4, 4, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle='#000'; ctx.strokeRect(0,0,36,30);
      ctx.restore();
    }
  }
}

// ===== HUD =====
const HUD = {
  notes: [],
  popup: null,           // current Sigma/DM popup
  popupT: 0,             // remaining display time
  nextPopupT: 25,        // seconds until next firing
  note(text, color){
    // Suppress an exact duplicate if it's still on screen — keeps the HUD
    // readable when something fires repeatedly (e.g. multiple chain-vapes
    // arriving inside the same 2.5-sec window).
    const top = this.notes[this.notes.length-1];
    if (top && top.text === text){
      top.t = 0; // reset its life so it stays the same single line
      return;
    }
    this.notes.push({text, color: color||'#fff', t:0, life:2.0});
    // Hard cap on visible queue — keeps it from turning into a wall of text.
    if (this.notes.length > 5) this.notes.splice(0, this.notes.length - 5);
  },
  recentPopups: [],   // anti-repeat buffer
  firePopup(){
    // Pick a Sigma rule or DM that ISN'T in the last ~12 we've shown.
    // Prevents the same line firing twice in close succession even though
    // each pool is now 70+ entries.
    const pickFresh = (pool, getKey)=>{
      let pick = pool[Math.floor(Math.random()*pool.length)];
      let tries = 0;
      while (this.recentPopups.indexOf(getKey(pick))>=0 && tries<8){
        pick = pool[Math.floor(Math.random()*pool.length)];
        tries++;
      }
      this.recentPopups.push(getKey(pick));
      if (this.recentPopups.length > 12) this.recentPopups.shift();
      return pick;
    };
    if (Math.random() < 0.5){
      const t = pickFresh(SIGMA_RULES, s=>'S:'+s);
      this.popup = {kind:'sigma', text: t};
    } else {
      const [user, msg] = pickFresh(INSTA_DMS, dm=>'D:'+dm[0]+':'+dm[1]);
      this.popup = {kind:'dm', user, msg};
    }
    this.popupT = 4.5;
  },
  update(dt){
    for (let i=this.notes.length-1;i>=0;i--){
      this.notes[i].t += dt;
      if (this.notes[i].t > this.notes[i].life) this.notes.splice(i,1);
    }
    // Pop-up scheduling — fire frequently in PLAY, less during boss/encounter
    // so the player is never safe from surprise. Skip MENU and DEATH.
    const stateOk = (Game.state==='PLAY' || Game.state==='BOSS' || Game.state==='ENCOUNTER');
    if (stateOk){
      this.nextPopupT -= dt;
      if (this.nextPopupT <= 0){
        this.firePopup();
        // Frequent during normal play, rarer during bosses (don't drown out the fight)
        if (Game.inBoss || Game.inEncounter) this.nextPopupT = rand(28, 55);
        else this.nextPopupT = rand(18, 42);
      }
    }
    if (this.popupT > 0) this.popupT -= dt;
    else this.popup = null;
    // HEILIGER HAUCH — every Sigma popup grants +5 Aura while active.
    // This caches the popup id so we credit only once per popup.
    if (Vape.flavor === 'heiliger_hauch' && Vape.flavorTimer > 0 && this.popup && this.popup.kind === 'sigma'){
      const key = 'S:' + this.popup.text;
      if (this._lastSigmaCredited !== key){
        this._lastSigmaCredited = key;
        Krass.add(5, 'HEILIGER HAUCH-SEGEN');
      }
    } else if (!this.popup) {
      this._lastSigmaCredited = null;
    }
  },
  drawPopup(){
    if (!this.popup) return;
    const slide = this.popupT > 3.5 ? (4.5 - this.popupT) / 1 : (this.popupT < 0.6 ? this.popupT / 0.6 : 1);
    const targetX = CFG.W - 360, restX = CFG.W + 20;
    const x = lerp(restX, targetX, clamp(slide, 0, 1));
    const y = 110;
    ctx.save();
    if (this.popup.kind === 'sigma'){
      ctx.fillStyle = '#000'; ctx.fillRect(x-4, y-4, 348, 76);
      ctx.fillStyle = '#ffd633'; ctx.fillRect(x, y, 340, 68);
      ctx.fillStyle='#000'; ctx.font='bold 12px "Press Start 2P"'; ctx.textAlign='left';
      ctx.fillText('SIGMA RULE', x+12, y+22);
      ctx.font='9px "Press Start 2P"';
      // Wrap text
      const words = this.popup.text.split(' ');
      let line='', ly = y+42;
      for (const w of words){
        const test = line + w + ' ';
        if (ctx.measureText(test).width > 320){ ctx.fillText(line, x+12, ly); line = w+' '; ly += 13; }
        else line = test;
      }
      if (line) ctx.fillText(line, x+12, ly);
    } else {
      // Insta DM
      ctx.fillStyle = '#000'; ctx.fillRect(x-4, y-4, 348, 76);
      ctx.fillStyle = '#fff'; ctx.fillRect(x, y, 340, 68);
      // gradient pill (insta-purple/pink)
      const g = ctx.createLinearGradient(x, y, x+340, y);
      g.addColorStop(0, '#fdb74e'); g.addColorStop(0.5, '#e93077'); g.addColorStop(1, '#7a3eaa');
      ctx.fillStyle = g; ctx.fillRect(x, y, 6, 68);
      // avatar circle
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x+34, y+34, 18, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x+34, y+34, 14, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#000'; ctx.font='bold 16px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(this.popup.user[0].toUpperCase(), x+34, y+34);
      // text
      ctx.textBaseline='alphabetic'; ctx.textAlign='left';
      ctx.fillStyle='#000'; ctx.font='bold 11px "Press Start 2P"';
      ctx.fillText('@'+this.popup.user, x+62, y+24);
      ctx.font='10px "Press Start 2P"'; ctx.fillStyle='#444';
      ctx.fillText('jetzt', x+62, y+38);
      ctx.font='10px "Press Start 2P"'; ctx.fillStyle='#000';
      // Wrap msg
      const words = this.popup.msg.split(' ');
      let line='', ly = y+58;
      for (const w of words){
        const test = line + w + ' ';
        if (ctx.measureText(test).width > 260){ ctx.fillText(line, x+62, ly); line = w+' '; ly += 13; }
        else line = test;
      }
      if (line) ctx.fillText(line, x+62, ly);
    }
    ctx.restore();
  },
  draw(){
    // top-left: vape battery + LED heart
    const vw = 220, vh = 36;
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.fillRect(20, 20, vw, vh);
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(20, 20, vw, vh);
    // battery cap
    ctx.fillStyle='#fff'; ctx.fillRect(20+vw, 28, 4, 20);
    // fill
    const vp = clamp(Vape.v/100, 0, 1);
    const vc = Vape.v < 25 ? '#ff3030' : Vape.v < 50 ? '#ffaa30' : '#7fff7f';
    ctx.fillStyle = vc; ctx.fillRect(24, 24, (vw-8)*vp, vh-8);
    // text
    ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"'; ctx.textAlign='left';
    ctx.fillText(`VAPE ${Math.floor(Vape.v)}%`, 30, 42);
    // heart
    const pulse = 1 + Math.sin(Vape.heartT * (Vape.v<25?12:6))*0.3;
    ctx.save();
    ctx.translate(vw + 50, 38);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = Vape.v<25 ? '#ff3030' : '#ff66aa';
    drawHeart(0,-6,4);
    ctx.restore();
    // POD EINSETZEN voice indicator
    if (Vape.podVoiceT > 0){
      ctx.fillStyle='#ff3030'; ctx.font='10px "Press Start 2P"';
      ctx.fillText('POD EINSETZEN', 20, 78);
    }

    // top-right: time, score, combo
    const totalScore = Math.floor((Game.baseScore + Game.realT*10) * Krass.mul());
    ctx.textAlign='right'; ctx.fillStyle='#fff'; ctx.font='12px "Press Start 2P"';
    ctx.strokeStyle='#000'; ctx.lineWidth=3;
    const time = `${Math.floor(Game.realT/60)}:${String(Math.floor(Game.realT%60)).padStart(2,'0')}`;
    ctx.strokeText(time, CFG.W-80, 42); ctx.fillText(time, CFG.W-80, 42);
    const sc = `${totalScore}`;
    ctx.font='14px "Press Start 2P"';
    ctx.strokeText(sc, CFG.W-80, 64); ctx.fillText(sc, CFG.W-80, 64);
    if (Game.combo > 1){
      ctx.fillStyle='#ffd633'; ctx.font='10px "Press Start 2P"';
      const cs = `ALDA-COMBO ×${Game.combo}`;
      ctx.strokeText(cs, CFG.W-80, 88); ctx.fillText(cs, CFG.W-80, 88);
    }

    // right side: Aura meter + tier label
    const kx = CFG.W - 60, ky = 120, kw = 36, kh = 360;
    const tier = Krass.tier();
    const tierData = KRASS_TIERS[tier];
    const pulseK = 1 + Krass.pulseT*1.5;
    ctx.save();
    ctx.translate(kx + kw/2, ky + kh/2);
    if (tier >= 3 && !CFG.REDUCED_MOTION) ctx.translate(rand(-2,2), rand(-2,2));
    ctx.scale(pulseK, pulseK);
    ctx.translate(-kw/2, -kh/2);
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, kw, kh);
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(0, 0, kw, kh);
    // fill
    const kp = Krass.v / 100;
    const fillH = kh*kp;
    ctx.fillStyle = tierData.color;
    ctx.fillRect(0, kh-fillH, kw, fillH);
    // flame icon
    ctx.fillStyle='#ff3030';
    ctx.beginPath();
    ctx.moveTo(kw/2, -8); ctx.lineTo(kw/2-8, 6); ctx.lineTo(kw/2, 0); ctx.lineTo(kw/2+8, 6); ctx.closePath(); ctx.fill();
    ctx.restore();
    // tier label
    ctx.textAlign='center';
    ctx.font='12px "Press Start 2P"';
    ctx.fillStyle = tierData.color;
    ctx.strokeStyle='#000'; ctx.lineWidth=3;
    let label = tierData.label;
    if (tier===4){
      ctx.fillStyle = `hsl(${(Game.realT*200)%360}, 100%, 60%)`;
    }
    ctx.strokeText(label, kx + kw/2, ky+kh+24);
    ctx.fillText(label, kx + kw/2, ky+kh+24);
    // multiplier
    ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"';
    ctx.strokeText(`×${tierData.mul}`, kx+kw/2, ky+kh+42);
    ctx.fillText(`×${tierData.mul}`, kx+kw/2, ky+kh+42);
    // face
    ctx.font='10px "Press Start 2P"';
    ctx.strokeText(tierData.face, kx+kw/2, ky-10);
    ctx.fillText(tierData.face, kx+kw/2, ky-10);

    // notes
    ctx.textAlign='center';
    let ny = CFG.H - 40;
    for (let i=this.notes.length-1; i>=0; i--){
      const n = this.notes[i];
      const a = clamp(1 - n.t/n.life, 0, 1);
      ctx.globalAlpha = a;
      ctx.font='12px "Press Start 2P"';
      ctx.fillStyle = n.color;
      ctx.strokeStyle='#000'; ctx.lineWidth=3;
      ctx.strokeText(n.text, CFG.W/2, ny);

      ctx.strokeStyle='#fff'; ctx.lineWidth=4;
      ctx.strokeText('SHVAPE', 0, -60); ctx.fillText('SHVAPE', 0, -60);
      ctx.restore();
    }

    // Zone-change banner — slides in from left, sits 3 sec, fades out
    if (_zoneBannerT > 0){
      const t = _zoneBannerT;

// ===== DRIP UNLOCK POPUP =====
// Pop one cosmetic from the pending queue at a time, hold ~4 sec.
const DripUnlock = {
  current: null, t: 0,
  draw(){
    if (!this.current && Save && Save.data.cosmeticPending.length > 0){
      this.current = Save.data.cosmeticPending.shift();
      Save.save();
      this.t = 4.0;
    }
    if (!this.current) return;
    this.t -= 1/60;
    if (this.t <= 0){ this.current = null; return; }
    const a = clamp(this.t/4, 0, 1);
    const slide = a > 0.85 ? (1-a)/0.15 : (a < 0.2 ? a/0.2 : 1);
    const w = 460, h = 90, cx = CFG.W/2, cy = 160;
    ctx.save();
    ctx.globalAlpha = slide;
    ctx.fillStyle = '#000'; ctx.fillRect(cx-w/2-4, cy-h/2-4, w+8, h+8);
    ctx.fillStyle = '#ffd633'; ctx.fillRect(cx-w/2, cy-h/2, w, h);
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    for (let xx=-w/2;xx<w/2;xx+=14) ctx.beginPath(), ctx.arc(cx+xx, cy, 3, 0, Math.PI*2), ctx.fill();
    ctx.fillStyle='#000'; ctx.font='bold 16px "Press Start 2P"'; ctx.textAlign='center';
    ctx.fillText('DRIP UNLOCKED', cx, cy-12);
    const labels = {chain:'GOLD CHAIN', logo:'HOODIE LOGO', adiletten:'GOLD ADILETTEN', vape:'GOLD VAPE'};
    ctx.font='bold 22px Bangers, sans-serif';
    ctx.fillText(labels[this.current] || this.current, cx, cy+22);
    ctx.restore();
  }
};

        const m = Save.data.npcMemory[id];
        const stars = m.hostility > 0.6 ? '1 Stern' : (m.hostility > 0.3 ? '2 Sterne' : '4 Sterne');
        const verdict = m.hostility > 0.6 ? '"Der Schwape-Bub."' : (m.hostility > 0.3 ? '"Naja."' : '"Kreativ."');
        reviews.push(`${id.replace(/_/g,' ')} (${stars}): ${verdict}`);
      }
    } else {
      reviews.push('Keine Kunden. Bin Run Inc. ist verschollen.');
    }
    for (const r of reviews){ ctx.fillText(r, px+12, y); y += 16; }
    y += 8;
    // Conclusion
    ctx.font='9px "Press Start 2P"'; ctx.fillStyle='#000';
    const concl = ebitda >= 0
      ? 'Bin Run Inc. ist profitabel und kulturell relevant.'
      : 'Bin Run Inc. ist unprofitabel, aber kulturell relevant.';
    // wrap
    const words = concl.split(' '); let line = '';
    for (const w of words){
      if (ctx.measureText(line+w+' ').width > pw-24){ ctx.fillText(line, px+12, y); y += 14; line = w+' '; }
      else line += w+' ';
    }
    if (line) ctx.fillText(line, px+12, y);
    y += 28;
    // Stamp
    ctx.save();
    ctx.translate(px+pw-100, py+ph-50);
    ctx.rotate(-0.18);
    ctx.strokeStyle='#cc1818'; ctx.lineWidth=2;
    ctx.strokeRect(-60, -16, 130, 32);
    ctx.fillStyle='#cc1818'; ctx.font='bold 8px "Press Start 2P"'; ctx.textAlign='center';
    ctx.fillText('GEZEICHNET', 5, -3);
    ctx.fillText('Bin Run, CEO', 5, 9);
    ctx.restore();
  }
};

function saveScore(score){
  try{
    const key = Game.daily ? `shvape_daily_${Game.seedStr}` : 'shvape_best';
    const list = JSON.parse(localStorage.getItem(key) || '[]');
    list.push({score, name: choice(NICKNAMES), date: new Date().toISOString().slice(0,10)});
    list.sort((a,b)=>b.score-a.score);
    list.length = Math.min(10, list.length);
    localStorage.setItem(key, JSON.stringify(list));
    if (Game.daily) Game.bestScoreDaily = list[0].score;
    else Game.bestScore = list[0].score;
  }catch(e){}
}
function loadBest(){
  try{
    const list = JSON.parse(localStorage.getItem('shvape_best') || '[]');
    Game.bestScore = list[0]?.score || 0;
    const key = `shvape_daily_${todaySeed()}`;
    const dl = JSON.parse(localStorage.getItem(key) || '[]');
    Game.bestScoreDaily = dl[0]?.score || 0;
  }catch(e){}
}
function todaySeed(){
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
function getLeaderboard(daily){
  const key = daily ? `shvape_daily_${todaySeed()}` : 'shvape_best';
  return JSON.parse(localStorage.getItem(key) || '[]');
}

function drawTutorialIcon(kind, x, y, t){
  ctx.save();
  ctx.translate(x, y);
  if (kind==='jump'){
    // up arrow + hop dust
    ctx.fillStyle='#000';
    ctx.beginPath();
    ctx.moveTo(0,-22); ctx.lineTo(18,-2); ctx.lineTo(8,-2); ctx.lineTo(8,16); ctx.lineTo(-8,16); ctx.lineTo(-8,-2); ctx.lineTo(-18,-2); ctx.closePath();
    ctx.fill();
    ctx.fillStyle='#888';
    for (let i=0;i<3;i++) ctx.beginPath(), ctx.arc(-22+i*22, 22, 3, 0, Math.PI*2), ctx.fill();
  } else if (kind==='vape'){
    // vape pen with pulsing pink heart
    ctx.fillStyle='#181818'; ctx.fillRect(-22, -6, 36, 12);
    ctx.fillStyle='#3a3a3a'; ctx.fillRect(14, -4, 8, 8);
    ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.strokeRect(-22, -6, 36, 12);
    const pulse = 0.5+0.5*Math.sin(t*8);
    ctx.fillStyle = `rgba(255,${102+pulse*60},${170-pulse*40},${0.7+pulse*0.3})`;
    drawHeart(0, -3, 4);
  } else if (kind==='flame'){
    ctx.fillStyle='#ff3030';
    ctx.beginPath();
    ctx.moveTo(0,-22); ctx.bezierCurveTo(14,-12,16,4,4,18); ctx.bezierCurveTo(-2,4,-12,-2,-8,-12); ctx.bezierCurveTo(-4,-6,0,-12,0,-22);
    ctx.fill();
    ctx.fillStyle='#ffd633';
    ctx.beginPath(); ctx.arc(0,4,5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.stroke();
  } else if (kind==='speech'){
    // pink speech bubble with "!"
    ctx.fillStyle='#ff66aa';
    ctx.beginPath(); ctx.ellipse(0, -2, 22, 16, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-6, 12); ctx.lineTo(6, 12); ctx.lineTo(0, 22); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#000'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(0, -2, 22, 16, 0, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle='#000'; ctx.font='bold 22px "Press Start 2P"'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('!', 0, -2);
  } else if (kind==='face'){
    // angry boss face
    ctx.fillStyle='#f4c896'; ctx.fillRect(-18, -18, 36, 36);
    ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.strokeRect(-18, -18, 36, 36);
    ctx.fillStyle='#000';
    // angry eyes
    ctx.beginPath(); ctx.moveTo(-13,-8); ctx.lineTo(-6,-5); ctx.lineTo(-13,-2); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(13,-8); ctx.lineTo(6,-5); ctx.lineTo(13,-2); ctx.closePath(); ctx.fill();
    // frown
    ctx.beginPath(); ctx.arc(0, 14, 8, Math.PI, 2*Math.PI); ctx.lineWidth=2; ctx.stroke();
  }
  ctx.restore();
}

    // share — copy canvas image to clipboard
    try{
      canvas.toBlob(b=>{
        if (b && navigator.clipboard && navigator.clipboard.write){
          navigator.clipboard.write([new ClipboardItem({'image/png': b})]).then(()=>{
            HUD.note('Bild in Zwischenablage kopiert!', '#ffd633');
          }).catch(()=>{
            HUD.note('Teilen nicht verfügbar', '#aaa');
          });
        }
      });
    } catch(err){ HUD.note('Teilen nicht verfügbar', '#aaa'); }
  }
});

// ===== ENCOUNTER DIRECTOR =====
const EncDirector = {
  update(dt){
    if (Game.inBoss || Game.inEncounter || Game.state!=='PLAY') return;
    Game.encounterCooldown -= dt;
    if (Game.encounterCooldown <= 0){
      // ~1-in-8 rolls Hosseini Haushalt (rare, only once per run);
      // otherwise uniform across the standard 5 encounters.
      // KEHRWOCHE-Tag: bias toward 'herta' (40% chance instead of 20%).
      let k;
      if (!Game.hosseiniHaushaltDone && Math.random() < 0.125){
        k = 'hosseini';
      } else if (typeof Mutation !== 'undefined' && Mutation.is('KEHRWOCHE') && Math.random() < 0.4){
        k = 'herta';
      } else {
        k = choice(ENCOUNTER_KEYS);
      }
      Encounter.start(k);
    }
  }
};

// ===== MAIN GAME LOOP =====
let lastT = performance.now();
function frame(now){
  let dt = (now - lastT) / 1000;
  if (dt > 0.05) dt = 0.05; // clamp
  lastT = now;
  // hitstop
  if (Game.hitstop > 0){ Game.hitstop -= dt; dt = 0; }
  Game.realT += dt;
  // skip game updates while paused (but keep rendering)
  let updateDt = (Game.paused || Game.state==='DEATH' || Game.state==='ENDING' || Game.state==='MENU') ? 0 : dt;
  // Pressed keys reset (consume one frame)
  // Update touch input
  updateTouchInput();

  // Title smash
  if (!Game.titleSmashShown && Game.realT > 2){
    Game.showTitleSmash = 1.0;
    Game.titleSmashShown = true;
  }
  if (Game.showTitleSmash > 0) Game.showTitleSmash -= dt;
  // Shvape cam timer
  if (Game.shvCam > 0) Game.shvCam -= dt;

  // Run state-specific update
  if (Game.state === 'TUTORIAL'){
    Tutorial.update(dt);
    // animate background while tutorial is up so it's not static
    Game.scrollX += 60 * dt;
    Bg.update(dt);
  } else if (Game.state === 'MENU'){
    Menu.update(dt);
  } else if (Game.state === 'DEATH'){
    Death.update(dt);
  } else if (Game.state === 'ENDING'){
    Ending.update(dt);
  } else if (Game.state === 'MAMA_CALL'){
    MamaCall.update(dt);
  } else if (Game.state === 'ACT2_TRANSITION'){
    Act2Transition.update(dt);
  } else if (Game.state === 'SCHNITZEL_ENDING'){
    SchnitzelEnding.update(dt);
  } else if (Game.state === 'PLAY'){
    Game.t += updateDt;
    // scroll
    Game.scrollX += Game.speed * updateDt;
    Player.update(updateDt);
    Vape.update(updateDt);
    // boring detect: no recent puff & no airtime activity
    const isBoring = (Game.realT - Game.lastPuffT > 5) && Player.onGround;
    Krass.update(updateDt, isBoring);
    Bg.update(updateDt);
    Director.update(updateDt);
    EncDirector.update(updateDt);
    updateEntities(updateDt);
    for (const e of Entities) specialEntityHook(e);
    // boss timing
    if (Game.bossIdx < BOSS_TIMES.length && Game.realT >= BOSS_TIMES[Game.bossIdx] && !Game.inBoss && !Game.inEncounter){
      Boss.start(Game.bossIdx);
    }
    // good ending check
    if (Game.realT >= 600 && !Game.endingShown){
      Game.state = 'ENDING';
      Ending.init();
    }
  } else if (Game.state === 'BOSS'){
    Game.t += updateDt;
    Game.scrollX += Game.speed * updateDt;
    Bg.update(updateDt);
    Boss.update(updateDt);
    updateEntities(updateDt);
    for (const e of Entities) specialEntityHook(e);
  } else if (Game.state === 'ENCOUNTER'){
    Game.t += updateDt;
    Game.scrollX += Game.speed * 0.5 * updateDt; // slowed during encounters
    Bg.update(updateDt);
    Encounter.update(updateDt);
    updateEntities(updateDt);
    for (const e of Entities) specialEntityHook(e);
  }

  // particles update always
  updateParticles(dt);
  HUD.update(dt);
  IntroCaption.update(dt);
  NewsTicker.update(dt);
  // Progression — abilities, curses, popups, cooldowns. Skipped during
  // pure-cinematic states so timers don't drain while the player is reading.
  if (Game.state==='PLAY' || Game.state==='BOSS' || Game.state==='ENCOUNTER'){
    Progression.update(updateDt);
    // STAGE 2 — fire INSULT from buffered input (B key or mobile button).
    Input.insultBuffer = Math.max(0, Input.insultBuffer - dt);
    if (Input.insultBuffer > 0){ Insult.fire(); Input.insultBuffer = 0; }
    Insult.update(updateDt);
    // STAGE 2 — Transgression director (full-screen setpieces) runs only during PLAY (not bosses)
    if (Game.state==='PLAY' && !Game.auraLocked) TransgressionDirector.update(updateDt);
    // STAGE 2 — fourth wall pause check
    BinRunKnows.tick(updateDt);
  }
  // Lifetime play time (real time, not paused). Persists every 30 sec.
  if (Game.state==='PLAY' || Game.state==='BOSS' || Game.state==='ENCOUNTER'){
    Save.data.lifetimePlayTime += dt;
    if (Math.floor(Save.data.lifetimePlayTime) % 30 === 0 && Math.floor(Save.data.lifetimePlayTime) !== Save._lastSaveTick){
      Save._lastSaveTick = Math.floor(Save.data.lifetimePlayTime);
      Save.save();
    }
    // SCHWAPE_BLEIBT — 5 minutes survived in a single run
    if (Game.realT >= 300 && !Game._fiveMinUnlocked){
      Game._fiveMinUnlocked = true;
      Achv.unlock('SCHWAPE_BLEIBT');
    }
  }

  // ===== RENDER =====
  ctx.save();
  // shake
  if (Game.shake > 0 && !CFG.REDUCED_MOTION){
    ctx.translate(rand(-Game.shake, Game.shake), rand(-Game.shake, Game.shake));
    Game.shake *= 0.85;
    if (Game.shake < 0.3) Game.shake = 0;
  }

  if (Game.state === 'TUTORIAL'){
    Tutorial.draw();
  } else if (Game.state === 'MENU'){
    Menu.draw();
  } else if (Game.state === 'ENDING'){
    Ending.draw();
  } else if (Game.state === 'ACT2_TRANSITION'){
    Act2Transition.draw();
  } else if (Game.state === 'SCHNITZEL_ENDING'){
    SchnitzelEnding.draw();
  } else {
    Bg.draw();
    Progression.drawWorldOverlay();
    Insult.drawWorldOverlay();
    drawEntities();
    drawSpecialEntities();
    drawParticles(0);
    // Stealth dims the player sprite (alpha 0.3 while active)
    const wasAlpha = ctx.globalAlpha;
    if (Game.stealthActiveT > 0) ctx.globalAlpha = 0.3;
    drawBinRun(Player.x, Player.y, Game.realT);
    ctx.globalAlpha = wasAlpha;
    if (Game.state === 'BOSS') Boss.draw();
    if (Game.state === 'ENCOUNTER') Encounter.draw();
    Progression.drawHUD();
    Insult.drawHUD();
    HUD.draw();
    Mutation.drawBadge();
    Achv.draw();
    NewsTicker.draw();
    IntroCaption.draw();
    if (Game.state === 'MAMA_CALL') MamaCall.draw();
    BinRunKnows.draw();
    if (Game.state === 'DEATH') Death.draw();
    Achv.drawVitrine();
  }

  // flash
  if (Game.flash > 0){
    ctx.fillStyle = Game.flashColor;
    ctx.globalAlpha = Game.flash * 3.5;
    ctx.fillRect(0,0,CFG.W,CFG.H);
    ctx.globalAlpha = 1;
    Game.flash -= 1/60;
  }

  // === MOBILE-FIRST TOUCH UI ===
  // Persistent visible buttons during gameplay. Larger hit zones, clear icons.
  if (IS_TOUCH && (Game.state==='PLAY'||Game.state==='BOSS'||Game.state==='ENCOUNTER')){
    // very subtle zone tinting (helps proprioception without visual noise)
    ctx.globalAlpha = 0.05; ctx.fillStyle = '#fff';
    ctx.fillRect(CFG.W/2, 0, CFG.W/2, CFG.H);
    ctx.globalAlpha = 0.03; ctx.fillStyle = '#7af';
    ctx.fillRect(0, 0, CFG.W/2, CFG.H);
    ctx.globalAlpha = 1;

    // BIG persistent JUMP button bottom-right
    const jbx = CFG.W - 200, jby = CFG.H - 200, jbr = 140;
    const jPress = !!(Input.touchJump || Input.keys.jump);
    ctx.save();
    ctx.globalAlpha = jPress ? 0.55 : 0.32;
    ctx.fillStyle = '#ff3030';
    ctx.beginPath(); ctx.arc(jbx, jby, jbr, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 0.85;
    ctx.lineWidth = 6; ctx.strokeStyle = '#000';
    ctx.beginPath(); ctx.arc(jbx, jby, jbr, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 56px Bangers, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('JUMP', jbx, jby-6);
    ctx.font='14px "Press Start 2P"'; ctx.fillText('↑', jbx, jby+34);
    ctx.restore();

    // VAPE button bottom-left (smaller circle)
    const vbx = 180, vby = CFG.H - 200, vbr = 110;
    const vPress = !!(Input.vapeBuffer > 0);
    ctx.save();
    ctx.globalAlpha = vPress ? 0.55 : 0.30;
    ctx.fillStyle = '#7fff7f';   // green = LIFE button (vape = lifebar)
    ctx.beginPath(); ctx.arc(vbx, vby, vbr, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 0.85;
    ctx.lineWidth = 5; ctx.strokeStyle = '#000';
    ctx.beginPath(); ctx.arc(vbx, vby, vbr, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 38px Bangers, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('VAPE', vbx, vby-2);
    // tiny vape icon
    ctx.fillStyle='#000'; ctx.fillRect(vbx-22, vby+30, 36, 8);
    ctx.fillStyle='#fff'; ctx.fillRect(vbx+10, vby+32, 4, 4);
    ctx.restore();

    // STAGE 2 — INSULT button — third pillar. Above & right of VAPE, pink,
    // speech bubble icon. Pulses when ready+target available.
    const ibx = 280, iby = CFG.H - 380, ibr = 90;
    const insultReady = (typeof Insult !== 'undefined') && Insult.ready();
    const insultTarget = insultReady && Insult.findTarget();
    const iPress = !!(Insult && Insult.lockT > 0);
    const pulse = (insultReady && insultTarget) ? (0.5 + 0.5*Math.sin(Game.realT*8)) : 0;
    ctx.save();
    ctx.globalAlpha = iPress ? 0.55 : (insultReady ? (0.30 + pulse*0.25) : 0.18);
    ctx.fillStyle = insultReady ? '#ff66aa' : '#888';
    ctx.beginPath(); ctx.arc(ibx, iby, ibr, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 0.85;
    ctx.lineWidth = 5; ctx.strokeStyle = '#000';
    ctx.beginPath(); ctx.arc(ibx, iby, ibr, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 32px Bangers, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('INSULT', ibx, iby-4);
    // tiny speech-bubble icon
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(ibx, iby+30, 22, 12, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(ibx-4, iby+40); ctx.lineTo(ibx+6, iby+40); ctx.lineTo(ibx, iby+50); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#000'; ctx.font='bold 12px "Press Start 2P"';
    ctx.fillText('!', ibx, iby+34);
    // Cooldown ring on the button face when on cooldown
    if (Insult && Insult.cd > 0){
      const r = clamp(Insult.cd / 4.0, 0, 1);
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.beginPath();
      ctx.arc(ibx, iby, ibr-2, -Math.PI/2, -Math.PI/2 + Math.PI*2*r, false);
      ctx.lineTo(ibx, iby); ctx.closePath(); ctx.fill();
    }
    // VAPE-too-low veil
    if (Vape.v < 12){
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.beginPath(); ctx.arc(ibx, iby, ibr, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff8a30'; ctx.font='9px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText('zu wenig', ibx, iby+62);
      ctx.fillText('Atem', ibx, iby+74);
    }
    ctx.restore();

    // Small DUCK pill, top-right of jump button
    const dbx = jbx - 30, dby = CFG.H - 90, dbw = 120, dbh = 56;
    ctx.save();
    ctx.globalAlpha = Input.duck ? 0.55 : 0.30;
    ctx.fillStyle = '#88c0e0';
    ctx.fillRect(dbx, dby, dbw, dbh);
    ctx.globalAlpha = 0.85;
    ctx.lineWidth = 4; ctx.strokeStyle = '#000';
    ctx.strokeRect(dbx, dby, dbw, dbh);
    ctx.fillStyle = '#fff'; ctx.font='bold 22px Bangers, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('DUCK ↓', dbx + dbw/2, dby + dbh/2);
    ctx.restore();

    // brief on-boarding text first 6 sec
    if (Game.realT < 6){
      ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='12px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText('LINKS BEWEGEN  •  RECHTS JUMP  •  PINKE TASTE = VAPE', CFG.W/2, 100);
    }
  }

  ctx.restore();

  // Clear pressed (one-frame pulses)
  for (const k in Input.pressed) Input.pressed[k] = false;
  // Re-scheduling is owned by kickFrame() at init; do not call rAF here.
}

// ===== INIT =====
Save.load();
Save.fetchKscIfStale();
Mutation.init();
loadBest();
Bg.init();
Menu.init();
Tutorial.init();
// Drip-unlock popups deferred to first PLAY frame (drawn by HUD overlay).
// First-load: show the tutorial. Player clicks START to enter PLAY.
Game.state = 'TUTORIAL';
setSeed(seedFromString('tutorial-' + Date.now()));
// Show menu only when explicitly requested via Escape after a death
window.addEventListener('keydown', e=>{
  if (e.code === 'Escape' && Game.state === 'DEATH'){
    Menu.show = true; Game.state = 'MENU';
  }
});

// rAF driver with watchdog — re-kicks on visibility change and via setInterval
// in case the browser pauses rAF (hidden tab / iframe). Frame is idempotent
// and uses lastT for delta calc so it's safe to drive from either source.
let _rafScheduled = false;
function kickFrame(){
  if (_rafScheduled) return;
  _rafScheduled = true;
  requestAnimationFrame(now=>{ _rafScheduled = false; frame(now); kickFrame(); });
}
kickFrame();
// Watchdog: if rAF hasn't fired for >250ms (hidden tab), force a step so
// the game continues to advance and re-renders the moment the tab comes back.
let _lastFrameAt = performance.now();
const _origFrame = frame;
frame = function(now){ _lastFrameAt = performance.now(); _origFrame(now); };
setInterval(()=>{
  if (performance.now() - _lastFrameAt > 250){
    // tab was throttled. Step once with a clamped dt and re-kick rAF.
    frame(performance.now());
    kickFrame();
  }
}, 500);
document.addEventListener('visibilitychange', ()=>{ if (!document.hidden) kickFrame(); });

// Mobile tap on death-screen restart button
canvas.addEventListener('pointerdown', e=>{
  if (Game.state === 'DEATH' && IS_TOUCH){
    const p = pointerToCanvas(e);
    if (p.y > 660 && p.y < 710 && Math.abs(p.x - CFG.W/2) < 120) restartGame();
  }
  if (Game.state === 'ENDING' && IS_TOUCH){
    if (Ending.t > 12) restartGame();
  }
});
