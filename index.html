    ctx.fillStyle='#3050ff'; ctx.fillRect(cx+100, cy-12, 14, 8);
    ctx.fillStyle='#ff3030'; ctx.fillRect(cx+120, cy-12, 14, 8);
    ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.strokeRect(cx, cy, 240, 60);
    // Nowak
    ctx.fillStyle='#0a7a2a'; ctx.fillRect(cx+50, cy+8, 18, 22);
    ctx.fillStyle='#f4c896'; ctx.fillRect(cx+52, cy-2, 14, 10);
    // Bubble
    if (this.lineT > 0) drawBubble(CFG.W*0.18, 80, this.line, 11);
    // Hold meter
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(CFG.W*0.15, 150, CFG.W*0.7, 80);
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(CFG.W*0.15, 150, CFG.W*0.7, 80);
    ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"'; ctx.textAlign='center';
    ctx.fillText('"Kurz mal pusten." — Halten für GENAU 4.0 Sek', CFG.W*0.5, 172);
    const t = this.holdT;
    const fill = clamp(t/5, 0, 1);
    const sweetMin = 3.7/5, sweetMax = 4.3/5;
    ctx.fillStyle = '#444'; ctx.fillRect(CFG.W*0.18, 188, CFG.W*0.64, 16);
    ctx.fillStyle = '#9eff9e'; ctx.fillRect(CFG.W*0.18 + CFG.W*0.64*sweetMin, 188, CFG.W*0.64*(sweetMax-sweetMin), 16);
    ctx.fillStyle = (t>=3.7 && t<=4.3) ? '#7fff7f' : '#5af';
    ctx.fillRect(CFG.W*0.18, 188, CFG.W*0.64*fill, 16);
    ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"';
    ctx.fillText(`${t.toFixed(1)} s`, CFG.W*0.5, 218);
  }
}

// ===== BOSS 5 — RUDOLF SHVAPE =====
class B5_Rudolf extends BossBase {
  init(){
    this.duration = 45; this.timeLeft = 45;
    this.sighs = []; this.shoes = [];
    this.sighT = 2; this.shoeT = 4;
    this.savedSpeed = Game.speed; Game.speed *= 1.4;
  }
  update(dt){
    super.update(dt);
    this.timeLeft -= dt;
    this.sighT -= dt; this.shoeT -= dt;
    if (this.sighT <= 0){
      // disappointment wave
      this.sighs.push({x:CFG.W-20, y:CFG.GROUND_Y-110, vx:-160, w:40, h:60, life:3, maxLife:3});
      this.sighT = rand(2.0, 3.0);
    }
    if (this.shoeT <= 0){
      this.shoes.push({x:CFG.W-30, y:CFG.GROUND_Y-150, vx:-220, vy:-150, w:30, h:18});
      this.shoeT = rand(2.5, 4.5);
    }
    const hb = Player.hb();
    const krassMul = Krass.isLegende() ? 1.7 : (Krass.tier()>=3 ? 1.4 : 1);
    for (let i=this.sighs.length-1;i>=0;i--){
      const s = this.sighs[i];
      s.x += s.vx*dt; s.life -= dt;
      if (s.life <= 0) { this.sighs.splice(i,1); continue; }
      // Sigh-cancel cancels a sigh — fight fire with disappointment.
      let cleared=false;
      for (const w of Game.sighWaves){
        if (Math.abs((s.x+s.w/2) - w.x) < 70 && Math.abs((s.y+s.h/2) - w.y) < 50){ cleared=true; break; }
      }
      if (cleared){ this.sighs.splice(i,1); sparkle(s.x+s.w/2, s.y+s.h/2); continue; }
      if (aabb(hb, {x:s.x, y:s.y, w:s.w, h:s.h})){
        Player.hit(15*krassMul, 'SEUFZ');
        Player.x -= 30*krassMul;
        this.sighs.splice(i,1);
      }
    }
    for (let i=this.shoes.length-1;i>=0;i--){
      const sh = this.shoes[i];
      sh.x += sh.vx*dt; sh.y += sh.vy*dt; sh.vy += 600*dt;
      if (sh.y > CFG.GROUND_Y) { this.shoes.splice(i,1); continue; }
      let cleared=false;
      for (const w of Game.sighWaves){
        if (Math.abs((sh.x+sh.w/2) - w.x) < 60 && Math.abs((sh.y+sh.h/2) - w.y) < 40){ cleared=true; break; }
      }
      if (cleared){ this.shoes.splice(i,1); sparkle(sh.x+sh.w/2, sh.y+sh.h/2); continue; }
      if (aabb(hb, {x:sh.x, y:sh.y, w:sh.w, h:sh.h})){
        Player.hit(15, 'HAUSSCHUH');
        this.shoes.splice(i,1);
      }
    }
    if (this.timeLeft <= 0 && !this.done){
      this.done = true;
      Game.speed = this.savedSpeed;
      HUD.note('VATER ENTTÄUSCHT', '#ff66ff');
      Boss.end(Math.floor(3500 * Krass.mul()));
    }
  }
  draw(){
    // Rudolf at right side
    const rx = CFG.W*0.82, ry = CFG.GROUND_Y - 150;
    // === WEHRMACHT GRANDFATHER PHOTO — visible briefly through window ===
    // Tiny sepia frame on the wall behind. The implication is never said
    // out loud. General Honeycutt will reference it 30 minutes later.
    if (this.t > 8 && this.t < 12){
      const wx = CFG.W*0.55, wy = CFG.GROUND_Y - 230;
      ctx.fillStyle='#222'; ctx.fillRect(wx-2, wy-2, 64, 80);
      ctx.fillStyle='#cab28a'; ctx.fillRect(wx, wy, 60, 76);
      // sepia silhouette: cap with peak, jacket with collar
      ctx.fillStyle='#5a4a30';
      ctx.fillRect(wx+18, wy+24, 24, 28);
      ctx.fillRect(wx+22, wy+10, 16, 16); // head
      ctx.fillRect(wx+18, wy+8, 24, 6);   // cap brim
      ctx.fillStyle='#3a3020';
      ctx.fillRect(wx+18, wy+12, 24, 2);  // shadow under brim
      ctx.fillStyle='#222'; ctx.fillRect(wx+28, wy+18, 4, 1); // tiny insignia hint
      ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.strokeRect(wx, wy, 60, 76);
    }
    ctx.fillStyle='#3a4a30'; ctx.fillRect(rx, ry, 80, 100);
    ctx.fillStyle='#f4c896'; ctx.fillRect(rx+20, ry-40, 40, 40);
    ctx.fillStyle='#f4c896'; ctx.fillRect(rx+20, ry-40, 40, 6);
    // bald (no hair)
    ctx.fillStyle='#000'; ctx.fillRect(rx+28, ry-22, 4,4); ctx.fillRect(rx+48, ry-22, 4,4);
    // bild zeitung in hand
    ctx.fillStyle='#fff'; ctx.fillRect(rx-14, ry+40, 22, 8);
    ctx.fillStyle='#dd0000'; ctx.fillRect(rx-14, ry+40, 22, 3);
    ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.strokeRect(rx, ry, 80, 100);
    ctx.strokeRect(rx+20, ry-40, 40, 40);
    // sighs
    for (const s of this.sighs){
      const x = s.x, a = s.life/s.maxLife;
      ctx.globalAlpha = a*0.7;
      ctx.fillStyle='rgba(180,180,200,0.6)';
      ctx.beginPath(); ctx.ellipse(x+s.w/2, s.y+s.h/2, s.w*0.7, s.h*0.4, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#222'; ctx.font='12px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText('*seufz*', x+s.w/2, s.y+s.h/2);
      ctx.globalAlpha = 1;
    }
    // shoes
    for (const sh of this.shoes){
      ctx.fillStyle='#5a3a14'; ctx.fillRect(sh.x, sh.y, sh.w, sh.h);
      ctx.strokeStyle='#000'; ctx.strokeRect(sh.x, sh.y, sh.w, sh.h);
    }
    // timer
    ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"'; ctx.textAlign='center';
    ctx.strokeStyle='#000'; ctx.lineWidth=3;
    const s = `${Math.ceil(this.timeLeft)} Sek bis Tagesschau`;
    ctx.strokeText(s, CFG.W/2, 100); ctx.fillText(s, CFG.W/2, 100);
  }
}

// ===== BOSS 6 — DER SCHWARZWALD =====
class B6_Schwarzwald extends BossBase {
  init(){
    this.soft = !!Game.schwarzwaldSoft;
    this.checkpoints = 3; this.collected = 0;
    this.savedDrain = CFG.VAPE_DRAIN_BASE;
    this.spawnT = 0; this.cakeT = 0;
    // Soft variant: no Wildsau, no kirschtorte; just walking home through the Schwarzwald.
    this.helmut = {x: this.soft ? CFG.W+9999 : CFG.W+200, y:CFG.GROUND_Y-50, w:80, h:50, hp:3, vx:-180};
    this.whisperT = 0;
    if (this.soft){
      HUD.note('Heimweg durch den Schwarzwald.', '#bbeebb');
    }
  }
  update(dt){
    super.update(dt);
    if (!this.soft) Vape.v = Math.max(0, Vape.v - 1.6*dt); // soft variant: no extra drain
    this.spawnT -= dt; this.cakeT -= dt; this.whisperT -= dt;
    // Pfifferling checkpoints
    if (this.spawnT <= 0){
      this.spawnT = this.soft ? rand(2, 3.5) : rand(3, 5);
      Entities.push({x:Game.scrollX+CFG.W+50, y:CFG.GROUND_Y-rand(80,200), w:30, h:30, type:'pfifferling', pickup:true, alive:true, animT:0,
        onCollect:()=>{ this.collected++; HUD.note(`Pfifferling ${this.collected}/3`, '#ffd633'); }});
    }
    // Cake (looks like pickup, hurts) — only in hard variant
    if (!this.soft && this.cakeT <= 0){
      this.cakeT = rand(2, 3.5);
      Entities.push({x:Game.scrollX+CFG.W+50, y:CFG.GROUND_Y-rand(80,180), w:36, h:30, type:'kirschtorte', alive:true, animT:0});
    }
    // Helmut (Wildschwein) — disabled in soft variant
    if (!this.soft){
      this.helmut.x += this.helmut.vx*dt;
      if (this.helmut.x < -100) this.helmut.x = CFG.W+200;
      const hb = Player.hb();
      if (aabb(hb, {x:this.helmut.x, y:this.helmut.y, w:this.helmut.w, h:this.helmut.h})){
        if (Player.vy > 200){ this.helmut.hp--; Player.vy = -500; if (this.helmut.hp<=0) this.helmut.x = CFG.W+500; }
        else Player.hit(20, 'WILDSAU');
      }
    }
    // collect pfifferlings via entity hook
    for (const e of Entities){
      if (e.type==='pfifferling' && !e.alive && e.onCollect && !e._consumed){ e.onCollect(); e._consumed=true; }
    }
    if (this.whisperT <= 0){
      HUD.note('"Bin Run..."', '#aabbaa'); this.whisperT = rand(4,7);
    }
    if (this.collected >= this.checkpoints && !this.done){
      this.done = true;
      Boss.end(Math.floor(4000 * Krass.mul()));
    }
  }
  draw(){
    // vignette
    const grd = ctx.createRadialGradient(Player.x+30, Player.y+40, 100, Player.x+30, Player.y+40, 600);
    grd.addColorStop(0, 'rgba(0,0,0,0)');
    grd.addColorStop(1, 'rgba(0,0,0,0.85)');
    ctx.fillStyle=grd; ctx.fillRect(0,0,CFG.W,CFG.H);
    // Helmut
    if (this.helmut.x < CFG.W+50 && this.helmut.x > -100){
      const hx = this.helmut.x;
      ctx.fillStyle='#3a2a18';
      ctx.beginPath(); ctx.ellipse(hx+40, this.helmut.y+25, 40, 20, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillRect(hx+10, this.helmut.y+30, 8, 16); ctx.fillRect(hx+40, this.helmut.y+30, 8, 16); ctx.fillRect(hx+60, this.helmut.y+30, 8, 16);
      // tusks
      ctx.fillStyle='#fff'; ctx.fillRect(hx, this.helmut.y+25, 4, 6);
      // hp bar
      ctx.fillStyle='#ff3030'; ctx.fillRect(hx, this.helmut.y - 14, this.helmut.w*(this.helmut.hp/3), 4);
      ctx.fillStyle='#fff'; ctx.font='6px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText('WILDSAU', hx+40, this.helmut.y - 18);
    }
    // entities (kirschtorte / pfifferling) drawn in normal pipeline
    // counter
    ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"'; ctx.textAlign='left';
    ctx.strokeStyle='#000'; ctx.lineWidth=3;
    const s = `Pfifferling: ${this.collected}/3`;
    ctx.strokeText(s, 30, 100); ctx.fillText(s, 30, 100);
  }
}

// ===== BOSS 7 — DIE MUTTER (UNWINNBAR — bis sie es nicht mehr ist) =====
//
// Surface mechanic (unchanged): 20 sec, Trust meter, Left=lie / Right=truth,
// timer expires → forced cry, +5000 score, Ersatz-Vape, story continues to
// the visible "good ending".
//
// HIDDEN mechanic (NEVER mentioned in-game): every Right-Arrow press has a
// 1% (0.5% with IGNORIEREN) chance to flip a TRUE HONESTY frame — single-
// frame white pulse, soft chime. 17 frames + Trust > 50% at the moment of
// the 17th → Act II. Anything else → the existing Ersatz-Vape outcome.
class B7_Mutter extends BossBase {
  init(){
    Save.markBoss(6);
    this.soft = !!Game.schwarzwaldSoft;
    this.trust = 100;
    this.timer = 20;
    this.honestyFrames = 0;
    this.honestyTarget = 17 + (Game.honestyBonusFrames || 0);
    this.honestyChance = (Game.honestyBonusFrames>0) ? 0.005 : 0.01;
    this.honestyPulseT = 0;
    this.lineT = 3;
    if (this.soft){
      this.line = "Komm, setz dich, Bin Run.";
      this.questions = ["Bist du gesund?","Wie war dein Tag?","Möchtest du Tee?","Hast du was gegessen?"];
      this.finishLine = "Es ist okay, Bin Run.";
      this.trustDropL = 6; this.trustDropR = 3; this.trustRegen = 1.5;
    } else {
      this.line = "Setz dich, Bin Run.";
      this.questions = ["Was ist das in deiner Tasche?","Wo warst du heute Nachmittag?","Hat dir das Justin gegeben?","Bin Run, schau mich an."];
      if (Game.honestyBonusFrames > 0){
        // injected if IGNORIEREN was the choice — appears early
        this.questions = ["Du bist nicht ans Telefon gegangen, Bin Run.", ...this.questions];
      }
      // CHANTAL_TRUST high → Mama mentions her warmly, fight is gentler.
      // CHANTAL_TRUST low → Mama doesn't soften.
      const ct = Game.chantalTrust|0;
      const chantalSoftener = ct >= 70 ? 0.7 : (ct <= 30 ? 1.15 : 1.0);
      if (ct >= 70){
        this.questions = ["Chantal hat angerufen. Sie macht sich Sorgen um dich.", ...this.questions];
      }
      this.finishLine = "Ich bin nicht wütend, Bin Run. Ich bin nur enttäuscht.";
      this.trustDropL = 8 * (Game.mamaTrustHarder||1) * chantalSoftener;
      this.trustDropR = 5 * (Game.mamaTrustHarder||1) * chantalSoftener;
      this.trustRegen = 1.0 / (Game.mamaTrustHarder||1) / chantalSoftener;
    }
    this.qi = 0;
    Krass.v = Krass.v * 0.5;
    HUD.note(this.soft ? 'Mama is da. Es ist okay.' : 'AURA HALBIERT — Mama is da, kein Rizz', '#ff66ff');
  }
  update(dt){
    super.update(dt);
    this.timer -= dt; this.lineT -= dt;
    this.honestyPulseT = Math.max(0, this.honestyPulseT - dt);
    if (this.lineT <= 0){
      this.line = this.questions[this.qi % this.questions.length];
      this.lineT = 4;
      this.qi++;
    }
    let anyInput = false;
    if (Input.pressed.left)  { this.trust = Math.max(0, this.trust - this.trustDropL); HUD.note('Lüge erkannt.', '#ff3030'); anyInput = true; }
    if (Input.pressed.right) {
      this.trust = Math.max(0, this.trust - this.trustDropR);
      HUD.note('Sie wusste es schon.', '#ff66ff');
      anyInput = true;
      // The hidden test. ~1% per honest answer = expect 1 true frame per 100
      // honest presses. Reaching 17 in 20 sec demands ~5 presses/sec while
      // managing Trust above 50%. Done by accident: never. Done deliberately:
      // ~1 in 10000 players might find it.
      if (Math.random() < this.honestyChance){
        this.honestyFrames++;
        this.honestyPulseT = 0.06; // single-frame-ish white pulse
        // soft single-bell chime, very quiet
        try{
          if (Audio.brass) Audio.brass.triggerAttackRelease(['C6','E6','G6'], '32n', undefined, 0.18);
        }catch(e){}
      }
    }
    // Trust regen when no input given this frame
    if (!anyInput) this.trust = Math.min(100, this.trust + this.trustRegen*dt);
    if (this.timer <= 0 && !this.done){
      this.done = true;
      // === SECRET WIN PATH ===
      if (this.honestyFrames >= this.honestyTarget && this.trust > 50){
        Save.markMutterBeaten();
        // Bubble change announced via state machine; defer to Act2Transition
        Game.act2 = true;
        Game.bossDoneCount++;
        Game.bossIdx = 7;     // past B7
        Boss.active = null; Game.inBoss = false;
        Audio.victory();
        Game.state = 'ACT2_TRANSITION';
        Act2Transition.start();
        return;
      }
      // === DEFAULT: PUBLIC "GOOD ENDING" PATH ===
      HUD.note(`"${this.finishLine}"`, '#ff66ff');
      Game.ersatzVape = true;
      Game.catchphrase = ['Sorry, Mama.','Sorry, Mama.','Sorry, Mama.','Sorry, Mama.'];
      Boss.end(5000);
    }
  }
  draw(){
    ctx.fillStyle='rgba(40,20,30,0.7)'; ctx.fillRect(0,0,CFG.W,CFG.H);
    // Wohnzimmer arena
    ctx.fillStyle='#9a7a5a'; ctx.fillRect(0, CFG.GROUND_Y-180, CFG.W, 180);
    ctx.fillStyle='#7a3a3a'; ctx.fillRect(CFG.W*0.55, CFG.GROUND_Y-100, 280, 80);
    // Mutter
    const mx = CFG.W*0.7, my = CFG.GROUND_Y - 180;
    ctx.fillStyle='#a85a8a'; ctx.fillRect(mx, my, 60, 100);
    ctx.fillStyle='#f4c896'; ctx.fillRect(mx+12, my-30, 36, 30);
    ctx.fillStyle='#a85020'; ctx.fillRect(mx+10, my-32, 40, 12);
    ctx.fillStyle='#000'; ctx.fillRect(mx+18, my-18, 4,4); ctx.fillRect(mx+38, my-18, 4,4);
    ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.strokeRect(mx, my, 60, 100); ctx.strokeRect(mx+12, my-30, 36, 30);
    // Schnittchen tray
    ctx.fillStyle='#fff'; ctx.fillRect(mx-50, my+40, 40, 12);
    // Bubble — Mama, like everyone else, says the surname out loud.
    // The bubble itself flinches (rendered without the wince inside the
    // bubble; we draw the wince beside it for the boss bubble cycles).
    drawBubble(CFG.W*0.25, 80, this.line, 12);
    // Trust meter
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(20, 130, 280, 50);
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(20, 130, 280, 50);
    ctx.fillStyle='#fff'; ctx.font='9px "Press Start 2P"'; ctx.textAlign='left';
    ctx.fillText('VERTRAUEN', 30, 148);
    const tColor = this.trust > 50 ? '#7fff7f' : (this.trust>25 ? '#ffaa30' : '#ff3030');
    ctx.fillStyle=tColor; ctx.fillRect(30, 155, 260*(this.trust/100), 14);
    ctx.fillStyle='#fff'; ctx.font='8px "Press Start 2P"';
    ctx.fillText('← Lügen   |   → Wahrheit', 30, 178);
    ctx.fillStyle='#fff'; ctx.font='9px "Press Start 2P"'; ctx.textAlign='center';
    ctx.strokeStyle='#000'; ctx.lineWidth=3;
    const s = `${Math.ceil(this.timer)} Sek...`;
    ctx.strokeText(s, CFG.W/2, 100); ctx.fillText(s, CFG.W/2, 100);
    // TRUE HONESTY pulse — single-frame white over the player. Imperceptible
    // unless watching for it.
    if (this.honestyPulseT > 0){
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillRect(Player.x-2, Player.y-2, Player.w+4, Player.h+4);
    }
  }
}

// =====================================================================
// ACT II — DAS VERMÄCHTNIS
// Bin Run is 25, then 67, then home. Reachable only via the secret Mutter
// honest-frame mechanic. Three bosses, then the Schnitzel ending.
// =====================================================================

// ===== ACT II TRANSITION — "10 JAHRE SPÄTER..." =====
const Act2Transition = {
  t: 0, stage: 0,
  start(){
    this.t = 0; this.stage = 0;
    Game.state = 'ACT2_TRANSITION';
    Game.act2 = true;
    Game.finalCutsceneT = 0;
    // Drop music to silence — the spec says 4 sec of complete silence after.
    try{ Tone.Destination.mute = true; }catch(e){}
  },
  update(dt){
    this.t += dt;
    // Stage 0: Mutter says "Bin Run...?" — held note ~3 sec
    if (this.stage === 0){
      if (this.t < 0.05){
        try{
          if (Audio.brass) Audio.brass.triggerAttackRelease(['C5','E5','G5'], '2n', undefined, 0.5);
        }catch(e){}
      }
      if (this.t > 3) { this.stage = 1; this.t = 0; }
    }
    // Stage 1: fade to white over 2 sec
    else if (this.stage === 1){
      if (this.t > 2) { this.stage = 2; this.t = 0; }
    }
    // Stage 2: black, "10 JAHRE SPÄTER..." centered, silent for 4 sec
    else if (this.stage === 2){
      if (this.t > 4) { this.stage = 3; this.t = 0; }
    }
    // Stage 3: ENTER ACT II
    else if (this.stage === 3){
      try{ Tone.Destination.mute = Audio.muted; }catch(e){}
      // Reset speed/scroll for the Finanzamt static-arena boss
      Game.scrollX = 0;
      Game.t = 0;
      // ABILITIES PERSIST: this is the same run, just older
      Game.state = 'BOSS';
      Game.inBoss = true;
      Boss.active = new B8_Finanzamt(7);
      Boss.active.init();
      HUD.note('!! DAS FINANZAMT !!', '#ff66ff');
      flash('#fff', 0.4);
      Audio.bossStart();
      Audio.setTrack('boss');
    }
  },
  draw(){
    // Stage 0: hold final Mutter scene with new bubble line
    if (this.stage === 0){
      ctx.fillStyle='rgba(40,20,30,0.85)'; ctx.fillRect(0,0,CFG.W,CFG.H);
      ctx.fillStyle='#9a7a5a'; ctx.fillRect(0, CFG.GROUND_Y-180, CFG.W, 180);
      const mx = CFG.W*0.7, my = CFG.GROUND_Y - 180;
      ctx.fillStyle='#a85a8a'; ctx.fillRect(mx, my, 60, 100);
      ctx.fillStyle='#f4c896'; ctx.fillRect(mx+12, my-30, 36, 30);
      ctx.fillStyle='#a85020'; ctx.fillRect(mx+10, my-32, 40, 12);
      ctx.fillStyle='#000'; ctx.fillRect(mx+18, my-18, 4,4); ctx.fillRect(mx+38, my-18, 4,4);
      ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.strokeRect(mx, my, 60, 100); ctx.strokeRect(mx+12, my-30, 36, 30);
      drawBubble(CFG.W*0.25, 80, 'Bin Run...?', 14);
      drawBinRun(Player.x, Player.y, Game.realT);
    }
    // Stage 1: white-fade
    else if (this.stage === 1){
      const a = Math.min(1, this.t/2);
      // Hold the previous frame underneath, then white-out
      ctx.fillStyle='rgba(40,20,30,0.85)'; ctx.fillRect(0,0,CFG.W,CFG.H);
      ctx.fillStyle = `rgba(255,255,255,${a})`;
      ctx.fillRect(0, 0, CFG.W, CFG.H);
    }
    // Stage 2: black, "10 JAHRE SPÄTER..."
    else if (this.stage === 2){
      ctx.fillStyle='#000'; ctx.fillRect(0,0,CFG.W,CFG.H);
      const a = Math.min(1, this.t/0.6);
      ctx.globalAlpha = a;
      ctx.fillStyle='#fff';
      ctx.font='bold 48px Bangers, sans-serif';
      ctx.textAlign='center';
      ctx.fillText('10 JAHRE SPÄTER...', CFG.W/2, CFG.H/2);
      ctx.globalAlpha = 1;
    }
  }
};

// ===== BOSS 8 — DAS FINANZAMT =====
// Static screen of a German tax form scrolling upward. Bin Run runs in
// place. 4-minute fight, separate Steuer-Aura HP, Belege as projectiles,
// Säumniszuschlag letters cleared by Sigh-Cancel, Frist countdown.
class B8_Finanzamt extends BossBase {
  init(){
    Game.scrollX = 0;
    this.duration = 240;
    this.timeLeft = this.duration;
    this.steuerAura = 100;
    this.formY = 0;
    this.belege = [];
    this.envelopes = [];
    this.spawnT = 0; this.envT = 25;
    this.fristT = 240;
    this.checkpoint = false;
    // STAGE 2 — homeless-from-Lahr cassette pickup. Appears between
    // minutes 1:00 and 2:30. Walks past with a Walkman, extends a tape.
    // The ONLY trigger for the Badnerlied ending.
    this.homelessActive = false;
    this.homelessSpawnT = 60;
    this.homelessX = -120;
    this.cassetteTaken = !!Game.cassette;
    this.fields = [
      {label:'Werbungskosten', value:'', target:'1.247,00 €', y:0, fillT:0},
      {label:'Sonderausgaben',  value:'', target:'   824,50 €', y:0, fillT:0},
      {label:'Vorsorgepauschale', value:'', target:'2.106,00 €', y:0, fillT:0},
      {label:'Anlage N — Werbungskosten gesamt', value:'', target:'4.177,50 €', y:0, fillT:0},
    ];
  }
  update(dt){
    this.t += dt;
    Player.update(dt);
    Vape.update(dt);
    Krass.update(dt, false);
    this.timeLeft -= dt;
    this.fristT -= dt;
    this.formY -= 30*dt; // form scrolls upward
    if (this.formY < -120) this.formY = 0;
    this.spawnT -= dt; this.envT -= dt;
    // Belege — homing
    if (this.spawnT <= 0){
      const side = Math.floor(Math.random()*4);
      let bx,by,vx,vy;
      const amounts = ['47,82 €','12,99 €','1.247,00 €','3,14 €','199,00 €','7,49 €','829,00 €','0,29 €'];
      if (side===0){ bx = -40; by = rand(60, CFG.H-200); vx = 220; vy = rand(-40,40); }
      else if (side===1){ bx = CFG.W+40; by = rand(60, CFG.H-200); vx = -220; vy = rand(-40,40); }
      else if (side===2){ bx = rand(60, CFG.W-60); by = -40; vx = rand(-40,40); vy = 220; }
      else { bx = rand(60, CFG.W-60); by = CFG.H+40; vx = rand(-40,40); vy = -220; }
      this.belege.push({x:bx, y:by, vx, vy, w:60, h:32, amount:choice(amounts), homing: Math.random()<0.5});
      this.spawnT = clamp(rand(0.6, 1.2) - this.t/240, 0.2, 1.2);
    }
    // Säumniszuschlag — red envelopes
    if (this.envT <= 0){
      this.envelopes.push({x: rand(CFG.W*0.2, CFG.W*0.8), y: -60, vy: 80, w:80, h:50});
      this.envT = 25;
    }
    const phb = Player.hb();
    // Belege physics + collision
    for (let i=this.belege.length-1;i>=0;i--){
      const b = this.belege[i];
      if (b.homing){
        const dx = (Player.x+Player.w/2) - (b.x+b.w/2);
        const dy = (Player.y+Player.h/2) - (b.y+b.h/2);
        const d = Math.hypot(dx,dy)||1;
        b.vx += (dx/d)*40*dt; b.vy += (dy/d)*40*dt;
        const sp = Math.hypot(b.vx,b.vy);
        if (sp>260){ b.vx *= 260/sp; b.vy *= 260/sp; }
      }
      b.x += b.vx*dt; b.y += b.vy*dt;
      // sigh wave clears
      let cleared=false;
      for (const w of Game.sighWaves){
        if (Math.abs((b.x+b.w/2) - w.x) < 70 && Math.abs((b.y+b.h/2) - w.y) < 60){ cleared=true; break; }
      }
      if (cleared){ this.belege.splice(i,1); sparkle(b.x+b.w/2, b.y+b.h/2); continue; }
      if (b.x<-100 || b.x>CFG.W+100 || b.y<-100 || b.y>CFG.H+100){ this.belege.splice(i,1); continue; }
      if (aabb(phb, {x:b.x, y:b.y, w:b.w, h:b.h})){
        this.steuerAura = Math.max(0, this.steuerAura - 8);
        this.belege.splice(i,1);
        Audio.hit(); shake(6); flash('#ff3030', 0.1);
      }
    }
    // Envelopes
    for (let i=this.envelopes.length-1;i>=0;i--){
      const e = this.envelopes[i];
      e.y += e.vy*dt;
      let cleared=false;
      for (const w of Game.sighWaves){
        if (Math.abs((e.x+e.w/2) - w.x) < 80 && Math.abs((e.y+e.h/2) - w.y) < 60){ cleared=true; break; }
      }
      if (cleared){ this.envelopes.splice(i,1); comicBurst(e.x+e.w/2, e.y+e.h/2, 'NEIN!'); continue; }
      if (e.y > CFG.GROUND_Y){
        // landing damage
        this.steuerAura = Math.max(0, this.steuerAura - 18);
        shake(10); flash('#ff3030', 0.2);
        this.envelopes.splice(i,1);
      } else if (aabb(phb, {x:e.x, y:e.y, w:e.w, h:e.h})){
        this.steuerAura = Math.max(0, this.steuerAura - 14);
        shake(8); this.envelopes.splice(i,1);
      }
    }
    // Field auto-fill animation
    for (const f of this.fields){
      if (f.fillT < 1){
        f.fillT += dt/(40 + Math.random()*30);
        const len = Math.floor(clamp(f.fillT, 0, 1) * f.target.length);
        f.value = f.target.slice(0, len);
      }
    }
    // Frist expiry
    if (this.fristT <= 0 && !Game.finanzMultPenalty){
      Game.finanzMultPenalty = true;
      HUD.note('FRIST VERSÄUMT — Multi halbiert!', '#ff3030');
      flash('#ff3030', 0.4); shake(15);
    }
    // Checkpoint at minute 3
    if (!this.checkpoint && this.t >= 180){
      this.checkpoint = true;
      HUD.note('AUTOSAVE — Frist Mai 31', '#ffd633');
    }
    // === STAGE 2 — HOMELESS-FROM-LAHR cassette pickup ===
    // Spawns once between t=60 and t=150 if cassette not yet taken.
    if (!this.cassetteTaken && !this.homelessActive && this.t >= this.homelessSpawnT){
      this.homelessActive = true;
      this.homelessX = -120;
    }
    if (this.homelessActive){
      this.homelessX += 50*dt;
      // when he reaches Bin Run, auto-handoff
      if (this.homelessX >= Player.x - 30 && !this.cassetteTaken){
        this.cassetteTaken = true;
        Game.cassette = true;
        HUD.note('CASSETTE: "FÜR ZUHAUSE"', '#ffd633');
        comicBurst(this.homelessX, CFG.GROUND_Y-100, 'FÜR ZUHAUSE');
        Audio.itemFound && Audio.itemFound();
        if (typeof Achv !== 'undefined') Achv.unlock('CASSETTE_DRAGER');
      }
      if (this.homelessX > CFG.W + 200) this.homelessActive = false;
    }
    // Steuer-Aura death — restart from checkpoint or beginning
    if (this.steuerAura <= 0){
      this.steuerAura = 100;
      if (this.checkpoint){ this.t = 180; this.timeLeft = this.duration - 180; }
      else { this.t = 0; this.timeLeft = this.duration; this.fristT = 240; }
      this.belege.length = 0; this.envelopes.length = 0;
      flash('#fff', 0.3); shake(20);
      HUD.note(this.checkpoint ? 'Restart 3:00' : 'Restart 0:00', '#ff3030');
    }
    if (this.timeLeft <= 0 && !this.done){
      this.done = true;
      // Form prints out
      HUD.note('STEUER-ID LEBENSLANG: 47 829 314 110', '#ffd633');
      Game.baseScore += 25000;
      if (!Game.finanzMultPenalty && typeof Achv !== 'undefined') Achv.unlock('STEUER_BERUF');
      // Move on to Boss 9
      Boss.active = null;
      Game.inBoss = false;
      Audio.victory();
      Game.state = 'PLAY';
      // Brief 3-sec breath, then auto-trigger Tod
      setTimeout(()=>{
        Game.state = 'BOSS'; Game.inBoss = true;
        Boss.active = new B9_Tod(8);
        Boss.active.init();
        HUD.note('!! DER TOD !!', '#ff66ff');
        Audio.bossStart();
      }, 3000);
    }
  }
  draw(){
    // White paper background
    ctx.fillStyle = '#fff8e8'; ctx.fillRect(0,0,CFG.W,CFG.H);
    // halftone tax-form pattern
    ctx.fillStyle = 'rgba(0,0,0,0.05)';

    ctx.font='10px "Press Start 2P"';
    ctx.fillText('Anlage N — BIN RUN SHVAPE', 30, 60+this.formY);
    ctx.fillText('Steuer-ID: 47 829 314 110', 30, 78+this.formY);
    // Fields auto-typing
    let fy = 130 + this.formY;
    for (const f of this.fields){
      ctx.fillStyle='#001'; ctx.font='11px "Press Start 2P"';
      ctx.fillText(f.label, 30, fy);
      ctx.fillStyle='#fff'; ctx.fillRect(CFG.W-340, fy-14, 300, 22);
      ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.strokeRect(CFG.W-340, fy-14, 300, 22);
      ctx.fillStyle='#001'; ctx.font='12px "Press Start 2P"'; ctx.textAlign='right';
      ctx.fillText(f.value, CFG.W-50, fy+2);
      ctx.textAlign='left';
      fy += 60;
    }
    // Vertical bar guides for wall-slide (cosmetic)
    ctx.strokeStyle='#aaa'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(20, 0); ctx.lineTo(20, CFG.H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(CFG.W-20, 0); ctx.lineTo(CFG.W-20, CFG.H); ctx.stroke();
    // Belege
    for (const b of this.belege){
      ctx.fillStyle='#fff'; ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.strokeRect(b.x, b.y, b.w, b.h);
      ctx.fillStyle='#000'; ctx.font='8px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText(b.amount, b.x+b.w/2, b.y+18);
      ctx.fillStyle='#888'; ctx.fillText('Beleg', b.x+b.w/2, b.y+28);

    // Envelopes (Säumniszuschlag)
    for (const e of this.envelopes){
      ctx.fillStyle='#cc1818'; ctx.fillRect(e.x, e.y, e.w, e.h);
      ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.strokeRect(e.x, e.y, e.w, e.h);
      // envelope flap
      ctx.beginPath(); ctx.moveTo(e.x, e.y); ctx.lineTo(e.x+e.w/2, e.y+e.h/2); ctx.lineTo(e.x+e.w, e.y); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.font='bold 7px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText('SÄUMNIS', e.x+e.w/2, e.y+e.h-8);
      ctx.fillText('ZUSCHLAG', e.x+e.w/2, e.y+e.h-18);
    }
    // === STAGE 2 — homeless-from-Lahr cassette giver ===
    if (this.homelessActive && !this.cassetteTaken){
      const hx = this.homelessX, hy = CFG.GROUND_Y - 90;
      ctx.fillStyle='#5a4030'; ctx.fillRect(hx, hy, 50, 70);
      ctx.fillStyle='#f4c896'; ctx.fillRect(hx+12, hy-30, 26, 30);

      ctx.fillStyle='#000'; ctx.fillRect(hx+18, hy-18, 4,4); ctx.fillRect(hx+30, hy-18, 4,4);

      ctx.strokeRect(hx-30, hy+20, 60, 40);
      ctx.fillStyle='#000'; ctx.font='bold 7px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText('OBDACHLOS,', hx, hy+34);
      ctx.fillText('AUS LAHR', hx, hy+50);
      // Walkman in lap, cassette extended
      ctx.fillStyle='#222'; ctx.fillRect(hx+8, hy+12, 18, 12);
      ctx.fillStyle='#888'; ctx.fillRect(hx+10, hy+14, 14, 4);
      ctx.fillStyle='#222'; ctx.fillRect(hx+50, hy+10, 16, 10);
      ctx.fillStyle='#ffd633'; ctx.fillRect(hx+52, hy+12, 12, 6);
    }
    // Player rendered separately by main loop
    // Boss HUD: Steuer-Aura + timer + Frist
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(20, 80, 320, 22);
    ctx.fillStyle='#7fff7f'; ctx.fillRect(22, 82, 316*(this.steuerAura/100), 18);

    const mins = Math.floor(this.timeLeft/60);

    ctx.strokeText(tStr, CFG.W/2, 36); ctx.fillText(tStr, CFG.W/2, 36);

    const fmin = Math.floor(Math.max(0,this.fristT)/60);
    const fsec = Math.floor(Math.max(0,this.fristT)%60);
    ctx.fillStyle = this.fristT < 30 ? '#ff3030' : '#000';
    ctx.font='bold 12px "Press Start 2P"';
    ctx.fillText(`FRIST: 31. Mai — ${fmin}:${String(fsec).padStart(2,'0')}`, CFG.W/2, 56);
  }

// ===== BOSS 9 — DER TOD (Skat) =====
// 3-round Skat. Bin Run, Tod, and the unexplained Helmut. The game does not
// teach Skat. Tod cheats — call him out with SIGH CANCEL during his cheat
// animation. Win: 2/3 rounds + at least one called cheat per round.
class B9_Tod extends BossBase {
  init(){
    this.round = 1;
    this.binRunWins = 0;
    this.todCheating = false;
    this.cheatCalled = [false, false, false];
    this.roundResult = [null,null,null];
    this.cheatT = 0;
    this.cheatNextT = rand(4, 8);
    this.bidLine = "Reizen Sie, Herr Shvape.";
    this.bid = 18;
    this.binRunBid = 18;
    this.lineT = 4;
    this.phase = 'reizen';
    this.handCards = ['♠A','♥10','♣K','♦9','♠Q','♥7','♣8'];
    this.callout = '';
    this.calloutT = 0;
    this.endT = 0;
    HUD.note('SKAT, NACH DEUTSCHER ART', '#cccccc');
  }
  update(dt){
    this.t += dt;
    Player.update(dt);
    Vape.update(dt);
    Krass.update(dt, false);
    this.lineT -= dt;
    this.calloutT = Math.max(0, this.calloutT - dt);
    // cheat cycle — tod palms a card every now and then
    this.cheatNextT -= dt;
    if (this.cheatNextT <= 0 && !this.todCheating){
      this.todCheating = true;
      this.cheatT = 1.4; // 1.4 sec window to call him out
    }
    if (this.todCheating){
      this.cheatT -= dt;
      // detect SIGH CANCEL (sighWaves spawned this frame)
      if (Game.sighWaves.length > 0 && !this.cheatCalled[this.round-1]){
        this.cheatCalled[this.round-1] = true;
        this.todCheating = false;
        this.cheatNextT = rand(6, 10);
        this.callout = '"FALSCH GEGEBEN, HERR TOD!"';
        this.calloutT = 2.5;
        Krass.add(200, 'CHEAT GECALLT');
        comicBurst(CFG.W/2, 200, 'CAUGHT!');
      }
      if (this.cheatT <= 0){
        // tod gets away with it
        this.todCheating = false;
        this.cheatNextT = rand(6, 10);
        if (Math.random() < 0.5){ Vape.v = Math.max(0, Vape.v - 5); }
      }
    }
    // bidding/scoring — simplified to button-press progression
    if (this.lineT <= 0){
      if (this.phase === 'reizen'){
        // bin run bids by tapping JUMP
        if (Input.pressed.jump){
          this.binRunBid = Math.min(60, this.binRunBid + 2);
        }
        if (Input.pressed.right){
          this.phase = 'spielen';
          this.lineT = 6;
          this.bidLine = `Bei ${this.binRunBid}. Spielen Sie, Herr Shvape.`;
          this.playT = 6;
        }
      } else if (this.phase === 'spielen'){
        this.playT -= dt;
        // play happens via random card picks; outcome decided at end
        if (this.playT <= 0){
          this.phase = 'ergebnis';
          this.lineT = 4;
          // Round outcome: requires cheat called AND a base win condition
          // (random with bias toward Bin Run if catching cheat).
          const calledCheat = this.cheatCalled[this.round-1];
          const won = calledCheat && (Math.random() < (calledCheat ? 0.7 : 0.2));
          this.roundResult[this.round-1] = won ? 'WIN' : 'LOSS';
          if (won){ this.binRunWins++; this.bidLine = `Runde ${this.round}: GEWONNEN.`; }
          else { this.bidLine = `Runde ${this.round}: VERLOREN.`; }
        }
      } else if (this.phase === 'ergebnis'){
        // advance to next round or finish
        if (this.round < 3){
          this.round++;
          this.phase = 'reizen';
          this.binRunBid = 18;
          this.lineT = 5;
          this.bidLine = `Runde ${this.round}: Reizen Sie.`;
        } else {
          if (this.binRunWins >= 2){
            // VICTORY
            this.endT += dt;
            if (this.endT === 0 || (this.endT > 0 && this.endT < 0.05)){
              HUD.note('"Ich habe noch nie verloren, Herr Shvape." — und doch.', '#ffd633');
              Game.abilities.todCheck = true;
              Game.baseScore += 50000;
              this.endT = 0.06;
            }
            if (this.endT > 4 && !this.done){
              this.done = true;
              if (typeof Achv !== 'undefined' && (Game._b9FailsThisRun||0) === 0) Achv.unlock('SKAT_MEISTER');
              Boss.active = null; Game.inBoss = false; Audio.victory();
              Game.state = 'BOSS'; Game.inBoss = true;
              Boss.active = new B10_USA(9); Boss.active.init();
              HUD.note('!! DIE VEREINIGTEN STAATEN !!', '#88ccff');
              Audio.bossStart(); Audio.setTrack('boss');
            }
          } else {
            // RESTART 3 rounds
            this.round = 1; this.binRunWins = 0;
            this.cheatCalled = [false,false,false];
            this.roundResult = [null,null,null];
            this.phase = 'reizen';
            this.lineT = 5;
            this.bidLine = '"Nochmal, Herr Shvape. Ich habe Zeit."';
            Game._b9FailsThisRun = (Game._b9FailsThisRun||0) + 1;
          }
        }
      }
    }
  }
  draw(){
    // Wohnzimmer twilight. Tod across the table.
    ctx.fillStyle='#1a1828'; ctx.fillRect(0,0,CFG.W,CFG.H);
    // tagesschau TV glow
    ctx.fillStyle='rgba(120,120,180,0.12)';
    ctx.fillRect(CFG.W*0.1, CFG.H*0.1, CFG.W*0.8, CFG.H*0.4);
    // Recliner with old Bin Run
    ctx.fillStyle='#7a3a3a'; ctx.fillRect(60, CFG.GROUND_Y-180, 220, 160);
    ctx.fillStyle='#5a2820'; ctx.fillRect(40, CFG.GROUND_Y-50, 260, 30);
    // Old Bin Run — render at fixed pos here
    ctx.save();
    drawBinRunOlder(120, CFG.GROUND_Y-CFG.PLAYER_H-30, this.t, 'aged');
    ctx.restore();
    // Tod — robe, scythe, Bundeswehr cap
    const tx = CFG.W*0.66, ty = CFG.GROUND_Y-220;
    ctx.fillStyle='#000'; ctx.fillRect(tx, ty, 130, 220);
    ctx.fillStyle='#0a0a0a'; ctx.fillRect(tx-20, ty-30, 170, 40);
    // skull
    ctx.fillStyle='#dcd9c6';
    ctx.beginPath(); ctx.arc(tx+65, ty-10, 30, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.fillRect(tx+50, ty-16, 10, 12);
    ctx.fillRect(tx+72, ty-16, 10, 12);
    ctx.fillRect(tx+58, ty+2, 16, 4);
    // Bundeswehr cap — flecktarn green
    ctx.fillStyle='#5a6a3a'; ctx.fillRect(tx+34, ty-46, 64, 22);
    ctx.fillStyle='#3a4a20'; ctx.fillRect(tx+34, ty-32, 64, 6);
    ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.strokeRect(tx+34, ty-46, 64, 22);
    ctx.fillStyle='#ffd633'; ctx.font='bold 5px "Press Start 2P"'; ctx.textAlign='center';
    ctx.fillText('★', tx+66, ty-36);
    // scythe
    ctx.strokeStyle='#aaa'; ctx.lineWidth=4; ctx.beginPath();
    ctx.moveTo(tx+140, ty+200); ctx.lineTo(tx+170, ty-30); ctx.stroke();
    ctx.fillStyle='#ddd';
    ctx.beginPath(); ctx.moveTo(tx+170, ty-30); ctx.quadraticCurveTo(tx+220, ty-50, tx+190, ty); ctx.closePath(); ctx.fill();
    // Skat table
    ctx.fillStyle='#0d4a26'; ctx.fillRect(CFG.W*0.18, CFG.GROUND_Y-38, CFG.W*0.64, 32);
    ctx.strokeStyle='#000'; ctx.strokeRect(CFG.W*0.18, CFG.GROUND_Y-38, CFG.W*0.64, 32);
    // Cards in hand bottom
    for (let i=0;i<this.handCards.length;i++){
      const cx = CFG.W*0.32 + i*60, cy = CFG.H - 110;
      ctx.fillStyle='#fff'; ctx.fillRect(cx, cy, 50, 70);
      ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.strokeRect(cx, cy, 50, 70);
      ctx.fillStyle = (i%4<2) ? '#000' : '#cc1818';
      ctx.font='bold 14px "Press Start 2P"'; ctx.textAlign='left';
      ctx.fillText(this.handCards[i], cx+6, cy+22);
    }
    // Bubble
    drawBubble(CFG.W*0.4, 70, this.bidLine, 11);
    // round indicator
    ctx.fillStyle='#fff'; ctx.font='12px "Press Start 2P"'; ctx.textAlign='left';
    ctx.fillText(`Runde ${this.round}/3   |   Wins: ${this.binRunWins}`, 40, 40);
    ctx.fillText(`Bid: ${this.binRunBid}`, 40, 60);
    ctx.font='9px "Press Start 2P"';
    ctx.fillStyle = this.phase==='reizen' ? '#ffd633' : '#888';
    ctx.fillText('JUMP = +2 reizen   |   →  bestätigen', 40, 80);
    ctx.fillStyle = '#bbcfff';
    ctx.fillText('[V + DOWN] = Cheat callen wenn Tod *etwas* tut', 40, 96);
    // Cheat indicator — visible only briefly
    if (this.todCheating){
      ctx.fillStyle = `rgba(255,80,80,${0.4 + 0.5*Math.sin(this.t*16)})`;
      ctx.fillRect(tx-10, ty-50, 150, 280);
      // little "*hand-of-cards*" giveaway
      ctx.fillStyle='#fff'; ctx.fillRect(tx+90, ty+80, 30, 40);
      ctx.strokeStyle='#000'; ctx.strokeRect(tx+90, ty+80, 30, 40);
      ctx.fillStyle='#cc1818'; ctx.font='8px "Press Start 2P"';
      ctx.textAlign='center'; ctx.fillText('?', tx+105, ty+108);
    }
    // Callout banner
    if (this.calloutT > 0){
      ctx.fillStyle='#000'; ctx.fillRect(0, 200, CFG.W, 40);
      ctx.fillStyle='#ffd633'; ctx.font='bold 16px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText(this.callout, CFG.W/2, 226);
    }
    // Round results
    for (let i=0;i<3;i++){
      const x = CFG.W - 220 + i*60;
      ctx.fillStyle = this.roundResult[i]==='WIN' ? '#7fff7f' : (this.roundResult[i]==='LOSS' ? '#ff3030' : '#444');
      ctx.fillRect(x, 40, 50, 30);
      ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(x, 40, 50, 30);
      ctx.fillStyle='#000'; ctx.font='bold 9px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText(this.roundResult[i] || `R${i+1}`, x+25, 60);
    }
  }
}

// ===== BOSS 10 — DAS VERMÄCHTNIS, DIE INVASION =====
// Replaces the original Florida arena. Bin Run, 67, finds oil in his
// Vorgarten. The village rallies behind him. Then the Black Hawks come.
// Phases A → G. The "fight" against General Honeycutt is unwinnable; the
// only choice is at what dollar amount to give up. Aura locks at 0
// permanently for the rest of the run on accept. Steps scene plays out
// around Bin Run while sun sets over the Schwarzwald.
//
// Cassette → Badnerlied. No cassette → silence. Both are correct endings.
class B10_USA extends BossBase {
  init(){
    // Phases A-G state machine
    // A: oilDiscovery   (~30 sec) — Vorgarten cutscene, shovel hits black
    // B: quietWeek      (~20 sec) — village congratulates, Aura drops
    // C: invasion       (~30 sec) — Black Hawks, US convoy, village rallies
    // D: honeycutt      (offers $400 → $4k → $40k → $400k, must accept)
    // E: auraLocked     — sprite ages, transgressions disabled (immediate)
    // F: steps          — long quiet linger; sun sets; HEIMAT cloud
    // G: ending         — Badnerlied if cassette, silence if not
    this.phase = 'oilDiscovery';
    this.phaseT = 0;
    this.honeycuttIdx = 0; // 0..3 = $400 | $4000 | $40000 | $400000
    this.honeycuttOffers = [400, 4000, 40000, 400000];
    this.honeycuttSelected = 0;     // 0=accept,1=refuse
    this.acceptedAmount = null;
    this.helicopterX = -300;
    this.crowd = [];                // village rally NPC positions
    this.cloudWord = '';
    HUD.note('VORGARTEN — die Tomaten brauchen Wasser.', '#88ccff');
  }
  update(dt){
    this.t += dt;
    this.phaseT += dt;
    // Player & Vape only update during active phases (not the locked steps).
    if (this.phase !== 'auraLocked' && this.phase !== 'steps' && this.phase !== 'ending'){
      Player.update(dt);
      Vape.update(dt);
      Krass.update(dt, false);
    }
    switch(this.phase){
      case 'oilDiscovery': this.updateOil(dt); break;
      case 'quietWeek':    this.updateQuiet(dt); break;
      case 'invasion':     this.updateInvasion(dt); break;
      case 'honeycutt':    this.updateHoneycutt(dt); break;
      case 'auraLocked':   this.updateLocked(dt); break;
      case 'steps':        this.updateSteps(dt); break;
      case 'ending':       this.updateEnding(dt); break;
    }
  }
  enterPhase(p){ this.phase = p; this.phaseT = 0; }
  updateOil(dt){
    // Bin Run plants tomatoes, then shovel hits black.
    if (this.phaseT > 12 && !Game.oilFound){
      Game.oilFound = true;
      Krass.add(2000, 'ÖL GEFUNDEN');
      shake(12); flash('#222', 0.3);
      HUD.note('Krass.', '#ffd633');
    }
    if (this.phaseT > 30){
      this.enterPhase('quietWeek');
      HUD.note('Mama ist stolz. Frau Herta tutts begrudgingly.', '#88ccff');
    }
  }
  updateQuiet(dt){
    // Aura starts dropping naturally — Bin Run no longer needs cool.
    Krass.v = Math.max(0, Krass.v - 1.5*dt);
    if (this.phaseT > 20){
      this.enterPhase('invasion');
      shake(20); flash('#000', 0.4);
      try{ if (Audio.brass) Audio.brass.triggerAttackRelease(['A2','D3'],'2n', undefined, 0.6); }catch(e){}
      HUD.note('Black Hawks über dem Albtal.', '#ff3030');
    }
  }
  updateInvasion(dt){
    // Helicopter descends from upper-right, US Army convoy at left
    this.helicopterX = lerp(-300, CFG.W*0.55, clamp(this.phaseT/20, 0, 1));
    if (this.phaseT > 20 && this.crowd.length === 0){
      // Village rally — for the first time the Old Badeners stand WITH Bin Run
      const names = ['MAMA','RUDOLF','FRAU HERTA','PFARRER','KSC-FAN','DIETER','CHANTAL','HOSSEINI'];
      for (let i=0;i<names.length;i++){
        this.crowd.push({name:names[i], x: 80 + i*70, y: CFG.GROUND_Y - 96});
      }
      HUD.note('Das Dorf steht zusammen. Sogar Frau Herta.', '#ffd633');
    }
    if (this.phaseT > 30){
      this.enterPhase('honeycutt');
      HUD.note('General Brad Honeycutt: "Mr. Schwape, we\'re sorry."', '#ff66ff');
    }
  }
  updateHoneycutt(dt){
    // Player toggles Refuse / Accept with ←/→. Confirm with V.
    if (Input.pressed.left)  this.honeycuttSelected = 1;
    if (Input.pressed.right) this.honeycuttSelected = 0;
    if (Input.pressed.vape || Input.pressed.jump){
      if (this.honeycuttSelected === 0){
        // ACCEPT
        this.acceptedAmount = this.honeycuttOffers[this.honeycuttIdx];
        Game.honeycuttOffer = this.acceptedAmount;
        this.enterPhase('auraLocked');
        Game.auraLocked = true;
        Krass.v = 0;
        // The button labeled ACCEPT is the only path forward.
        HUD.note(`SIGNIERT: $${this.acceptedAmount.toLocaleString('de-DE')}`, '#aaaaaa');
        flash('#fff', 0.6); shake(10);
        // Achievements: cheapest accept vs maxed-out accept
        if (typeof Achv !== 'undefined'){
          if (this.acceptedAmount === 400) Achv.unlock('HONEYCUTT_BILLIG');
          if (this.acceptedAmount === 400000) Achv.unlock('HONEYCUTT_VERKAUFT');
        }
      } else {
        // REFUSE — phase escalates
        if (this.honeycuttIdx < this.honeycuttOffers.length-1){
          this.honeycuttIdx++;
          shake(8);
          // each refusal triggers escalation flavor
          const flavor = ['SWAT in Flip-Flops im Vorgarten.','Bohrturm direkt neben dir.','Walnussbaum gefällt.'];
          HUD.note(flavor[this.honeycuttIdx-1] || '', '#ff3030');
          this.honeycuttSelected = 0; // default back to accept
        } else {
          // last offer — refusing here stalls indefinitely. The button
          // labeled ACCEPT is the only path forward.
          HUD.note('Stillstand. Die Hubschrauber kreisen. (RECHTS um zu akzeptieren.)', '#ff3030');
        }
      }
    }
  }
  updateLocked(dt){
    // 2-sec beat, then the steps scene
    if (this.phaseT > 2){
      this.enterPhase('steps');
      Audio.setTrack('voelkersbach'); // pre-Badnerlied: somber folk
      try{ Tone.Destination.mute = Audio.muted; }catch(e){}
    }
  }
  updateSteps(dt){
    // The steps. Long quiet linger. ~12 sec.
    Game.stepsT += dt;
    if (this.phaseT > 12){
      // HEIMAT cloud
      if (Game.cassette) Audio.setTrack('badnerlied');
      else { try{ Tone.Destination.mute = true; }catch(e){} }
      this.enterPhase('ending');
    }
  }
  updateEnding(dt){
    // Credits + achievement
    if (this.phaseT > 18 && (Input.pressed.jump || Input.pressed.vape || Input.touchJump)){
      this.done = true;
      Game.endingType = 'mir_sin_alle';
      Save.data.actIIRunsLifetime = (Save.data.actIIRunsLifetime||0) + 1;
      Save.save();
      if (typeof Achv !== 'undefined'){
        Achv.unlock('MIR_SIN_ALLE');
        if (Game.cassette) Achv.unlock('BADNERLIED_HEARD');
      }
      try{ Tone.Destination.mute = Audio.muted; }catch(e){}
      Boss.active = null; Game.inBoss = false;
      Game.state = 'SCHNITZEL_ENDING';
      SchnitzelEnding.start();
    }
  }
  draw(){
    // Mutschelbach Vorgarten setting throughout. Sky + ground change with phase.

    } else {
      // sunset over Schwarzwald
      skyTop = '#3a4a7a'; skyBot = '#ff8a4a'; groundC = '#3a5d20';
    }
    const grd = ctx.createLinearGradient(0,0,0,CFG.H);
    grd.addColorStop(0, skyTop); grd.addColorStop(1, skyBot);

    ctx.fillStyle = groundC; ctx.fillRect(0, CFG.GROUND_Y, CFG.W, CFG.H-CFG.GROUND_Y);
    // Schwarzwald silhouette in background
    ctx.fillStyle = '#1a2820';
    ctx.beginPath();
    ctx.moveTo(0, CFG.GROUND_Y-40);
    for (let x=0;x<=CFG.W;x+=80) ctx.lineTo(x, CFG.GROUND_Y - 40 - Math.abs(Math.sin(x*0.01))*60);
    ctx.lineTo(CFG.W, CFG.GROUND_Y); ctx.lineTo(0, CFG.GROUND_Y); ctx.closePath(); ctx.fill();
    // Fachwerk house — left side
    ctx.fillStyle='#caa890'; ctx.fillRect(60, CFG.GROUND_Y-220, 360, 220);
    // beams
    ctx.fillStyle='#3a2010';
    ctx.fillRect(60, CFG.GROUND_Y-220, 360, 8);
    ctx.fillRect(60, CFG.GROUND_Y-118, 360, 8);
    ctx.fillRect(60, CFG.GROUND_Y-8, 360, 8);
    ctx.fillRect(60, CFG.GROUND_Y-220, 8, 220);
    ctx.fillRect(412, CFG.GROUND_Y-220, 8, 220);
    // diagonal beams
    ctx.strokeStyle='#3a2010'; ctx.lineWidth=8;
    ctx.beginPath(); ctx.moveTo(80, CFG.GROUND_Y-118); ctx.lineTo(180, CFG.GROUND_Y-220); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(280, CFG.GROUND_Y-220); ctx.lineTo(380, CFG.GROUND_Y-118); ctx.stroke();
    // door + window
    ctx.fillStyle='#5a3018'; ctx.fillRect(220, CFG.GROUND_Y-100, 60, 100);
    ctx.fillStyle='#ffd633'; ctx.beginPath(); ctx.arc(270, CFG.GROUND_Y-50, 3, 0, Math.PI*2); ctx.fill();
    // Vorgarten Buchsbaumhecke
    ctx.fillStyle = (this.phase==='honeycutt'||this.phase==='auraLocked'||this.phase==='steps') ? '#3a4a30' : '#3a8a3a';
    ctx.fillRect(440, CFG.GROUND_Y-30, CFG.W-460, 30);
    // Tomatoes + shovel
    if (this.phase==='oilDiscovery'){

      ctx.fillStyle='#aaa'; ctx.fillRect(636, CFG.GROUND_Y-12, 22, 6);
      // tomato plants
      for (let i=0;i<3;i++){

      }
      if (this.phaseT > 12){

        ctx.beginPath();
        for (let i=0;i<6;i++){
          const bx = 850+i*8, by = CFG.GROUND_Y - 6 - Math.sin(this.t*4+i)*4;

        'We have your grandfather\'s signature on the',
        '1962 NATO supplementary protocol. Section 4, paragraph C.',
        '',
        'Fair market value:',

      for (let i=0;i<lines.length;i++) ctx.fillText(lines[i], CFG.W/2, py+62+i*12);
      ctx.font='bold 28px Bangers, sans-serif'; ctx.fillStyle='#cc1818';

      // Buttons
      const bw = 200, bh = 28, by = py + ph - 36;

      ctx.fillStyle = this.honeycuttSelected===0 ? '#7fff7f' : '#aaa';
      ctx.fillRect(ax, by, bw, bh);
      ctx.fillStyle = this.honeycuttSelected===1 ? '#ff3030' : '#aaa';
      ctx.fillRect(rx, by, bw, bh);
      ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.strokeRect(ax, by, bw, bh); ctx.strokeRect(rx, by, bw, bh);
      ctx.fillStyle='#000'; ctx.font='bold 11px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText('ACCEPT  →', ax+bw/2, by+bh/2+4);
      ctx.fillText('REFUSE  ←', rx+bw/2, by+bh/2+4);
      ctx.font='9px "Press Start 2P"'; ctx.fillStyle='#fff';
      ctx.fillText('[V] / [SPACE] um zu bestätigen', CFG.W/2, by+bh+20);
    }
    // PHASE F — STEPS scene
    if (this.phase === 'steps' || this.phase === 'auraLocked' || this.phase === 'ending'){
      // Bin Run sits on Fachwerk steps. KSC fan one step down, weeping.
      // Mama in doorway, Pfarrer at gate, Frau Herta across street, Hosseini next door.
      // Sun is setting; sky already gradient'd above.
      const stepX = 240, stepY = CFG.GROUND_Y - 30;
      ctx.fillStyle='#aaa'; ctx.fillRect(stepX, stepY, 100, 8);
      ctx.fillStyle='#888'; ctx.fillRect(stepX+10, stepY+8, 80, 22);
      // Bin Run aged
      drawBinRunOlder(stepX+18, stepY-CFG.PLAYER_H, this.t, 'aged');
      // KSC fan one step below
      ctx.fillStyle='#222'; ctx.fillRect(stepX+50, stepY+28, 22, 50);
      ctx.fillStyle='#f4c896'; ctx.fillRect(stepX+54, stepY+18, 14, 12);
      // KSC scarf — blue/white
      ctx.fillStyle='#0072c6'; ctx.fillRect(stepX+50, stepY+30, 22, 4);
      ctx.fillStyle='#fff'; ctx.fillRect(stepX+50, stepY+34, 22, 1);
      // tear
      ctx.fillStyle='#bce'; ctx.fillRect(stepX+58, stepY+24, 1, 6);
      // Mama in doorway
      ctx.fillStyle='#a85a8a'; ctx.fillRect(245, CFG.GROUND_Y-100, 36, 80);
      ctx.fillStyle='#f4c896'; ctx.fillRect(252, CFG.GROUND_Y-118, 22, 18);
      ctx.fillStyle='#a85020'; ctx.fillRect(250, CFG.GROUND_Y-120, 26, 8);
      // Schnittchen tray
      ctx.fillStyle='#fff'; ctx.fillRect(283, CFG.GROUND_Y-86, 22, 6);
      // Pfarrer at gate
      ctx.fillStyle='#000'; ctx.fillRect(440, CFG.GROUND_Y-90, 24, 90);
      ctx.fillStyle='#f4c896'; ctx.fillRect(444, CFG.GROUND_Y-104, 16, 14);
      ctx.fillStyle='#fff'; ctx.fillRect(440, CFG.GROUND_Y-78, 24, 6); // collar
      // Frau Herta across street
      ctx.fillStyle='#7a3a3a'; ctx.fillRect(CFG.W-220, CFG.GROUND_Y-90, 30, 90);
      ctx.fillStyle='#f4c896'; ctx.fillRect(CFG.W-216, CFG.GROUND_Y-110, 22, 20);
      ctx.fillStyle='#888'; ctx.fillRect(CFG.W-218, CFG.GROUND_Y-115, 26, 8); // grey hair
      // Hosseini next door — distinct outfit
      ctx.fillStyle='#a83020'; ctx.fillRect(CFG.W-380, CFG.GROUND_Y-90, 30, 90);
      ctx.fillStyle='#cba88c'; ctx.fillRect(CFG.W-376, CFG.GROUND_Y-110, 22, 20);
      ctx.fillStyle='#3a2818'; ctx.fillRect(CFG.W-378, CFG.GROUND_Y-115, 26, 8);
      // HEIMAT cloud above Bin Run
      if (this.phase === 'steps' && this.phaseT > 4){
        const a = clamp((this.phaseT-4)/3, 0, 1);
        ctx.save();
        ctx.globalAlpha = a*0.85;
        ctx.fillStyle='rgba(220,220,230,0.92)';
        ctx.beginPath(); ctx.ellipse(stepX+50, stepY-CFG.PLAYER_H-30, 80, 30, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle='#000'; ctx.font='bold 20px Bangers, sans-serif'; ctx.textAlign='center';
        ctx.fillText('HEIMAT', stepX+50, stepY-CFG.PLAYER_H-22);
        ctx.restore();
      }
      // Sun lowering
      const sunY = lerp(150, 380, clamp(this.phaseT/12, 0, 1));
      ctx.fillStyle='#ffaa44';
      ctx.beginPath(); ctx.arc(CFG.W*0.85, sunY, 60, 0, Math.PI*2); ctx.fill();
      // Tomato news montage faded out — replaced by quiet
    }
    // PHASE G — ENDING credits
    if (this.phase === 'ending'){
      ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,CFG.W,CFG.H);
      ctx.fillStyle='#ffd633'; ctx.font='bold 26px Bangers, sans-serif'; ctx.textAlign='center';
      ctx.fillText('MIR SIN ALLE MUTSCHELBACHER.', CFG.W/2, 200);
      ctx.fillStyle='#fff'; ctx.font='bold 18px Bangers, sans-serif';
      ctx.fillText('SOGAR DIE SCHWAPES.', CFG.W/2, 240);
      // verification code
      const seed = `${(Save.data.lifetimePlayTime|0)}|${Game.transgressionRevenue}|${Save.data.lifetimeAura}|${Game.honeycuttOffer||0}`;
      let h = 0; for (let i=0;i<seed.length;i++) h = (h*131 + seed.charCodeAt(i))>>>0;
      const code = h.toString(36).slice(0,4).toUpperCase();
      ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"';
      ctx.fillText(`VERIFICATION: ${code}`, CFG.W/2, 300);
      ctx.fillStyle = Game.cassette ? '#7fff7f' : '#888';
      ctx.fillText(Game.cassette ? '♪ Das Badnerlied ♪' : '(Stille)', CFG.W/2, 330);
      if (this.phaseT > 18){
        ctx.fillStyle='#fff'; ctx.font='9px "Press Start 2P"';
        ctx.fillText('[SPACE / TIPPEN] um zu beenden', CFG.W/2, 380);
      }
    }
    // Phase indicator (small, not the focus)
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(20, 20, 220, 22);
    ctx.fillStyle='#fff'; ctx.font='9px "Press Start 2P"'; ctx.textAlign='left';
    ctx.fillText(`PHASE: ${this.phase.toUpperCase()}`, 30, 36);
    if (Game.honeycuttOffer){
      ctx.fillStyle='#888'; ctx.fillText(`SIGNED: $${Game.honeycuttOffer.toLocaleString('de-DE')}`, 30, 56);
    }
  }
}

// ===== AGED BIN RUN — for Boss 9 setpieces =====
function drawBinRunOlder(x, y, t, mode){
  // Mode: 'aged' (67), or omitted = 25
  ctx.save();
  ctx.translate(x, y);
  // Recliner-bound, slumped posture in 'aged' mode.
  const old = mode === 'aged';
  ctx.fillStyle = old ? '#888' : '#666'; // grey hoodie (faded)
  ctx.fillRect(8, 24, 50, 60);
  ctx.fillStyle = '#999'; ctx.fillRect(14, 60, 36, 28); // wrinkled white shirt visible
  ctx.fillStyle = old ? '#cdb59a' : '#f4c896'; // skin
  ctx.fillRect(18, 0, 28, 28);
  // bald + white hair tufts
  ctx.fillStyle = '#fff'; ctx.fillRect(18, -4, 28, 6);
  ctx.fillStyle = '#000';
  ctx.fillRect(24, 12, 3, 3); ctx.fillRect(38, 12, 3, 3);
  // dark circles
  ctx.fillStyle = 'rgba(50,30,60,0.5)';
  ctx.fillRect(22, 16, 5, 4); ctx.fillRect(36, 16, 5, 4);
  // stubble
  ctx.fillStyle='rgba(60,60,60,0.4)';
  for (let i=0;i<8;i++) ctx.fillRect(20+i*3, 22, 1, 1);
  // gold chain (kept the drip)
  ctx.strokeStyle = '#ffd633'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(33, 36, 12, 0.1*Math.PI, 0.9*Math.PI); ctx.stroke();
  // legs in track pants
  ctx.fillStyle='#222';
  ctx.fillRect(16, 80, 18, 16); ctx.fillRect(36, 80, 18, 16);
  // outline
  ctx.strokeStyle='#000'; ctx.lineWidth=2;
  ctx.strokeRect(8, 24, 50, 60); ctx.strokeRect(18, 0, 28, 28);
  ctx.restore();
}

// ===== SCHNITZEL ENDING — ~30 sec cutscene =====
const SchnitzelEnding = {
  t: 0, stage: 0, badnerStarted: false,
  start(){
    this.t = 0; this.stage = 0; this.badnerStarted = false;
    Game.state = 'SCHNITZEL_ENDING';
    Game.endingShown = true;
    Audio.setTrack('mutschelbach');
  },
  update(dt){
    this.t += dt;
    // mir_sin_alle ending — credits-only screen, the new B10 already showed steps
    if (Game.endingType === 'mir_sin_alle'){
      if (this.t > 4 && (Input.pressed.jump || Input.pressed.respect || Input.touchJump)){
        restartGame();
      }
      return;
    }
    // Original 11-stage Schnitzel ending — Florida → Stuttgart → S11 → home
    const stages = [3, 3, 3, 3, 2, 2, 3, 2, 3, 4, 5];
    let acc = 0;
    for (let i=0;i<stages.length;i++){
      acc += stages[i];
      if (this.t < acc){ this.stage = i; break; }
      this.stage = i + 1;
    }
    // Trigger Badnerlied at stage 9 (door opens) if cassette
    if (!this.badnerStarted && this.stage >= 9 && Game.endingType === 'schnitzel_badnerlied'){
      this.badnerStarted = true;
      Audio.setTrack('badnerlied');
    }
    // After credits roll, restart on input
    if (this.stage >= stages.length-1 && this.t > 26 && (Input.pressed.jump || Input.pressed.respect || Input.touchJump)){
      restartGame();
    }
  },
  draw(){
    // mir_sin_alle — Bin Run on the Fachwerk steps, credits over the village.
    if (Game.endingType === 'mir_sin_alle'){
      const grd = ctx.createLinearGradient(0,0,0,CFG.H);
      grd.addColorStop(0, '#3a4a7a'); grd.addColorStop(1, '#ff8a4a');
      ctx.fillStyle = grd; ctx.fillRect(0,0,CFG.W,CFG.H);
      ctx.fillStyle='#1a2820';
      ctx.fillRect(0, CFG.GROUND_Y-30, CFG.W, CFG.H);
      // Fachwerk silhouette
      ctx.fillStyle='#2a1a10';
      ctx.fillRect(CFG.W*0.3, 280, CFG.W*0.4, 200);
      // Door
      ctx.fillStyle='#5a3018'; ctx.fillRect(CFG.W*0.45, 380, 80, 100);
      ctx.fillStyle='#ffd633'; ctx.beginPath(); ctx.arc(CFG.W*0.51, 430, 4, 0, Math.PI*2); ctx.fill();
      // Achievement banner
      ctx.fillStyle='#ffd633'; ctx.font='bold 26px Bangers, sans-serif'; ctx.textAlign='center';
      ctx.fillText('MIR SIN ALLE MUTSCHELBACHER.', CFG.W/2, 100);
      ctx.fillStyle='#fff'; ctx.font='bold 18px Bangers, sans-serif';
      ctx.fillText('SOGAR DIE SCHWAPES.', CFG.W/2, 134);
      // Run summary
      ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"';
      const lines = [
        `Lifetime Aura: ${Save.data.lifetimeAura}`,
        `Transgressionen: ${Game.transgressionsCount}`,
        `Honeycutt-Settlement: $${(Game.honeycuttOffer||0).toLocaleString('de-DE')}`,
        Game.cassette ? '♪ Das Badnerlied ♪' : '(Stille — keine Cassette)',
      ];
      for (let i=0;i<lines.length;i++) ctx.fillText(lines[i], CFG.W/2, 200+i*20);
      // verification
      const seed = `${(Save.data.lifetimePlayTime|0)}|${Game.transgressionRevenue}|${Save.data.lifetimeAura}|${Game.honeycuttOffer||0}`;
      let h = 0; for (let i=0;i<seed.length;i++) h = (h*131 + seed.charCodeAt(i))>>>0;
      const code = h.toString(36).slice(0,4).toUpperCase();
      ctx.fillStyle='#ffd633'; ctx.fillText('VERIFICATION ' + code, CFG.W/2, CFG.H-60);
      if (this.t > 4){
        ctx.fillStyle='#fff'; ctx.font='9px "Press Start 2P"';
        ctx.fillText('[SPACE / TIPPEN] für Neustart', CFG.W/2, CFG.H-30);
      }
      return;
    }
    // Sky/scene by stage. Simple layered painting.
    const s = this.stage;
    if (s === 0){
      // 1) plane, window seat. View Florida palms.
      ctx.fillStyle='#3aa3ff'; ctx.fillRect(0,0,CFG.W,CFG.H);
      // window frame
      ctx.fillStyle='#aaa'; ctx.fillRect(CFG.W*0.1, CFG.H*0.1, CFG.W*0.8, CFG.H*0.8);
      ctx.fillStyle='#fff'; ctx.fillRect(CFG.W*0.12, CFG.H*0.12, CFG.W*0.76, CFG.H*0.76);
      // view: palms on ground
      ctx.fillStyle='#cae8ff'; ctx.fillRect(CFG.W*0.12, CFG.H*0.12, CFG.W*0.76, CFG.H*0.5);

const BOSS_CLASSES = [B1_Zeugnis, B2_Clique, B3_Drexler, B4_Polizei, B5_Rudolf, B6_Schwarzwald, B7_Mutter];

// ===== ENCOUNTERS =====
const Encounter = {
  active: null,
  start(name){
    Game.inEncounter = true;
    Game.state = 'ENCOUNTER';
    const cls = ENCOUNTER_CLASSES[name];
    if (!cls){ Game.inEncounter = false; Game.state='PLAY'; return; }
    this.active = new cls();
    this.active.init();
    HUD.note(`!! ${this.active.title} !!`, '#88ccff');
  },
  end(reward){
    if (!this.active) return;
    Game.baseScore += reward;
    HUD.note(`+${reward} — überlebt!`, '#88ccff');
    this.active = null;
    Game.inEncounter = false;
    Game.state = 'PLAY';
    Game.encounterCooldown = rand(45, 75);
  },
  update(dt){ if (this.active) this.active.update(dt); },
  draw(){ if (this.active) this.active.draw(); },
};

class EncBase {
  constructor(){ this.t=0; this.done=false; this.title='ENCOUNTER'; this.duration=15; }
  init(){}
  update(dt){
    this.t += dt;
    Player.update(dt);
    Vape.update(dt);
    Krass.update(dt, false);
  }
  draw(){}
}

// FRAU HERTA
class E_Herta extends EncBase {
  constructor(){ super(); this.title='FRAU HERTA'; this.duration=12; }
  init(){
    this.bubbleI = 0; this.bubbleT = 2.5;
    this.phoneRingT = -1;
    this.escapeWindow = 0;
    this.slowMul = 1;
  }
  update(dt){
    super.update(dt);
    this.bubbleT -= dt;
    if (this.bubbleT <= 0){
      this.slowMul *= 0.95;
      Game.speed *= 0.97;
      this.bubbleI++;
      if (this.bubbleI >= HERTA_BUBBLES.length){
        this.done = true;
        Encounter.end(500);
        return;
      }
      this.bubbleT = 3.0;
    }
    // phone ring random window
    if (this.phoneRingT < 0 && Math.random() < 0.5*dt){
      this.phoneRingT = 0; this.escapeWindow = 3;
    }
    if (this.escapeWindow > 0){
      this.escapeWindow -= dt;
      if (Input.pressed.jump || Input.pressed.right){
        this.done = true; Encounter.end(500); return;
      }
      if (this.escapeWindow <= 0) this.phoneRingT = -1;
    }
    // vape in face
    if (Input.pressed.vape && this.bubbleI > 0){
      Krass.add(300, 'INS GESICHT GEDAMPFT');
      this.bubbleT = 3;
    }
  }
  draw(){
    ctx.fillStyle='rgba(120,40,60,0.25)'; ctx.fillRect(0,0,CFG.W,CFG.H);
    // Herta behind Gartentor
    const hx = CFG.W*0.66, hy = CFG.GROUND_Y-130;
    // Gartentor
    ctx.strokeStyle='#fff'; ctx.lineWidth=3;
    for (let i=0;i<8;i++){ ctx.fillStyle='#fff'; ctx.fillRect(hx-50+i*16, hy+30, 6, 100); }
    // Herta
    ctx.fillStyle='#5a8a5a'; ctx.fillRect(hx, hy+20, 50, 80);
    ctx.fillStyle='#f4c896'; ctx.fillRect(hx+10, hy-10, 30, 30);
    ctx.fillStyle='#aaaaaa'; ctx.fillRect(hx+8, hy-12, 34, 8);
    ctx.fillStyle='#000'; ctx.fillRect(hx+16, hy+0, 4,4); ctx.fillRect(hx+30, hy+0, 4,4);
    // Wischmopp
    ctx.fillStyle='#a08550'; ctx.fillRect(hx+58, hy+30, 4, 70);
    ctx.fillStyle='#dddddd'; ctx.fillRect(hx+50, hy+95, 20, 8);
    // bubble
    if (this.bubbleI < HERTA_BUBBLES.length) drawBubble(CFG.W*0.4, 100, HERTA_BUBBLES[this.bubbleI], 11);
    if (this.escapeWindow > 0){
      drawBubble(CFG.W*0.35, 60, '☎ TELEFON KLINGELT — JUMP zum Entkommen!', 10);
    }
  }
}

class E_Pfarrer extends EncBase {

// GRILLMEISTER
class E_Grill extends EncBase {
  constructor(){ super(); this.title='DER GRILLMEISTER'; }
  init(){
    this.wurst = []; this.kasten = {x:CFG.W-200, y:CFG.GROUND_Y-50, w:50, h:50, hp:3};
    this.spawnT = 0;
    this.duration = 25;
  }
  update(dt){
    super.update(dt);
    this.spawnT -= dt;
    if (this.spawnT <= 0){
      this.wurst.push({x:CFG.W, y:CFG.GROUND_Y-180, vx:-260, vy:-250, w:30, h:14, homing:Math.random()<0.2});
      this.spawnT = rand(1.0, 2.0);
    }
    const hb = Player.hb();
    for (let i=this.wurst.length-1;i>=0;i--){
      const w = this.wurst[i];
      if (w.homing){
        const dx = (Player.x+30) - w.x, dy = Player.y - w.y;
        const d = Math.hypot(dx,dy);
        w.vx += (dx/d)*120*dt; w.vy += (dy/d)*120*dt;
      }
      w.x += w.vx*dt; w.y += w.vy*dt; w.vy += 400*dt;
      if (w.y > CFG.GROUND_Y || w.x < -50) { this.wurst.splice(i,1); continue; }
      if (aabb(hb, {x:w.x, y:w.y, w:w.w, h:w.h})){
        Player.hit(15, w.homing?'MAULTASCHE':'BRATWURST');
        this.wurst.splice(i,1);
      }
    }
    // jump on Bierkasten
    if (aabb(hb, {x:this.kasten.x, y:this.kasten.y, w:this.kasten.w, h:this.kasten.h}) && Player.vy > 100){
      this.kasten.hp = 0; Player.vy = -500;
      this.done = true;
      comicBurst(this.kasten.x, this.kasten.y, 'PROST!');
      HUD.note('"Mein Bier..."', '#ffd633');
      Encounter.end(800);
      return;
    }
    if (this.t > this.duration) { this.done=true; Encounter.end(400); }
  }
  draw(){
    ctx.fillStyle='rgba(255,160,80,0.2)'; ctx.fillRect(0,0,CFG.W,CFG.H);
    // Grill
    const gx = CFG.W*0.78, gy = CFG.GROUND_Y - 130;
    ctx.fillStyle='#5a3520'; ctx.fillRect(gx-10, gy+20, 80, 80);
    ctx.fillStyle='#222'; ctx.fillRect(gx, gy, 60, 24);
    ctx.fillStyle='#ff5500'; ctx.fillRect(gx+4, gy-4, 52, 6);
    // Grillmeister
    ctx.fillStyle='#fff'; ctx.fillRect(gx-50, gy+20, 30, 60);
    ctx.fillStyle='#d33'; ctx.fillRect(gx-48, gy+22, 26, 14);
    ctx.fillStyle='#fff'; ctx.font='6px "Press Start 2P"'; ctx.textAlign='center'; ctx.fillText('GRILLKÖNIG', gx-35, gy+32);
    ctx.fillStyle='#f4c896'; ctx.fillRect(gx-44, gy-10, 18, 22);
    ctx.fillStyle='#000'; ctx.fillRect(gx-40, gy-2, 3,3); ctx.fillRect(gx-32, gy-2, 3,3);
    drawBubble(gx-200, gy-50, 'Hier wird GEGRILLT!', 10);
    // Bierkasten
    if (this.kasten.hp > 0){
      const kx = this.kasten.x;
      ctx.fillStyle='#fce04a'; ctx.fillRect(kx, this.kasten.y, this.kasten.w, this.kasten.h);
      ctx.strokeStyle='#000'; ctx.strokeRect(kx, this.kasten.y, this.kasten.w, this.kasten.h);
      ctx.fillStyle='#fff'; ctx.font='6px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText('BIER', kx+25, this.kasten.y+30);
    }
    // Würste
    for (const w of this.wurst){
      ctx.save();
      ctx.translate(w.x, w.y);
      ctx.rotate(Math.atan2(w.vy, w.vx));
      ctx.fillStyle = w.homing?'#cca85a':'#a85a30';
      ctx.fillRect(-15,-7,30,14);
      ctx.strokeStyle='#000'; ctx.strokeRect(-15,-7,30,14);
      ctx.restore();
    }
  }
}

// BUSHALTESTELLE-PERFORMANCE
class E_Bus extends EncBase {
  constructor(){ super(); this.title='BUSHALTESTELLE'; }
  init(){
    this.beat = 0; this.beatT = 0; this.successes=0; this.target=8;
    this.tricks = ['heart','ring','alda','finger'];
  }
  update(dt){
    super.update(dt);
    this.beatT += dt;
    const beatPeriod = 0.7;
    const inWindow = (this.beatT % beatPeriod) > beatPeriod-0.25;
    if (Input.pressed.vape || Input.pressed.jump){
      if (inWindow){
        this.successes++;
        const trick = this.tricks[this.successes % this.tricks.length];
        const word = trick==='alda'?'ALDA':trick==='finger'?'🖕':null;
        vapeCloud(Player.x+30, Player.y-30, word);
        Krass.add(80, 'TRICK WAHLLAH');
        comicBurst(Player.x+30, Player.y-50, 'KRASS!');
        if (this.successes >= this.target){
          this.done = true; Krass.add(2000, 'BUSHALTESTELLE GOAT');
          HUD.note('Realschüler: "Wahllah, krass digga!"', '#ffd633');
          Encounter.end(1500); return;
        }
      } else {
        Krass.add(-500, 'L, HART CRINGE');
        HUD.note('Justin DM: "Hart L. Raff dich, Brudi."', '#ff5050');
      }
    }
    if (this.t > 15) { this.done=true; Encounter.end(0); }
  }
  draw(){
    // Wartehäuschen
    const wx = CFG.W*0.7, wy = CFG.GROUND_Y - 130;
    ctx.fillStyle='rgba(160,180,200,0.3)';
    ctx.fillRect(wx, wy, 200, 130);
    ctx.fillStyle='#888'; ctx.fillRect(wx, wy, 200, 16);
    // 3 Realschüler
    for (let i=0;i<3;i++){
      ctx.fillStyle = ['#222','#444','#a52'][i];
      ctx.fillRect(wx+30+i*50, wy+50, 30, 60);
      ctx.fillStyle='#f4c896'; ctx.fillRect(wx+34+i*50, wy+30, 22, 22);
      ctx.fillStyle='#000'; ctx.fillRect(wx+38+i*50, wy+38, 3,3); ctx.fillRect(wx+50+i*50, wy+38, 3,3);
    }
    // beat indicator
    const beatPeriod = 0.7;
    const phase = (this.beatT % beatPeriod) / beatPeriod;
    const inWindow = phase > 1 - 0.25/beatPeriod;
    ctx.fillStyle = inWindow ? '#7fff7f' : '#fff';
    ctx.fillRect(CFG.W*0.5 - 100, 130, 200, 12);
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(CFG.W*0.5 - 100 + 200*phase - 4, 124, 8, 24);
    ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"'; ctx.textAlign='center';
    ctx.strokeStyle='#000'; ctx.lineWidth=3;
    const s = `[V/JUMP] BEAT! ${this.successes}/${this.target}`;
    ctx.strokeText(s, CFG.W*0.5, 110); ctx.fillText(s, CFG.W*0.5, 110);
  }
}

  update(dt){
    super.update(dt);
    const heldNow = Input.keys.jump || Input.touchJump || Input.keys.vape;
    this.holding = heldNow;
    if (heldNow){
      this.holdT += dt;
      this.polizeiT += dt;
      Vape.v = Math.max(0, Vape.v - 4*dt);
      if (Math.random() < 0.4) spawnParticle({x:Player.x+50, y:Player.y+30, vx:rand(-30,30), vy:rand(-20,20), size:rand(2,5), color:'#ff66ff', life:0.5, maxLife:0.5});
      if (this.polizeiT >= 5){
        this.busted = true;
        HUD.note('POLIZEI! YALLAH WEG!', '#ff3030');
        Boss.start(3); // trigger Polizei (idx 3)
        this.done=true; Encounter.end(0); return;
      }
    } else {
      // released — finalize
      if (this.holdT > 0.3){
        let krass=0, tag='';
        if (this.holdT < 1.5){ krass=100; tag='BIN RUN'; }
        else if (this.holdT < 2.5){ krass=300; tag='BIN RUN 04'; }
        else if (this.holdT < 3.5){ krass=600; tag='BIN RUN WAR HIER'; }
        else { krass=1500; tag='SHVAPE GANG 4 LIFE'; }
        Krass.add(krass, `TAG: ${tag}`);
        comicBurst(Player.x+50, Player.y-30, 'TAG!');
        Game.baseScore += krass*2;
        this.done = true; Encounter.end(krass);
        return;
      }
      if (this.t > 8) { this.done=true; Encounter.end(0); }
    }
  }
  draw(){
    // Underpass wall
    ctx.fillStyle='rgba(80,80,100,0.5)'; ctx.fillRect(0,0,CFG.W, CFG.GROUND_Y);
    ctx.fillStyle='#a8a8a8'; ctx.fillRect(0, CFG.GROUND_Y-300, CFG.W, 300);
    // existing tags
    ctx.fillStyle='#444'; ctx.font='bold 22px Bangers, sans-serif';
    ctx.fillText('MURAT KA', 80, 200); ctx.fillText('JD ❤ ML', 400, 230);
    // tag in progress
    let tag='';
    if (this.holdT < 1.5) tag='BIN RUN';
    else if (this.holdT < 2.5) tag='BIN RUN 04';
    else if (this.holdT < 3.5) tag='BIN RUN WAR HIER';
    else tag='SHVAPE GANG 4 LIFE';
    if (this.holdT > 0.3){
      ctx.save();
      ctx.fillStyle='#ff66ff';
      ctx.font=`bold ${24 + this.holdT*8}px Bangers, sans-serif`;
      ctx.textAlign='center'; ctx.strokeStyle='#000'; ctx.lineWidth=4;
      const tx = Player.x + 100, ty = 200;
      ctx.strokeText(tag, tx, ty); ctx.fillText(tag, tx, ty);
      ctx.restore();
    }
    // hold meter
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(CFG.W*0.15, 100, CFG.W*0.7, 60);
    ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"'; ctx.textAlign='center';
    ctx.fillText('[JUMP/V HALTEN] länger = krasser, aber POLIZEI kommt!', CFG.W*0.5, 122);
    // hold bar
    ctx.fillStyle='#444'; ctx.fillRect(CFG.W*0.18, 134, CFG.W*0.64, 16);
    const fill = clamp(this.polizeiT/5, 0, 1);
    ctx.fillStyle = this.polizeiT>4 ? '#ff3030' : this.polizeiT>3 ? '#ffaa30' : '#88ff88';
    ctx.fillRect(CFG.W*0.18, 134, CFG.W*0.64*fill, 16);
    if (this.polizeiT > 3.5){
      ctx.fillStyle='#ff3030'; ctx.font='12px "Press Start 2P"';
      ctx.fillText('POLIZEI NÄHERT SICH!', CFG.W*0.5, 178);
    }
  }
}

// === HOSSEINI HAUSHALT — rare encounter (~1 in 8 runs) ===
// Bin Run enters the Hosseini family home. Reis, Kebab, Baklava, Tee. Cannot
// decline. The provincial joke: this respectable household is, by village
// reckoning, more "from here" than the Schwape family despite Chantal being
// first-generation. Aura drops to 0 inside (being seen as well-mannered is
// the opposite of cool). On exit: permanent +20 Aura floor for the rest of
// the run AND a Chantal-trust boost.
class E_HosseiniHaushalt extends EncBase {
  constructor(){ super(); this.title='HOSSEINI HAUSHALT'; this.duration = 22; }
  init(){
    this.savedKrass = Krass.v;
    Krass.v = 0;                    // inside the family, you are not cool
    this.dishIdx = 0;
    this.dishT = 3.5;
    this.dishes = [
      {label:'Reis mit Hähnchen', who:'Mama Hosseini', line:'Iss Bin Run, du bist zu schmal.'},
      {label:'Kebab',             who:'Onkel Reza',    line:'Frisch vom Grill. Nimm zwei.'},
      {label:'Baklava',           who:'Oma Hosseini',  line:'Süß. Auch für dich. *kein Widerspruch*'},
      {label:'Tee',               who:'Chantal',       line:'Trink. Sag Mama nix.'},
      {label:'Mehr Tee',          who:'Mama Hosseini', line:'Noch ein Glas. Du bist mager.'},
      {label:'Sehr viel mehr Tee',who:'Oma Hosseini',  line:'Du gehst nicht ohne 4 Glas.'},
    ];
    HUD.note('"Komm rein, Bin Run!"', '#ffd633');
  }
  update(dt){
    super.update(dt);
    this.dishT -= dt;
    if (this.dishT <= 0 && this.dishIdx < this.dishes.length-1){
      this.dishIdx++;
      this.dishT = 3.0;
      Vape.refill(8); // small refill — it's still food
    }
    if (this.t > this.duration && !this.done){
      this.done = true;
      // Permanent floor for the rest of THIS run only
      Game.hosseiniHaushaltDone = true;
      Game.auraFloorThisRun = Math.max(Game.auraFloorThisRun||30, 50);
      Krass.v = Math.max(this.savedKrass, 50);
      Game.chantalTrust = clamp(Game.chantalTrust + 15, 0, 100);

      Save.data.hosseiniVisits = (Save.data.hosseiniVisits||0) + 1;
      Save.save();
      if (typeof Achv !== 'undefined' && Save.data.hosseiniVisits >= 3) Achv.unlock('HOSSEINI_FREUND');
      Encounter.end(1200);

  }
  draw(){
    // Warm interior — kitchen with tea kettle steam, persian carpet
    ctx.fillStyle='#3a2818'; ctx.fillRect(0, 0, CFG.W, CFG.H);
    // Carpet
    ctx.fillStyle='#7a2818'; ctx.fillRect(60, CFG.GROUND_Y-200, CFG.W-120, 220);
    // pattern
    ctx.fillStyle='#caa030';
    for (let yy=CFG.GROUND_Y-180;yy<CFG.GROUND_Y;yy+=24){
      for (let xx=80;xx<CFG.W-100;xx+=24){
        ctx.beginPath(); ctx.arc(xx, yy, 4, 0, Math.PI*2); ctx.fill();
      }
    }
    // Family table
    ctx.fillStyle='#5a3018'; ctx.fillRect(CFG.W*0.35, CFG.GROUND_Y-100, CFG.W*0.3, 24);
    ctx.fillStyle='#caa890'; ctx.fillRect(CFG.W*0.36, CFG.GROUND_Y-104, CFG.W*0.28, 8);
    // Steaming chai pot
    ctx.fillStyle='#222';
    ctx.fillRect(CFG.W*0.55, CFG.GROUND_Y-130, 30, 26);
    ctx.fillStyle='#ffd633';
    ctx.fillRect(CFG.W*0.555, CFG.GROUND_Y-138, 4, 8);
    // steam wisps
    for (let i=0;i<3;i++){
      const sy = CFG.GROUND_Y-150 + Math.sin(this.t*3+i)*8;
      ctx.fillStyle = `rgba(220,220,230,${0.5-i*0.1})`;
      ctx.beginPath(); ctx.arc(CFG.W*0.56 + i*4, sy, 6-i, 0, Math.PI*2); ctx.fill();
    }
    // Family figures around the table — minimal silhouettes
    const seats = [
      {x:CFG.W*0.30, color:'#cba88c'}, // Mama Hosseini
      {x:CFG.W*0.42, color:'#a83020'}, // Onkel Reza
      {x:CFG.W*0.56, color:'#3a2818'}, // Oma Hosseini (dunkles Kopftuch)
      {x:CFG.W*0.68, color:'#d3a'},    // Chantal Hosseini
    ];
    for (const s of seats){
      ctx.fillStyle = s.color;
      ctx.fillRect(s.x, CFG.GROUND_Y-180, 30, 70);
      ctx.fillStyle='#cba88c'; ctx.fillRect(s.x+4, CFG.GROUND_Y-200, 22, 22);
      ctx.fillStyle='#000'; ctx.fillRect(s.x+10, CFG.GROUND_Y-190, 3,3);
      ctx.fillRect(s.x+18, CFG.GROUND_Y-190, 3,3);
      ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.strokeRect(s.x+4, CFG.GROUND_Y-200, 22, 22);
    }
    // Current dish bubble
    const d = this.dishes[this.dishIdx];
    drawBubble(CFG.W*0.18, 80, `${d.who}: ${d.line}`, 11);
    // Plate counter
    ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"'; ctx.textAlign='center';
    ctx.strokeStyle='#000'; ctx.lineWidth=3;
    const s = `Gericht ${this.dishIdx+1}/${this.dishes.length}: ${d.label}`;
    ctx.strokeText(s, CFG.W/2, 130); ctx.fillText(s, CFG.W/2, 130);
    // AURA = 0 hint
    ctx.fillStyle='#ffd633'; ctx.font='9px "Press Start 2P"';
    ctx.fillText('In dieser Wohnung gibt\'s keine Aura. Nur Tee.', CFG.W/2, 156);
  }
}
