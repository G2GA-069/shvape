function drawBubble(x,y,text,size){
  size = size||10;
  ctx.font = `${size}px "Press Start 2P", monospace`;
  const w = ctx.measureText(text).width + 14;
  const h = size + 12;
  ctx.fillStyle='#fff';
  ctx.strokeStyle='#000'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(x, y); ctx.lineTo(x+w, y); ctx.lineTo(x+w, y+h); ctx.lineTo(x+12, y+h); ctx.lineTo(x+8, y+h+6); ctx.lineTo(x+8, y+h); ctx.lineTo(x, y+h); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.fillStyle='#000'; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillText(text, x+6, y+5);
}

// ===== OBSTACLES & PICKUPS =====
const Entities = []; // dynamic obstacles + pickups
const OBSTACLE_TYPES = ['misthaufen','igel','traktor','bierbank','strommast','s11car','gartenzwerg'];

function spawnObstacle(type, xRel){
  const x = Game.scrollX + CFG.W + (xRel||rand(60,200));
  let e = {x, y:0, w:0, h:0, type, hostile:true, alive:true, animT:0};
  if (type==='misthaufen'){
    e.w=70; e.h=44; e.y=CFG.GROUND_Y-44;
    e.fly = {a:Math.random()*Math.PI*2};
  } else if (type==='igel'){
    e.w=42; e.h=26; e.y=CFG.GROUND_Y-26;
  } else if (type==='traktor'){
    e.w=130; e.h=70; e.y=CFG.GROUND_Y-70;
  } else if (type==='bierbank'){
    e.w=100; e.h=34; e.y=CFG.GROUND_Y-34;
  } else if (type==='strommast'){
    e.w=80; e.h=10; e.y=CFG.GROUND_Y-150; // overhead cable -> must duck
    e.duck = true;
  } else if (type==='s11car'){
    e.w=180; e.h=80; e.y=CFG.GROUND_Y-80;
  } else if (type==='gartenzwerg'){
    e.w=24; e.h=22; e.y=CFG.GROUND_Y-22;
  }
  Entities.push(e);
}
function spawnPickup(type, xRel){
  const x = Game.scrollX + CFG.W + (xRel||rand(60,200));
  const y = CFG.GROUND_Y - rand(80, 200);
  const e = {x, y, w:30, h:30, type, pickup:true, alive:true, animT:0};
  if (type==='vape-pod'){
    // Weighted flavor draw — common ones common, rare ones rare. Spätzle
    // is cursed and intentionally rare so it's a "what just happened?" moment.
    const r = Math.random();
    if      (r < 0.30) e.flavor = 'erdbeer';
    else if (r < 0.45) e.flavor = 'bubblegum';
    else if (r < 0.58) e.flavor = 'tabak';
    else if (r < 0.70) e.flavor = 'wassermelone';
    else if (r < 0.82) e.flavor = 'energy';
    else if (r < 0.90) e.flavor = 'mystery';
    else if (r < 0.97) e.flavor = 'heiliger_hauch';
    else               e.flavor = 'spaetzle';
  }
  Entities.push(e);
}

// Obstacle spawn director
const Director = {
  nextSpawn: 1.2,
  firstSpawnDone: false,
  update(dt){
    if (Game.inBoss || Game.inEncounter || Game.state!=='PLAY') return;
    this.nextSpawn -= dt;
    if (this.nextSpawn <= 0){
      // first obstacle is ALWAYS misthaufen with fly
      if (!this.firstSpawnDone){
        spawnObstacle('misthaufen', 200);
        this.firstSpawnDone = true;
        this.nextSpawn = rand(1.4, 2.0);
        return;
      }
      // pickup or obstacle
      const r = Math.random();
      if (r < 0.18) spawnPickup('vape-pod');
      else if (r < 0.24) spawnPickup('energy');
      else if (r < 0.34) spawnPickup('pfand');
      else {
        const t = choice(OBSTACLE_TYPES);
        spawnObstacle(t);
      }
      // density scales with time
      this.nextSpawn = rand(0.8, 1.6) - Math.min(0.5, Game.realT/600);
    }
  }
};

function updateEntities(dt){
  for (let i=Entities.length-1;i>=0;i--){
    const e = Entities[i];
    e.animT += dt;
    // off-screen left = remove
    if (e.x - Game.scrollX < -200) { Entities.splice(i,1); continue; }
    if (!e.alive) { Entities.splice(i,1); continue; }

    // === PICKUP MAGNETISM ===
    // Pods/Energy/Pfand drift toward Bin Run when within ~140px of him.
    // Feels generous, makes the player feel "lucky", and naturally rewards
    // jumping at the right moment.
    if (e.pickup && e.alive && Player.alive){
      const ex = e.x - Game.scrollX;
      const dx = (Player.x + Player.w/2) - ex;
      const dy = (Player.y + Player.h/2) - e.y;
      const d = Math.hypot(dx, dy);
      if (d > 0 && d < 140){
        const pull = (1 - d/140) * 320 * dt;   // stronger when closer
        e.x += (dx/d)*pull;
        e.y += (dy/d)*pull;
      }
    }

    // collision with player
    const hb = Player.hb();
    const eb = {x:e.x - Game.scrollX, y:e.y, w:e.w, h:e.h};
    if (Player.alive && aabb(hb, eb)){
      if (e.pickup){
        e.alive = false;
        if (e.type==='vape-pod'){
          // VAPE_TROCKEN mutation doubles refill on Pod pickups
          const podMul = (typeof Mutation !== 'undefined' && Mutation.podMul) ? Mutation.podMul() : 1;
          Vape.refill(50 * podMul); Game.baseScore += 50;
          comicBurst(e.x - Game.scrollX, e.y, 'POD!');
          Audio.itemFound(); sparkle(e.x - Game.scrollX, e.y);
          if (navigator.vibrate) navigator.vibrate(20);
          Game.combo = Math.min(10, Game.combo+1); Game.comboTimer = 4;
          Vape.setFlavor(e.flavor);
          if (e.flavor==='mystery'){ HUD.note('Mystery Geschmack — Steuerung invertiert!', '#ff66ff'); }
          else if (e.flavor==='bubblegum') HUD.note('Bubblegum — leichter Sprung', '#88c0e0');
          else if (e.flavor==='tabak') HUD.note('Tabak Klassik — Bonus', '#aaa');
          // POD_LORD achievement (100 pods lifetime)
          Save.data.podsLifetime = (Save.data.podsLifetime||0) + 1;
          Save.save();
          if (typeof Achv !== 'undefined' && Save.data.podsLifetime >= 100) Achv.unlock('POD_LORD');
        } else if (e.type==='energy'){
          Game.baseScore += 100;
          Player.invuln = Math.max(Player.invuln, 2);
          comicBurst(e.x - Game.scrollX, e.y, 'PUSH!');
          Audio.pickup(); sparkle(e.x - Game.scrollX, e.y);
          Game.combo = Math.min(10, Game.combo+1); Game.comboTimer = 4;
        } else if (e.type==='pfand'){
          // PFAND_TAG mutation doubles pfand value; TABAK flavor adds ×1.5
          let pfMul = (typeof Mutation !== 'undefined' && Mutation.pfandMul) ? Mutation.pfandMul() : 1;
          if (Vape.flavor === 'tabak' && Vape.flavorTimer > 0) pfMul *= 1.5;
          Game.baseScore += Math.floor(25 * pfMul);
          Audio.pickup(); sparkle(e.x - Game.scrollX, e.y);
          Game.combo = Math.min(10, Game.combo+1); Game.comboTimer = 4;
          Save.data.pfandLifetime = (Save.data.pfandLifetime||0) + 1;
          Save.save();
          if (typeof Achv !== 'undefined' && Save.data.pfandLifetime >= 50) Achv.unlock('PFAND_MEISTER');
        }
      } else {
        // obstacle hit
        if (e.type==='strommast' && Player.ducking) { /* OK, ducked under cable */ }
        else {
          // Only credit Aura / fire comic burst if the hit actually lands.
          // Player.hit() short-circuits during the 1-sec invuln window, but we
          // used to call Krass.add() unconditionally — that stacked +150 AURA
          // every frame of overlap for an entire second.
          const hitLanded = Player.invuln <= 0;
          Player.hit(20, e.type);
          if (hitLanded){
            if (e.type==='bierbank') Krass.add(150, 'BIERBANK ZERLEGT, BRUDI');
            if (e.type==='misthaufen' && Krass.tier()>=2) Krass.add(200, 'MIST GEYEETET');
            if (e.type==='gartenzwerg') Krass.add(100, 'GARTENZWERG GEYEETET, SHEESH');
            comicBurst(Player.x + 30, Player.y, choice(COMIC_SFX));
          }
        }
      }
    }
    // dodged cleanly: detect when entity passed player without hitting
    if (!e.dodged && !e.pickup && (e.x - Game.scrollX) + e.w < Player.x){
      e.dodged = true;
      Game.baseScore += 200;
      Game.combo = Math.min(10, Game.combo+1); Game.comboTimer = 3;
    }
  }
  // combo decay
  Game.comboTimer -= dt;
  if (Game.comboTimer <= 0) Game.combo = 1;
}

function drawEntities(){
  for (const e of Entities){
    const x = e.x - Game.scrollX;
    if (x < -100 || x > CFG.W + 50) continue;
    // Drop-shadow on the ground so obstacles pop off the playfield
    if (!e.pickup){
      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.beginPath();
      ctx.ellipse(x + e.w/2, CFG.GROUND_Y + 4, e.w*0.45, 5, 0, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.save();
    if (e.type==='misthaufen'){
      ctx.fillStyle='#5a3a14';
      ctx.beginPath(); ctx.ellipse(x+e.w/2, e.y+e.h-4, e.w/2, e.h*0.7, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#3a2310';
      ctx.beginPath(); ctx.ellipse(x+e.w/2, e.y+e.h-10, e.w/2.5, e.h*0.5, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle='#000'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.ellipse(x+e.w/2, e.y+e.h-4, e.w/2, e.h*0.7, 0, 0, Math.PI*2); ctx.stroke();
      // straw
      ctx.strokeStyle='#a86a20'; ctx.lineWidth=1.5;
      for (let i=0;i<5;i++){
        ctx.beginPath();
        ctx.moveTo(x+10+i*12, e.y+e.h-12);
        ctx.lineTo(x+10+i*12+rand(-3,3), e.y+e.h-22);
        ctx.stroke();
      }
      // fly
      const fa = e.fly.a + e.animT*4;
      const fx = x+e.w/2 + Math.cos(fa)*18, fy = e.y - 6 + Math.sin(fa*1.7)*6;
      ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(fx, fy, 1.5, 0, Math.PI*2); ctx.fill();
    } else if (e.type==='igel'){
      ctx.fillStyle='#7a5a30';
      ctx.beginPath(); ctx.ellipse(x+e.w/2, e.y+e.h-4, e.w/2, e.h*0.7, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle='#000'; ctx.lineWidth=1.5; ctx.stroke();
      // spikes
      ctx.strokeStyle='#000'; ctx.lineWidth=1;
      for (let i=0;i<10;i++){
        const a = -Math.PI + i*(Math.PI/10);
        const sx = x+e.w/2 + Math.cos(a)*e.w*0.4, sy = e.y+e.h-4 + Math.sin(a)*e.h*0.5;
        const ex = x+e.w/2 + Math.cos(a)*e.w*0.55, ey = e.y+e.h-4 + Math.sin(a)*e.h*0.7;
        ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(ex,ey); ctx.stroke();
      }
      // face
      ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(x+5, e.y+e.h-12, 2,0,Math.PI*2); ctx.fill();
    } else if (e.type==='traktor'){
      ctx.fillStyle='#1ea84a'; ctx.fillRect(x+10, e.y+10, 110, 40);
      ctx.fillStyle='#fce04a'; ctx.fillRect(x+30, e.y, 60, 14);
      ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(x+25, e.y+e.h-10, 14, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+105, e.y+e.h-10, 22, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle='#000'; ctx.lineWidth=1.5; ctx.strokeRect(x+10, e.y+10, 110, 40);
    } else if (e.type==='bierbank'){
      ctx.fillStyle='#fce04a'; ctx.fillRect(x, e.y, e.w, 8);
      ctx.fillStyle='#222'; ctx.fillRect(x+10, e.y+8, 6, 26); ctx.fillRect(x+e.w-16, e.y+8, 6, 26);
      ctx.strokeStyle='#000'; ctx.strokeRect(x, e.y, e.w, 8);
    } else if (e.type==='strommast'){
      // pole and cable overhead
      ctx.strokeStyle='#444'; ctx.lineWidth=4;
      ctx.beginPath(); ctx.moveTo(x, e.y); ctx.lineTo(x+e.w, e.y); ctx.stroke();
      ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.stroke();
      ctx.fillStyle='#000'; ctx.fillRect(x-4, e.y-4, 6, e.h+10);
      ctx.fillRect(x+e.w-2, e.y-4, 6, e.h+10);
    } else if (e.type==='s11car'){
      ctx.fillStyle='#fce04a'; ctx.fillRect(x, e.y, e.w, e.h*0.7);
      ctx.fillStyle='#0a7a2a'; ctx.fillRect(x, e.y+e.h*0.7, e.w, e.h*0.15);
      ctx.fillStyle='#88c0e0'; for (let i=0;i<4;i++) ctx.fillRect(x+10+i*40, e.y+8, 28, 18);
      ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(x+30, e.y+e.h-8, 10, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+e.w-30, e.y+e.h-8, 10, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle='#000'; ctx.lineWidth=1.5; ctx.strokeRect(x, e.y, e.w, e.h*0.7);
    } else if (e.type==='gartenzwerg'){
      ctx.fillStyle='#c93030';
      ctx.beginPath(); ctx.moveTo(x, e.y+e.h); ctx.lineTo(x+e.w/2, e.y); ctx.lineTo(x+e.w, e.y+e.h); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#f4c896'; ctx.fillRect(x+4, e.y+8, e.w-8, 8);
      ctx.fillStyle='#fff'; ctx.fillRect(x+4, e.y+14, e.w-8, 4);
      ctx.fillStyle='#1864c0'; ctx.fillRect(x+2, e.y+e.h-6, e.w-4, 6);
      ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.strokeRect(x+2, e.y+8, e.w-4, e.h-8);
    }
    // pickups
    else if (e.type==='vape-pod'){
      const bob = Math.sin(e.animT*4)*3;
      ctx.translate(x, e.y+bob);
      const flavorColor = e.flavor==='erdbeer'?'#ff6699':e.flavor==='bubblegum'?'#66ccff':e.flavor==='tabak'?'#888':`hsl(${(e.animT*150)%360},80%,60%)`;
      ctx.fillStyle = flavorColor;
      ctx.fillRect(0,0, 24, 30);
      ctx.fillStyle='#222'; ctx.fillRect(0,-6,24,8);
      ctx.strokeStyle='#000'; ctx.lineWidth=1.5; ctx.strokeRect(0,-6,24,36);
      ctx.fillStyle='#fff'; ctx.font='6px "Press Start 2P"'; ctx.fillText('POD', 2, 18);
      // halo
      ctx.strokeStyle = `rgba(255,200,80,${0.6+Math.sin(e.animT*8)*0.3})`;
      ctx.lineWidth=2; ctx.beginPath(); ctx.arc(12, 14, 22, 0, Math.PI*2); ctx.stroke();
    } else if (e.type==='energy'){
      const bob = Math.sin(e.animT*4)*3;
      ctx.translate(x, e.y+bob);
      ctx.fillStyle='#3030d0'; ctx.fillRect(0,0,28,40);
      ctx.fillStyle='#ffe14a'; ctx.fillRect(2,2,24,10);
      ctx.fillStyle='#ff3030'; ctx.font='bold 8px "Press Start 2P"'; ctx.fillText('!', 12, 28);
      ctx.strokeStyle='#000'; ctx.lineWidth=1.5; ctx.strokeRect(0,0,28,40);
    } else if (e.type==='pfand'){
      const bob = Math.sin(e.animT*4)*3;
      ctx.translate(x, e.y+bob);
      ctx.fillStyle='#88c8a8'; ctx.fillRect(4,4,20,30);
      ctx.fillStyle='#dd0000'; ctx.fillRect(6,6,16,4);
      ctx.fillStyle='#fff'; ctx.font='5px "Press Start 2P"'; ctx.fillText('PFAND', 5, 22);
      ctx.strokeStyle='#000'; ctx.strokeRect(4,4,20,30);
    }
    ctx.restore();
  }
}

function pickInsultLine(kind){
  if (kind && INSULT_LINES_KIND[kind] && Math.random() < 0.55){
    return choice(INSULT_LINES_KIND[kind]);
  }
  return choice(INSULT_LINES_GENERAL);
}

const Insult = {
  cd: 0,
  lockT: 0,
  chain: 0,
  chainTimer: 0,
  pendingTarget: null,
  pendingLine: '',
  pendingResolveT: 0,
  recentLines: [],     // anti-repeat
  // Eligibility — needs Vape ≥ 12, no current cooldown, not in cinematic
  // / aura-locked / mama-call / death state.
  ready(){
    if (this.cd > 0 || this.lockT > 0) return false;
    if (Vape.v < 12) return false;
    if (Game.auraLocked) return false;
    // INSULT is a PLAY-state action only. Bosses + encounters have their
    // own bubble timing; firing inline insults inside them just produces
    // confusion + missed targets (Bg.near is overlay'd during bosses).
    return Game.state === 'PLAY';
  },
  reset(){
    this.cd = 0; this.lockT = 0; this.chain = 0; this.chainTimer = 0;
    this.pendingTarget = null; this.pendingLine = ''; this.pendingResolveT = 0;
    this.recentLines.length = 0;
  },
  // Find nearest visible NPC of a roast-eligible kind. Returns
  // {kind, x, y} in screen-space, or null.
  findTarget(){
    if (!Bg || !Bg.near) return null;
    let best = null, bestD = Infinity;
    const px = Player.x + Player.w/2;
    for (const n of Bg.near){
      if (!n || !n.kind) continue;
      if (!ROAST_KINDS.has(n.kind)) continue;
      const sx = (n.x||0) - Game.scrollX;
      if (sx < 40 || sx > CFG.W - 40) continue;
      const d = Math.abs(sx - px);
      if (d < bestD){ bestD = d; best = {kind:n.kind, x:sx, y:(n.y||CFG.GROUND_Y-100)}; }
    }
    return best;
  },
  fire(){
    if (this.cd > 0 || this.lockT > 0) return false;
    if (Game.auraLocked){
      HUD.note('Aura ist gelockt. Honeycutt hat gewonnen.', '#888');
      return false;
    }
    if (Vape.v < 12){
      HUD.note('Zu wenig Atem für Insults. Erst Vape.', '#ff8a30');
      this.cd = 1.0;
      return false;
    }
    // Daily mutation STILLE: insults are free
    const cost = (typeof Mutation !== 'undefined' && Mutation.insultVapeCost) ? Mutation.insultVapeCost() : 8;
    Vape.v = Math.max(0, Vape.v - cost);
    this.lockT = 0.4;
    const tgt = this.findTarget();
    this.pendingTarget = tgt;
    // Anti-repeat line picker
    let line = pickInsultLine(tgt && tgt.kind), tries = 0;
    while (this.recentLines.includes(line) && tries < 5){ line = pickInsultLine(tgt && tgt.kind); tries++; }
    this.recentLines.push(line);
    if (this.recentLines.length > 8) this.recentLines.shift();
    this.pendingLine = line;
    this.pendingResolveT = 0.4;
    if (!tgt){
      // GEGEN DIE LUFT — small aura penalty, longer cooldown.
      this.cd = 4.0;
      this.chain = 0; this.chainTimer = 0;
    } else {
      // First successful target-acquired insult ever in the run flips off
      // the discovery hint banner.
      Game._insultEverFired = true;
    }
    try{ Audio.sfx && Audio.sfx.triggerAttackRelease('A4','32n'); }catch(e){}
    return true;
  },
  update(dt){
    if (this.cd > 0) this.cd = Math.max(0, this.cd - dt);
    if (this.chainTimer > 0){
      this.chainTimer = Math.max(0, this.chainTimer - dt);
      if (this.chainTimer === 0) this.chain = 0;
    }
    if (this.lockT > 0){
      this.lockT = Math.max(0, this.lockT - dt);
      this.pendingResolveT = Math.max(0, this.pendingResolveT - dt);
      if (this.lockT === 0){
        // Resolve outcome.
        if (this.pendingTarget){
          const witnesses = countWitnesses();
          Game.witnesses = witnesses;
          const regional = REGIONAL_NPC_KIND[this.pendingTarget.kind];
          const regMul = (regional && REGIONAL_PREJUDICE[regional]) ? REGIONAL_PREJUDICE[regional].aura_mult : 1;
          const wMul = witnesses <= 1 ? 1 : (witnesses < 5 ? 1.4 : (witnesses < 20 ? 2.5 : 4));
          const tierMul = 1 + Krass.tier()*0.25;
          const chainMul = 1 + this.chain * 0.4;
          const base = 60;
          // Daily mutation: SCHWOBA_TAG doubles aura on schwoba targets
          let mutMul = (typeof Mutation !== 'undefined' && Mutation.insultRewardMul) ? Mutation.insultRewardMul() : 1.0;
          if (regional === 'schwoba' && Mutation && Mutation.schwobaMul) mutMul *= Mutation.schwobaMul();
          const reward = Math.floor(base * regMul * wMul * tierMul * chainMul * mutMul);
          Krass.add(reward, `INSULT (${this.pendingTarget.kind})`);
          Game.transgressionAuraTotal += reward;
          Game.transgressionsCount++;
          Game.transgressionRevenue += Math.floor(reward * 0.05);
          // Lifetime + per-region trackers
          Save.data.insultsLifetime = (Save.data.insultsLifetime||0) + 1;
          if (regional === 'schwoba') Save.data.schwobaInsultedLifetime = (Save.data.schwobaInsultedLifetime||0) + 1;
          Save.save();
          // Achievements
          if (typeof Achv !== 'undefined'){
            Achv.unlock('ERSTE_BELEIDIGUNG');
            if (Save.data.insultsLifetime >= 100) Achv.unlock('INSULT_100');
            if (Save.data.insultsLifetime >= 1000) Achv.unlock('INSULT_1000');
            if (Save.data.schwobaInsultedLifetime >= 10) Achv.unlock('SCHWOBA_GENERAL');
            if (this.chain + 1 >= 5) Achv.unlock('ROAST_KETTE_5');
            if (this.chain + 1 >= 10) Achv.unlock('ROAST_KETTE_10');
          }
          // INSULT pays its own Vape cost back when it lands.
          Vape.v = Math.min(100, Vape.v + 5);
          this.cd = 2.5;
          this.chain++; this.chainTimer = 8.0;
          if (this.chain >= 3){
            HUD.note(`ROAST KETTE x${this.chain}!`, '#ff66ff');
            // Screen shake intensifies with chain; flash gold on chain >=3.
            shake(6 + this.chain*1.5);
            flash('#ffd633', 0.16);
            try{
              if (Audio.brass) Audio.brass.triggerAttackRelease(['E5','G5','C6'], '8n', undefined, 0.55);
            }catch(e){}
          } else {
            try{
              if (Audio.sfx) Audio.sfx.triggerAttackRelease('E5', '32n');
              setTimeout(()=>{ try{Audio.sfx&&Audio.sfx.triggerAttackRelease('A5','32n');}catch(e){} }, 70);
            }catch(e){}
          }
          // populate highlight reel
          Game.highlightReel.push({id:'INLINE_INSULT', label:`Insult: ${this.pendingTarget.kind}`, aura:reward, witnesses});
          Game.highlightReel.sort((a,b)=>b.aura-a.aura);
          if (Game.highlightReel.length > 5) Game.highlightReel.length = 5;
          // Comic-burst the actual line as a particle so the joke lands
          // visually too. Truncate long lines for the burst.
          const burstLine = (this.pendingLine||'').replace(/^"|"$/g, '');
          const short = burstLine.length > 28 ? burstLine.slice(0,26)+'…' : burstLine;
          comicBurst(Player.x + Player.w + 30, Player.y - 30, short);
          if (navigator.vibrate) navigator.vibrate(15);
          // Inline insults at chain ≥2 trigger the mid-game ticker too.
          if (this.chain >= 2 && typeof NewsTicker !== 'undefined'){
            NewsTicker.fire('INLINE_INSULT', 'Insult: ' + this.pendingTarget.kind);
          }
        } else {
          // No target — penalty already applied (cd=4, chain reset)
          Krass.add(-12, 'GEGEN DIE LUFT');
        }
        this.pendingTarget = null;
      }
    }
  },
  // Visual cues — talking bubble during lock, target marker when ready
  drawWorldOverlay(){
    if (this.lockT > 0 && this.pendingLine){
      drawBubble(Player.x + Player.w + 4, Player.y - 50, this.pendingLine, 10);
    }
    if (this.ready()){
      const tgt = this.findTarget();
      if (tgt){
        const pulse = 0.5 + 0.5*Math.sin(Game.realT*8);
        ctx.save();
        ctx.globalAlpha = 0.4 + pulse*0.4;
        // Comic-bubble icon above target
        ctx.fillStyle = '#fff';
        const cx = tgt.x, cy = (tgt.y || CFG.GROUND_Y-110) - 40;
        ctx.beginPath(); ctx.ellipse(cx, cy, 16, 10, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.font = 'bold 12px "Press Start 2P"'; ctx.textAlign='center';
        ctx.fillText('!', cx, cy+4);
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.moveTo(cx-3, cy+8); ctx.lineTo(cx+5, cy+8); ctx.lineTo(cx, cy+18); ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    }
  },
  drawHUD(){
    // Cooldown meter or "READY" pip beneath the ability strip.
    const cx = CFG.W - 60, cy = 142;
    if (this.cd > 0){
      const r = clamp(this.cd / 4.0, 0, 1);
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(cx-2, cy-2, 38, 38);
      ctx.fillStyle = '#888'; ctx.fillRect(cx, cy, 34, 34);
      ctx.fillStyle = '#ff66aa';
      ctx.fillRect(cx, cy + 34*(1-r), 34, 34*r);
      ctx.fillStyle = '#000'; ctx.font='bold 18px sans-serif'; ctx.textAlign='center';
      ctx.fillText('💬', cx+17, cy+24);
      ctx.restore();
    } else if (Vape.v >= 12 && this.ready()){
      const pulse = 0.5 + 0.5*Math.sin(Game.realT*4);
      const tgt = this.findTarget();
      ctx.save();
      // brighter when an actual target is on screen
      ctx.fillStyle = '#000'; ctx.fillRect(cx-2, cy-2, 38, 38);
      ctx.fillStyle = tgt ? '#ff66aa' : '#aa4488';
      ctx.fillRect(cx, cy, 34, 34);
      ctx.fillStyle = '#fff'; ctx.font='bold 18px sans-serif'; ctx.textAlign='center';
      ctx.fillText('💬', cx+17, cy+24);
      if (tgt){
        // small glow only when a target is in sight
        ctx.globalAlpha = pulse * 0.5; ctx.fillStyle = '#ff66aa';
        ctx.fillRect(cx-3, cy-3, 40, 40);
      }
      ctx.restore();
    } else if (Vape.v < 12 && Game.state === 'PLAY'){
      // Locked because Vape too low — explicit "GESPERRT" cue.
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(cx-2, cy-2, 38, 38);
      ctx.fillStyle = '#444'; ctx.fillRect(cx, cy, 34, 34);
      ctx.fillStyle = '#ff8a30'; ctx.font='bold 16px sans-serif'; ctx.textAlign='center';
      ctx.fillText('💬', cx+17, cy+24);
      // diagonal slash for "locked"
      ctx.strokeStyle = '#ff3030'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(cx, cy+34); ctx.lineTo(cx+34, cy); ctx.stroke();
      ctx.restore();
    }
    // Chain banner
    if (this.chain >= 2){
      const w = 240;
      ctx.fillStyle = '#000'; ctx.fillRect(20, 110, w, 22);
      ctx.fillStyle = this.chain >= 3 ? '#ffd633' : '#ff66ff';
      ctx.font='bold 11px "Press Start 2P"'; ctx.textAlign='left';
      ctx.fillText(`ROAST KETTE x${this.chain}`, 30, 126);
      // bonus indicator
      if (this.chain >= 3){
        ctx.fillStyle = '#fff'; ctx.font='bold 9px "Press Start 2P"';
        ctx.fillText(`+${Math.floor(this.chain*40)}% BONUS`, 30+w-110, 126);
      }
    }
    // First-run discovery hint — show 8s after first PLAY frame if no
    // insult has fired yet AND Vape ≥ 12 AND a target is on screen.
    if (!Game._insultEverFired && Game.realT > 8 && Game.realT < 30 && Game.state === 'PLAY' && Vape.v >= 12 && this.findTarget()){
      const t = Game.realT;
      const a = 0.6 + 0.4*Math.sin(t*4);
      ctx.save();
      ctx.globalAlpha = a;
      ctx.fillStyle = '#000'; ctx.fillRect(CFG.W/2 - 240, 88, 480, 36);
      ctx.fillStyle = '#ff66aa'; ctx.fillRect(CFG.W/2 - 238, 90, 476, 32);
      ctx.fillStyle = '#fff'; ctx.font='bold 12px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText('💬 [B] / pinker Knopf — beleidige NPCs für Aura!', CFG.W/2, 112);
      ctx.restore();
    }
  }
};

// Witness count — how many bystanders are nearby. Drives the ×N multiplier.
function countWitnesses(){
  let n = 0;
  for (const e of Entities){
    if (e.type === 'npc' && e.alive) n++;
  }
  // crowds at marktplatz/bus stop modeled as +N implicit
  if (currentZone && currentZone().name && /MARKTPLATZ|BUSHALTE/.test(currentZone().name)) n += 3;
  return n;
}

// === TRANSGRESSION ENCOUNTER — single-button QTE driven ===
class TransgressionEnc {
  constructor(entry){
    this.entry = entry;
    this.t = 0;
    this.duration = 8;
    this.qte = {windowStart: 1.5, windowEnd: 3.0};
    this.fired = false;
    this.outcome = null;
    this.witnesses = countWitnesses();
    this.title = entry.label;
  }
  init(){
    HUD.note(`!! ${this.entry.prompt} !!`, '#ffd633');
  }
  update(dt){
    this.t += dt;
    Player.update(dt);
    Vape.update(dt);
    Krass.update(dt, false);
    if (!this.fired){
      const inWindow = this.t >= this.qte.windowStart && this.t <= this.qte.windowEnd;
      if (Input.pressed.vape){
        this.fired = true;
        if (this.entry.sacred){
          this.outcome = 'respect';
          Krass.add(50, 'RESPEKT FÜR DEN KSC-FAN');
          HUD.note('// HEILIG //', '#88ccff');
        } else if (inWindow){
          this.outcome = 'success';
          let aura = this.entry.base;
          // regional multiplier
          if (this.entry.regional && REGIONAL_PREJUDICE[this.entry.regional]){
            aura = Math.floor(aura * REGIONAL_PREJUDICE[this.entry.regional].aura_mult);
          }
          // witness multiplier (1, 1+0.4×log)
          const wMul = this.witnesses <= 1 ? 1 : (this.witnesses < 5 ? 1.5 : (this.witnesses < 20 ? 3 : 5));
          aura = Math.floor(aura * wMul);
          // Chantal-defense: trust up, no aura
          if (this.entry.chantalDef && this.entry.trust){
            Game.chantalTrust = clamp(Game.chantalTrust + this.entry.trust, 0, 100);
            HUD.note(`+${this.entry.trust} CHANTAL-VERTRAUEN`, '#ff66aa');
            // schwabe antagonist
            if (this.entry.id === 'SCHWOBA_VS_CHANTAL') Save.data.schwabeAntagonistChasing = 5;
          } else {
            Krass.add(aura, this.entry.label.toUpperCase());
            Game.transgressionAuraTotal += aura;
            // Special transgression side-effects
            applyTransgressionSideEffect(this.entry.id);
          }
          // EUR revenue book-keeping (estimate: ~10% of aura is paid out)
          Game.transgressionRevenue += Math.floor(aura * 0.1);
          Game.transgressionsCount++;
          // record in Highlight Reel (top-5 by aura)
          Game.highlightReel.push({id:this.entry.id, label:this.entry.label, aura, witnesses:this.witnesses});
          Game.highlightReel.sort((a,b)=>b.aura-a.aura);
          if (Game.highlightReel.length > 5) Game.highlightReel.length = 5;
          // record returning-customer memory
          Save.rememberTransgression(this.entry.npcId, this.entry.id);
          comicBurst(Player.x+30, Player.y-30, 'NICE!');
          // Mid-game breaking-news ticker
          if (typeof NewsTicker !== 'undefined') NewsTicker.fire(this.entry.id, this.entry.label);
        } else {
          // CRINGE — punish failed attempts harder than reward
          this.outcome = 'cringe';
          const penalty = Math.floor(this.entry.base * 0.6);
          Krass.add(-penalty, 'CRINGE — VERHAUEN');
          HUD.note('Voll cringe, Brudi. Du hast es VERSUCHT.', '#ff3030');
          flash('#ff3030', 0.2);
          Save.data.cringeFailsLifetime = (Save.data.cringeFailsLifetime||0) + 1;
          Save.save();
          if (typeof Achv !== 'undefined' && Save.data.cringeFailsLifetime >= 10) Achv.unlock('CRINGE_OPFER');
        }
      }
    }
    if (this.t >= this.duration){
      // resolve and end
      Encounter.end( this.outcome === 'success' ? Math.floor(this.entry.base*0.5) : 0 );
    }
  }
  draw(){
    // Side strip with QTE ring + countdown
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(CFG.W*0.3, 130, CFG.W*0.4, 80);
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(CFG.W*0.3, 130, CFG.W*0.4, 80);
    ctx.fillStyle='#ffd633'; ctx.font='bold 12px "Press Start 2P"'; ctx.textAlign='center';
    ctx.fillText(this.entry.label.toUpperCase(), CFG.W/2, 158);
    // window indicator
    const totalW = CFG.W*0.36, baseX = CFG.W*0.32;
    const totalT = this.duration;
    ctx.fillStyle='#444'; ctx.fillRect(baseX, 178, totalW, 12);
    ctx.fillStyle = this.fired ? '#888' : '#7fff7f';
    const ws = (this.qte.windowStart/totalT)*totalW;
    const we = (this.qte.windowEnd/totalT)*totalW;
    ctx.fillRect(baseX+ws, 178, we-ws, 12);
    ctx.fillStyle='#fff';
    const cx = baseX + (Math.min(this.t,totalT)/totalT)*totalW;
    ctx.fillRect(cx-2, 174, 4, 20);
    ctx.font='9px "Press Start 2P"'; ctx.fillStyle='#fff';
    ctx.fillText(`[V] when bar in green   |   ${this.witnesses} ZEUGEN`, CFG.W/2, 204);
    // Outcome banner
    if (this.outcome){
      const c = this.outcome==='success' ? '#7fff7f' : (this.outcome==='respect' ? '#88ccff' : '#ff3030');
      ctx.fillStyle = c; ctx.fillRect(CFG.W*0.2, 230, CFG.W*0.6, 50);
      ctx.fillStyle='#000'; ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.strokeRect(CFG.W*0.2, 230, CFG.W*0.6, 50);
      ctx.font='bold 12px "Press Start 2P"'; ctx.textAlign='center';
      const txt = this.outcome === 'success' ? this.entry.success : (this.outcome === 'respect' ? this.entry.success : this.entry.cringe);
      ctx.fillText(txt, CFG.W/2, 260);
    }
  }
}

function applyTransgressionSideEffect(id){
  switch(id){
    case 'BÜRGERMEISTER_POSTER':
      Save.data.bürgermeisterPosterDefaced = true; Save.save();
      if (typeof Achv !== 'undefined') Achv.unlock('BUERGER_DEFACED');
      break;
    case 'POLIZEI_DISCOUNT':
      Game.curses.aktenzeichen = true; // forced on for the run
      Game.passatTimer = 30; // sooner
      break;
    case 'RUDOLF_PREMIUM':
      Game.rudolfPremiumDone = true; // locks Mama ANNEHMEN
      break;
    case 'PFARRER_NFT':
      Save.unlockNpcDialogue('pfarrer_kornblum', 'der_vatikan_hat_angefragt');
      if (typeof Achv !== 'undefined') Achv.unlock('VATIKAN_PARTNER');
      break;
    case 'PRIESTER_HAUCH':
      if (typeof Achv !== 'undefined') Achv.unlock('VATIKAN_PARTNER');
      break;
    case 'HAMBURGER_HARDTSEE':
      if (typeof Achv !== 'undefined') Achv.unlock('HARDTSEE_VERTEIDIGT');
      break;
  }
}

const TransgressionDirector = {
  cooldown: 18,
  update(dt){
    if (Game.inBoss || Game.inEncounter) return;
    if (Game.realT < 18) return; // first 18s clean
    this.cooldown -= dt;
    if (this.cooldown <= 0){
      // Filter to entries we don't want to repeat back-to-back.
      let pool = TRANSGRESSION_CATALOGUE.filter(e=>!Game.transgressionLastTargets.includes(e.id));
      if (pool.length === 0) pool = TRANSGRESSION_CATALOGUE.slice();
      // Schwape adjacency: more likely to spawn ones that interact with the surname
      const pick = pool[Math.floor(Math.random()*pool.length)];
      Game.transgressionLastTargets.push(pick.id);
      if (Game.transgressionLastTargets.length > 4) Game.transgressionLastTargets.shift();
      // launch as a TRANSGRESSION encounter
      Game.inEncounter = true;
      Game.state = 'ENCOUNTER';
      Encounter.active = new TransgressionEnc(pick);
      Encounter.active.init();
      this.cooldown = rand(35, 65);
    }
  }
};

// ===== PROGRESSION — ABILITIES & CURSES =====
// One ABILITY and one CURSE per main-boss kill (B1..B6). Both reset every run.
// Boss 7 (Mutter) does NOT grant; the secret-win path goes straight to Act II.
// The ability popup + curse popup are queued back-to-back.
const ABILITY_DEFS = {
  dash:        {label:'KRASS-DASH',         icon:'dash',   key:'V mid-air'},
  tripleJump:  {label:'TRIPLE-JUMP',        icon:'tjump',  key:'3. Sprung'},
  wallSlide:   {label:'WALL-SLIDE',         icon:'wall',   key:'JUMP gegen Mast'},
  stealth:     {label:'STEALTH',            icon:'stealth',key:'DUCK'},
  sighCancel:  {label:'SIGH CANCEL',        icon:'sigh',   key:'DUCK + V'},
  pfifferling: {label:'PFIFFERLING-SINN',   icon:'eye',    key:'auto'},
  todCheck:    {label:'TOD-CHECK',          icon:'skull',  key:'auto'},
};
const CURSE_DEFS = {
  schulstress:     'SCHULSTRESS — Vape -1.3×',
  peerPressure:    'PEER PRESSURE — OPFER ×0.25',
  schulordnung:    'SCHULORDNUNG — V > 2s = Drexler',
  aktenzeichen:    'AKTENZEICHEN — Passat-Patrouille',
  generationFluch: 'GEN.-FLUCH — Aura -1.5×',
  schatten:        'SCHATTEN — Sichtfeld dunkel',
};

const Progression = {
  popups: [],          // FIFO queue of {kind:'ability'|'curse', key}
  popupT: 0,
  current: null,
  grantForBoss(idx){
    const map = [
      ['dash',        'schulstress'],     // B1 ZEUGNIS
      ['tripleJump',  'peerPressure'],    // B2 CLIQUE
      ['wallSlide',   'schulordnung'],    // B3 DREXLER
      ['stealth',     'aktenzeichen'],    // B4 POLIZEI
      ['sighCancel',  'generationFluch'], // B5 RUDOLF
      ['pfifferling', 'schatten'],        // B6 SCHWARZWALD
    ];
    if (idx < 0 || idx > 5) return;
    const [ab, cu] = map[idx];
    Game.abilities[ab] = true;
    // PEER PRESSURE mutates OPFER tier multiplier this run.
    if (cu === 'peerPressure') KRASS_TIERS[0].mul = 0.25;
    Game.curses[cu] = true;
    this.popups.push({kind:'ability', key:ab});
    this.popups.push({kind:'curse',   key:cu});
  },
  update(dt){
    if (this.current){
      this.popupT -= dt;
      if (this.popupT <= 0){ this.current = null; }
    }
    if (!this.current && this.popups.length){
      this.current = this.popups.shift();
      this.popupT = 2.6;
      // Sound cue per kind
      if (this.current.kind === 'ability'){
        if (Audio.tierUp) Audio.tierUp();
        if (navigator.vibrate) navigator.vibrate([20,40,20]);
      } else {
        if (Audio.tierDown) Audio.tierDown();
        if (navigator.vibrate) navigator.vibrate(80);
      }
    }
    // ability cooldowns tick
    for (const k in Game.abilityCD){
      if (Game.abilityCD[k] > 0) Game.abilityCD[k] = Math.max(0, Game.abilityCD[k] - dt);
    }
    // dash motion application (ballistic forward boost)
    if (Game.dashT > 0){
      Game.dashT = Math.max(0, Game.dashT - dt);
      const speed = Game.dashDX / 0.15;
      Player.x = Math.min(CFG.W - Player.w - 8, Player.x + speed*dt);
      Player.vy = Math.min(Player.vy, -100); // hold a bit of lift
      if (!CFG.REDUCED_MOTION && Math.random() < 0.6){
        spawnParticle({x:Player.x+10, y:Player.y+rand(20,80), vx:rand(-80,-200), vy:rand(-30,30), size:rand(4,8), color:'rgba(255,80,160,0.6)', life:0.3, maxLife:0.3});
      }
    }
    // stealth tick
    if (Game.stealthActiveT > 0) Game.stealthActiveT = Math.max(0, Game.stealthActiveT - dt);
    // suspended curses (Mama-call grace window)
    if (Game.cursesSuspendedT > 0) Game.cursesSuspendedT = Math.max(0, Game.cursesSuspendedT - dt);
    // SCHULORDNUNG curse — V held > 2 sec spawns mini-Drexler
    if (Game.curses.schulordnung && !(Game.cursesSuspendedT>0) && Game.state==='PLAY'){
      if (Input.keys.vape) Game.drexlerVHoldT += dt;
      else Game.drexlerVHoldT = 0;
      if (Game.drexlerVHoldT > 2 && Game.drexlerActiveT <= 0){
        Game.drexlerActiveT = 8;
        Game.drexlerSawIt = true;
        HUD.note('"BIN RUN."', '#ffaa30');
        if (navigator.vibrate) navigator.vibrate([60,40,60]);
      }
    }
    if (Game.drexlerActiveT > 0) Game.drexlerActiveT = Math.max(0, Game.drexlerActiveT - dt);
    // AKTENZEICHEN curse — Passat patrol every ~90 sec
    if (Game.curses.aktenzeichen && !(Game.cursesSuspendedT>0) && Game.state==='PLAY'){
      Game.passatTimer -= dt;
      if (Game.passatTimer <= 0 && Game.passatActiveT <= 0){
        Game.passatActiveT = 12;
        Game.passatX = -200;
        Game.passatTimer = 90;
        HUD.note('GRÜN-WEISSE GEFAHR', '#7fff7f');
      }
      if (Game.passatActiveT > 0){
        Game.passatActiveT -= dt;
        // closes from left, then trails
        const targetX = Player.x - 80;
        Game.passatX = Game.passatX + (targetX - Game.passatX)*Math.min(1, dt*0.6);
        // damage if it touches
        if (Game.passatActiveT > 0 && Math.abs(Game.passatX - Player.x) < 40 && Game.stealthActiveT<=0){
          Player.hit(8, 'POLIZEI-STREIFE');
          Game.passatActiveT = Math.min(Game.passatActiveT, 1.5);
        }
        if (Game.passatActiveT <= 0){
          Krass.add(500, 'STREIFE ABGEHÄNGT');
          comicBurst(Player.x+30, Player.y-40, 'GHOSTED!');
        }
      }
    }
    // SIGH CANCEL — wave physics + obstacle clear

      else if (k==='wallSlide'){ ctx.fillRect(x+6, y+4, 5, 28); ctx.beginPath(); ctx.moveTo(x+18, y+10); ctx.lineTo(x+26, y+18); ctx.lineTo(x+18, y+26); ctx.closePath(); ctx.fill(); }
      else if (k==='stealth'){ ctx.globalAlpha=0.5; ctx.fillRect(x+10, y+6, 14, 22); ctx.globalAlpha=1; ctx.strokeRect(x+10, y+6, 14, 22); }
      else if (k==='sighCancel'){ ctx.font='bold 16px Bangers, sans-serif'; ctx.textAlign='center'; ctx.fillText('hach~', cx, cy+5); }
      else if (k==='pfifferling'){ ctx.font='bold 18px Bangers, sans-serif'; ctx.textAlign='center'; ctx.fillText('👁', cx, cy+6); }
      else if (k==='todCheck'){ ctx.font='bold 18px Bangers, sans-serif'; ctx.textAlign='center'; ctx.fillText('💀', cx, cy+6); }
      // cooldown shadow
      const cdMap = {dash:'dash', stealth:'stealth', sighCancel:'sighCancel', todCheck:'todCheck'};
      const cdKey = cdMap[k];
      if (cdKey && Game.abilityCD[cdKey] > 0){
        const ratios = {dash:4, stealth:6, sighCancel:8, todCheck:99};
        const total = ratios[cdKey];
        const r = clamp(Game.abilityCD[cdKey]/total, 0, 1);
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(x, y+34*(1-r), 34, 34*r);
      }

    // Centered ability/curse popup overlay.
    if (this.current){
      const k = this.current.kind, key = this.current.key;
      const a = clamp(this.popupT/2.6, 0, 1);
      const slide = a > 0.85 ? (1-a)/0.15 : (a < 0.2 ? a/0.2 : 1);
      const cx = CFG.W/2, cy = 240;
      ctx.save();
      ctx.globalAlpha = slide;
      ctx.translate(cx, cy);
      const w = 540, h = 100;
      // halftone burst behind
      ctx.fillStyle='#000'; ctx.fillRect(-w/2-6, -h/2-6, w+12, h+12);
      ctx.fillStyle = (k==='ability') ? '#ffd633' : '#7a3eaa';
      ctx.fillRect(-w/2, -h/2, w, h);
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      for (let xx=-w/2;xx<w/2;xx+=14) ctx.beginPath(), ctx.arc(xx, 0, 4, 0, Math.PI*2), ctx.fill();
      ctx.fillStyle='#000'; ctx.font='bold 18px "Press Start 2P"'; ctx.textAlign='center';
      const top = (k==='ability') ? 'NEUE FÄHIGKEIT' : 'NEUER FLUCH';
      ctx.fillText(top, 0, -16);
      ctx.font='bold 26px Bangers, sans-serif';
      ctx.fillStyle = (k==='ability') ? '#000' : '#fff';
      const big = (k==='ability') ? `${ABILITY_DEFS[key].label} FREIGESCHALTET` : CURSE_DEFS[key];
      ctx.fillText(big, 0, 22);
      ctx.restore();
    }
  },
};

// ===== MAMA CALL — narrative phone-call gate after Boss 5 =====
const MamaCall = {
  active: false,
  countdown: 5.0,
  ringT: 0,
  resultPlayer: '',
  open(){
    this.active = true;
    this.countdown = 5.0;
    this.ringT = 0;
    Game.state = 'MAMA_CALL';
  },
  decide(choice){
    if (!this.active) return;
    this.active = false;
    Save.pushMamaCall(choice);
    if (choice === 'annehmen'){
      this.startDialog();
      return;
    }
    if (choice === 'ignorieren'){
      Game.mamaTrustHarder = 1.5;
      Game.honestyBonusFrames = 2; // 17 → 19
    }
    // ablehnen: nothing extra; resume normal flow
    this.exitToPlay();
  },
  startDialog(){
    // Show the 200-word block as a typewriter dialog. Re-uses the MAMA_CALL
    // state with a 'dialog' substate.
    this.sub = 'dialog';
    this.dialogText = "Bin Run. Hörst du mich? Hallo? Ich seh, dass du online bist.\n\nFrau Müller hat angerufen. Sie sagt, du warst beim Drexler. Was ist los, Bin Run? Du warst doch immer ein guter Junge. Hast du was gegessen? Es liegt Schnitzel im Kühlschrank, unten links, in der gelben Tupperdose. Vater ist schon im Bett, der Tagesschau wegen. Er fragt nicht nach dir, aber ich seh's ihm an.\n\nIch hab dich heute Morgen aus dem Fenster gesehen. Du warst schmal, Bin Run. Iss was. Komm heim. Wir reden nicht über alles, das musst du auch nicht — aber komm wenigstens heim. Ich hab Schnittchen gemacht. Magst du noch die mit Mortadella?\n\nIch hab dich lieb.";
    this.dialogShown = 0;
    this.dialogDone = false;
    Game.state = 'MAMA_CALL';
    this.active = true;
  },
  exitToPlay(){
    this.active = false;
    this.sub = null;
    Game.state = 'PLAY';
    const zname = currentZone().name;
    if (ZONE_TRACK[zname]) Audio.setTrack(ZONE_TRACK[zname]);
  },
  finishAnnehmen(){
    Vape.refill(50);
    Krass.v = Math.max(0, Krass.v - 30);
    HUD.note('Mama-Energie: -30 AURA, +50 VAPE', '#ff66ff');
    Game.cursesSuspendedT = 60;
    Game.schwarzwaldSoft = true;
    if (typeof Achv !== 'undefined') Achv.unlock('SORRY_MAMA');
    this.exitToPlay();
  },
  update(dt){
    if (!this.active) return;
    if (this.sub === 'dialog'){
      this.dialogShown = Math.min(this.dialogText.length, this.dialogShown + 30*dt);
      if (this.dialogShown >= this.dialogText.length) this.dialogDone = true;
      if (this.dialogDone && (Input.pressed.jump || Input.pressed.right || Input.pressed.vape || Input.touchJump)){
        this.finishAnnehmen();
      }
      return;
    }
    this.ringT += dt;
    // ring tone — short ping pattern (German Festnetz approximation)
    const ringCycle = this.ringT % 5.0;
    if (Math.floor(this.ringT*4) !== this._lastTick && ringCycle < 1.0){
      try{ Audio.sfx && Audio.sfx.triggerAttackRelease('A4','32n'); }catch(e){}
      this._lastTick = Math.floor(this.ringT*4);
    }
    this.countdown -= dt;
    if (this.countdown <= 0){ this.decide('ignorieren'); return; }
    // input
    if (Input.pressed.right || Input.pressed.jump || Input.pressed.vape) this.decide('annehmen');
    else if (Input.pressed.left || Input.pressed.down) this.decide('ablehnen');
    // touch
    for (const id in activePointers){
      const p = activePointers[id];
      if (p.consumed) continue;
      // green button left, red button right
      const gx = CFG.W/2 - 180, ay = CFG.H*0.62, bw=120, bh=60;
      const rx = CFG.W/2 + 60;
      if (p.y >= ay && p.y <= ay+bh){
        if (p.x >= gx && p.x <= gx+bw){ p.consumed=true; this.decide('annehmen'); return; }
        if (p.x >= rx && p.x <= rx+bw){ p.consumed=true; this.decide('ablehnen'); return; }
      }
    }
  },
  draw(){
    // Background — dim the world
    ctx.fillStyle='rgba(0,0,0,0.85)'; ctx.fillRect(0,0,CFG.W,CFG.H);
    if (this.sub === 'dialog'){
      // Speech-bubble dialog box
      const w = CFG.W*0.7, h = 380, x = (CFG.W-w)/2, y = (CFG.H-h)/2;
      ctx.fillStyle='#000'; ctx.fillRect(x-6, y-6, w+12, h+12);
      ctx.fillStyle='#fff'; ctx.fillRect(x, y, w, h);
      // halftone
      ctx.fillStyle='rgba(0,0,0,0.04)';
      for (let yy=8;yy<h;yy+=12) for (let xx=8;xx<w;xx+=12){ ctx.beginPath(); ctx.arc(x+xx, y+yy, 1.6, 0, Math.PI*2); ctx.fill(); }
      ctx.fillStyle='#000'; ctx.font='bold 18px "Press Start 2P"'; ctx.textAlign='left';
      ctx.fillText('Mama', x+24, y+34);
      // wrap dialog text
      ctx.font='12px "Press Start 2P"';
      const text = this.dialogText.slice(0, Math.floor(this.dialogShown));
      const paras = text.split('\n\n');
      let ly = y+70;
      for (const p of paras){
        const words = p.split(' ');
        let line = '';
        for (const wd of words){
          const test = line + wd + ' ';
          if (ctx.measureText(test).width > w-48){ ctx.fillText(line, x+24, ly); line = wd+' '; ly += 18; }
          else line = test;
        }
        if (line) { ctx.fillText(line, x+24, ly); ly += 18; }
        ly += 10;
      }
      if (this.dialogDone){
        ctx.fillStyle = '#ff66aa'; ctx.font='10px "Press Start 2P"';
        const msg = '[SPACE / TIPPEN] um aufzulegen';
        ctx.textAlign='center';
        ctx.fillText(msg, CFG.W/2, y+h-18);
      }
      return;
    }
    // Phone call interface
    const cx = CFG.W/2, cy = CFG.H*0.34;
    // Avatar circle
    ctx.save();
    ctx.translate(cx, cy);
    const pulse = 1 + Math.sin(this.ringT*6)*0.04;
    ctx.scale(pulse, pulse);
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(0, 0, 80, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='#000'; ctx.lineWidth=4; ctx.stroke();
    // simple drawn portrait
    ctx.fillStyle = '#f4c896'; ctx.fillRect(-30, -30, 60, 60);
    ctx.fillStyle = '#a85020'; ctx.fillRect(-32, -38, 64, 18); // hair (curly brown)
    ctx.beginPath(); ctx.arc(-34, -22, 8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(34, -22, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.fillRect(-12, -10, 4, 4); ctx.fillRect(8, -10, 4, 4); // eyes (kind)
    ctx.strokeStyle='#000'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0, 8, 8, 0, Math.PI); ctx.stroke(); // smile
    ctx.strokeRect(-30, -30, 60, 60);
    ctx.restore();
    // Labels
    ctx.fillStyle='#fff'; ctx.font='bold 28px "Press Start 2P"'; ctx.textAlign='center';
    ctx.fillText('Mama', CFG.W/2, cy + 130);
    ctx.font='12px "Press Start 2P"';
    ctx.fillStyle='#ffd633';
    ctx.fillText('ruft an...', CFG.W/2, cy + 156);
    // Buttons
    const bw=140, bh=70;
    const ay = CFG.H*0.62;
    const gx = CFG.W/2 - 180;
    const rx = CFG.W/2 + 40;
    // ANNEHMEN (green)
    ctx.fillStyle='#34c759'; ctx.fillRect(gx, ay, bw, bh);
    ctx.strokeStyle='#000'; ctx.lineWidth=4; ctx.strokeRect(gx, ay, bw, bh);
    ctx.fillStyle='#fff'; ctx.font='bold 18px "Press Start 2P"';
    ctx.fillText('ANNEHMEN', gx+bw/2, ay+bh/2+6);
    ctx.font='9px "Press Start 2P"'; ctx.fillStyle='#fff';
    ctx.fillText('SPACE / V', gx+bw/2, ay+bh+18);
    // ABLEHNEN (red)
    ctx.fillStyle='#ff3030'; ctx.fillRect(rx, ay, bw, bh);
    ctx.strokeStyle='#000'; ctx.lineWidth=4; ctx.strokeRect(rx, ay, bw, bh);
    ctx.fillStyle='#fff'; ctx.font='bold 18px "Press Start 2P"';
    ctx.fillText('ABLEHNEN', rx+bw/2, ay+bh/2+6);
    ctx.font='9px "Press Start 2P"'; ctx.fillStyle='#fff';
    ctx.fillText('← / DOWN', rx+bw/2, ay+bh+18);
    // Countdown bar — IGNORIEREN trigger
    const cdW = 460, cdH = 12, cdx = CFG.W/2 - cdW/2, cdy = ay + bh + 50;
    ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillRect(cdx, cdy, cdW, cdH);
    const r = clamp(this.countdown/5.0, 0, 1);
    ctx.fillStyle = r > 0.4 ? '#ffd633' : '#ff3030';
    ctx.fillRect(cdx, cdy, cdW*r, cdH);
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(cdx, cdy, cdW, cdH);
    ctx.fillStyle='#fff'; ctx.font='9px "Press Start 2P"'; ctx.textAlign='center';
    ctx.fillText('IGNORIEREN in ' + Math.ceil(this.countdown) + 's', CFG.W/2, cdy + 30);
  },
};

// ===== BOSSES =====
const Boss = {
  active: null,
  start(idx){
    Game.inBoss = true;
    Game.state = 'BOSS';
    const cls = BOSS_CLASSES[idx];
    this.active = new cls(idx);
    this.active.init();
    HUD.note(`!! ${BOSS_NAMES[idx]} !!`, '#ff66ff');
    flash('#ff66ff', 0.3);
    shake(8);
    Audio.bossStart();
    Audio.setTrack('boss');
  },
  end(reward){
    if (!this.active) return;
    const idx = this.active.idx;
    Game.baseScore += reward;
    HUD.note(`+${reward} — ${BOSS_NAMES[idx]} besiegt!`, '#ffd633');
    Game.bossDoneCount++;
    Game.bossIdx = idx+1;
    this.active = null;
    Game.inBoss = false;
    Game.state = 'PLAY';
    Vape.refill(30);
    Audio.victory();
    // V2 — abilities/curses + lifetime achievement flags
    Save.markBoss(idx);
    Save.data.bossesDefeatedLifetime = Save.data.bossesDefeatedLifetime || {};
    Save.data.bossesDefeatedLifetime[idx] = (Save.data.bossesDefeatedLifetime[idx]||0) + 1;
    Save.save();
    Progression.grantForBoss(idx);
    // After Boss 5 (Rudolf): trigger MAMA CALL phone overlay before B6.
    if (idx === 4){ MamaCall.open(); return; }
    // restore zone music after boss
    const zname = currentZone().name;
    if (ZONE_TRACK[zname]) Audio.setTrack(ZONE_TRACK[zname]);
  },
  update(dt){ if (this.active) this.active.update(dt); },
  draw(){ if (this.active) this.active.draw(); },
};

// ===== BOSS 1 — DAS ZEUGNIS =====
class B1_Zeugnis extends BossBase {
  init(){
    this.notesNeeded = 5; this.notesCollected = 0;
    this.projectiles = []; this.notes = [];
    this.spawnT = 0; this.noteT = 1.5;
    this.lines = ["Mathematik... eine Fünf.","Deutsch... eine Fünf.","Sport — Sport, Bin Run?! — eine Vier minus.","Religion... eine Sechs. Wie ist das überhaupt möglich?"];
    this.lineI = 0; this.lineT = 0; this.lineShowT = 0;
  }
  update(dt){
    super.update(dt);
    this.spawnT -= dt; this.noteT -= dt; this.lineT -= dt; this.lineShowT = Math.max(0, this.lineShowT - dt);
    if (this.spawnT <= 0){
      const grade = Math.random()<0.3?6:5;
      this.projectiles.push({x:rand(CFG.W*0.5, CFG.W*0.95), y:-30, vy:rand(120,260), vx:rand(-40, 30), grade, w:30, h:34});
      this.spawnT = rand(0.5, 1.0);
    }
    if (this.noteT <= 0 && this.notesCollected < this.notesNeeded){
      this.notes.push({x:CFG.W+50, y:CFG.GROUND_Y-rand(80,200), vx:-220, w:30, h:36, animT:0});
      this.noteT = rand(2, 3.4);
    }
    // dialogue
    if (this.lineT <= 0 && this.lineI < this.lines.length){
      this.lineShowT = 3.0;
      this.lineT = 4.0;
      this.lineI++;
    }
    // update projectiles
    const hb = Player.hb();
    for (let i=this.projectiles.length-1;i>=0;i--){
      const p = this.projectiles[i];
      p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 200*dt;
      if (p.y > CFG.GROUND_Y) { this.projectiles.splice(i,1); continue; }
      // SIGH CANCEL — disappointment wave one-shots projectiles.
      let cleared = false;
      for (const w of Game.sighWaves){
        if (Math.abs((p.x+p.w/2) - w.x) < 60 && Math.abs((p.y+p.h/2) - w.y) < 50){
          cleared = true; break;
        }
      }
      if (cleared){ this.projectiles.splice(i,1); sparkle(p.x, p.y); continue; }
      if (aabb(hb, {x:p.x, y:p.y, w:p.w, h:p.h})){
        if (Krass.isLegende()){
          // INVERSION: heal + krass
          Vape.refill(15);
          Krass.add(500, `SIGMA-INVERSION: ${p.grade}`);
          comicBurst(p.x, p.y, 'NICE!');
          Audio.pickup();
        } else {
          Player.hit(15, `Note ${p.grade}`);
        }
        this.projectiles.splice(i,1);
      }
    }
    // update notes
    for (let i=this.notes.length-1;i>=0;i--){
      const n = this.notes[i];
      n.x += n.vx*dt; n.animT += dt;
      if (n.x < -50) { this.notes.splice(i,1); continue; }
      if (aabb(hb, {x:n.x, y:n.y, w:n.w, h:n.h})){
        this.notes.splice(i,1);
        this.notesCollected++;
        Audio.pickup(); sparkle(n.x, n.y);
        comicBurst(n.x, n.y, 'JA!');
      }
    }
    // win
    if (this.notesCollected >= this.notesNeeded && !this.done){
      this.done = true;
      const reward = Math.floor(1500 * Krass.mul());
      Boss.end(reward);
    }
  }
  draw(){
    // floating Zeugnis on right side
    const zx = CFG.W*0.78, zy = 130 + Math.sin(this.t*1.5)*8;
    ctx.save();
    ctx.fillStyle='#fff8d8'; ctx.fillRect(zx-80, zy-60, 160, 120);

// ===== BOSS 2 — DIE CLIQUE (DER HIGHLIGHT-REEL) =====
// The Trickshot QTE has been retired. The Clique — Justin + Chantal Hosseini
// — judges Bin Run by playing back the top 5 transgressions of the run,
// frame-by-frame, on Bin Run's own phone POV (he's been filming himself the
// entire game). CHANTAL_TRUST modifies her reaction matrix. Empty reel =
// catastrophic loss path.
class B2_Clique extends BossBase {
  init(){
    this.reel = (Game.highlightReel || []).slice(0, 5);
    this.empty = this.reel.length === 0;
    this.idx = 0;
    this.clipT = 0;        // time on current clip
    this.clipDuration = 3.6;
    this.totalScore = 0;
    this.tiktokT = 0;
    this.outcomeT = 0;
    if (this.empty){
      HUD.note('Chantal: "Bist du echt nur einer der einfach rumläuft?"', '#ff66ff');
      Vape.v = Math.max(0, Vape.v - 30);
      Krass.add(-150, 'LEERER REEL — DU BIST KEIN HOMIE');
    } else {
      HUD.note(`@bin_run_pov — ${this.reel.length} Clips zur Bewertung`, '#88ccff');
    }
  }
  cliqueReact(clip){
    // Justin: always Bro. Chantal: weighted by transgression type AND CHANTAL_TRUST.
    // (Bin Run himself appears on his own phone — no judgment from the
    // editor, only the audience.)
    let chant = '💀';
    const trust = Game.chantalTrust|0;
    const mostlyForgiving = trust >= 70;
    const harsh = trust <= 30;
    if (clip.id === 'CHANTAL_BLUMEN' || clip.id === 'FRAU_HERTA_VS_CHANTAL' || clip.id === 'SCHWOBA_VS_CHANTAL') chant = '🥺';
    else if (clip.id === 'BABY_KAUFEN' || clip.id === 'POLIZEI_DISCOUNT' || clip.id === 'RUDOLF_PREMIUM') chant = harsh ? '💀' : (mostlyForgiving ? '😂' : '💀');
    else if (clip.id === 'JUSTIN_BITCOIN' || clip.id === 'PFARRER_NFT' || clip.id === 'BÜRGERMEISTER_POSTER') chant = mostlyForgiving ? '😂' : '💀';
    else chant = mostlyForgiving ? '😂' : (harsh ? '💀' : '😂');
    // Score: aura × (Justin baseline 1.0 + Bitcoin bonus 1.5 if Justin clip + Chantal 0.5/1.0/1.5)
    const justinW = 1.0;
    const bitcoinBonus = (clip.id === 'JUSTIN_BITCOIN') ? 1.5 : 1.0;
    const chantalW = chant === '😂' ? 1.4 : chant === '💀' ? 0.8 : 1.0;
    const score = Math.floor(clip.aura * 0.4 * (justinW + bitcoinBonus + chantalW)/3);
    return {chantal: chant, score};
  }
  update(dt){
    super.update(dt);
    this.tiktokT += dt;
    if (this.empty){
      this.outcomeT += dt;
      if (this.outcomeT > 4 && !this.done){
        this.done = true;
        Boss.end(Math.floor(800 * Krass.mul()));
      }
      return;
    }
    this.clipT += dt;
    if (this.clipT >= this.clipDuration){
      const clip = this.reel[this.idx];
      const r = this.cliqueReact(clip);
      this.totalScore += r.score;
      this.idx++;
      this.clipT = 0;
      Audio.pickup();
      comicBurst(CFG.W*0.7, 220, r.chantal);
      if (this.idx >= this.reel.length){
        // settle
        if (!this.done){
          this.done = true;
          let reward = 1500 + this.totalScore;
          if (Krass.isLegende()) reward *= 2;
          Boss.end(Math.floor(reward * Krass.mul()));
        }
      }
    }
  }
  draw(){
    // Edeka bench backdrop
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(0,0,CFG.W,CFG.H);
    const bx = CFG.W*0.6, by = CFG.H*0.42;
    const justinLine = this.empty ? 'Bro?' : 'Bro.';
    let chantLine = '';
    if (this.empty) chantLine = 'Du läufst nur rum, Brudi.';
    else if (this.idx > 0) {
      const lastReact = this.cliqueReact(this.reel[this.idx-1]);
      chantLine = lastReact.chantal;
    }
    // Two-person Clique: Justin + Chantal Hosseini. Bin Run films himself.
    drawCliqueMember(bx,      by, 'JUSTIN',           '#a52', justinLine);
    drawCliqueMember(bx+140,  by, 'CHANTAL HOSSEINI', '#d3a', chantLine);
    // Phone POV with current reel clip
    drawTikTokOverlay();
    if (this.empty){
      ctx.fillStyle='#fff'; ctx.font='bold 14px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText('REEL: LEER', CFG.W/2, 220);
      ctx.font='10px "Press Start 2P"';
      ctx.fillText('Du hast nichts versucht. Was soll dein Phone filmen?', CFG.W/2, 250);
      return;
    }
    const clip = this.reel[Math.min(this.idx, this.reel.length-1)];
    if (clip){
      ctx.fillStyle='#fff'; ctx.font='bold 14px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText(`@bin_run_pov — clip ${this.idx+1}/${this.reel.length}`, CFG.W/2, 130);
      ctx.font='14px "Press Start 2P"'; ctx.fillStyle='#ffd633';
      ctx.fillText(clip.label.toUpperCase(), CFG.W/2, 162);
      ctx.font='10px "Press Start 2P"'; ctx.fillStyle='#fff';
      ctx.fillText(`+${clip.aura} AURA — ${clip.witnesses} Zeugen`, CFG.W/2, 184);
      // progress bar
      ctx.fillStyle='#444'; ctx.fillRect(CFG.W*0.3, 200, CFG.W*0.4, 8);
      ctx.fillStyle='#7fff7f';
      ctx.fillRect(CFG.W*0.3, 200, CFG.W*0.4*(this.clipT/this.clipDuration), 8);
    }
    // CHANTAL_TRUST visible
    ctx.fillStyle='#fff'; ctx.font='9px "Press Start 2P"'; ctx.textAlign='left';
    ctx.fillText(`CHANTAL-VERTRAUEN: ${Math.floor(Game.chantalTrust)}`, 30, 40);
    ctx.fillText(`REEL-SCORE: ${this.totalScore}`, 30, 60);
  }
}
function drawCliqueMember(x,y,name,color,line){

// ===== BOSS 3 — HERR DREXLER =====
class B3_Drexler extends BossBase {
  init(){
    this.phase = 1; this.taps = 0; this.tapTarget = 12;
    this.tapWindow = 0; this.tapBeat = 0;
    this.bubbleT = 3; this.line = "Bin Run. In mein Büro. SOFORT.";
  }
  update(dt){
    super.update(dt);
    this.bubbleT -= dt;
    if (this.bubbleT < 0 && this.line === "Bin Run. In mein Büro. SOFORT."){
      this.line = "Ich habe auch mal geraucht, Bin Run. Es ist keine Lösung.";
      this.bubbleT = 4;
    }
    // Phase 1: rhythm tap
    if (this.phase === 1){
      this.tapBeat -= dt;
      if (this.tapBeat <= 0){ this.tapBeat = 0.6; this.tapWindow = 0.25; }
      this.tapWindow -= dt;
      if (Input.pressed.jump || Input.pressed.vape){
        if (this.tapWindow > 0){
          this.taps++;
          Audio.pickup(); sparkle(Player.x + 30, Player.y - 40);
          this.tapWindow = -1;
        } else {
          Vape.v = Math.max(0, Vape.v - 4);
          this.taps = Math.max(0, this.taps - 1);
        }
      }
      if (this.taps >= this.tapTarget && !this.done){
        this.done = true;
        Boss.end(Math.floor(2500 * Krass.mul()));
      }
    }
  }
  draw(){
    ctx.fillStyle='rgba(20,30,40,0.7)'; ctx.fillRect(0,0,CFG.W,CFG.H);
    // Drexler
    const dx = CFG.W*0.65, dy = CFG.H*0.4;
    ctx.fillStyle='#a08c5c'; ctx.fillRect(dx, dy, 80, 120);
    ctx.fillStyle='#f4c896'; ctx.fillRect(dx+18, dy-32, 44, 32);
    ctx.fillStyle='#999'; ctx.fillRect(dx+18, dy-32, 44, 8); // grey hair
    ctx.fillStyle='#000'; ctx.fillRect(dx+25, dy-18, 4,4); ctx.fillRect(dx+47, dy-18, 4,4);
    // beige sandals + white socks
    ctx.fillStyle='#fff'; ctx.fillRect(dx+10, dy+125, 24, 8); ctx.fillRect(dx+46, dy+125, 24, 8);
    ctx.fillStyle='#a08550'; ctx.fillRect(dx+8, dy+130, 28, 6); ctx.fillRect(dx+44, dy+130, 28, 6);
    ctx.strokeStyle='#000'; ctx.lineWidth=1.5; ctx.strokeRect(dx, dy, 80, 120);
    // thermos
    ctx.fillStyle='#222'; ctx.fillRect(dx-14, dy+20, 12, 30);
    // bubble
    if (this.bubbleT > 0) drawBubble(CFG.W*0.3, 80, this.line, 11);
    // tap meter
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(CFG.W*0.2, 150, CFG.W*0.6, 60);
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(CFG.W*0.2, 150, CFG.W*0.6, 60);
    ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"'; ctx.textAlign='center';
    ctx.fillText('Unterschrift fälschen — Tap im Beat!', CFG.W*0.5, 170);
    const bw = (CFG.W*0.55)*(this.taps/this.tapTarget);
    ctx.fillStyle = this.tapWindow > 0 ? '#5af' : '#fff';
    ctx.fillRect(CFG.W*0.225, 185, bw, 12);
    ctx.fillStyle='#fff'; ctx.fillText(`${this.taps}/${this.tapTarget}`, CFG.W*0.5, 205);
  }
}

// ===== BOSS 4 — DIE POLIZEI =====
class B4_Polizei extends BossBase {
  init(){
    this.phase = 1; this.holdT = 0; this.holding=false; this.confiscated=false;
    this.line = "Junger Mann. Halt mal kurz an, ja?";
    this.lineT = 3;
  }
  update(dt){
    super.update(dt);
    this.lineT -= dt;
    // hold spacebar mini-game
    const heldNow = Input.keys.jump || Input.touchJump;
    if (heldNow && !this.holding){ this.holding = true; this.holdT = 0; }
    if (this.holding && heldNow) this.holdT += dt;
    if (this.holding && !heldNow){
      this.holding = false;
      const t = this.holdT;
      if (t < 3.7){ this.line = "Nochmal, bitte."; this.lineT = 2; this.holdT = 0; }
      else if (t > 4.3){ this.line = "Übertreib's nicht."; this.lineT = 2; this.holdT = 0; }
      else {
        // success
        this.done = true;
        if (Krass.isLegende()){
          Krass.add(500, "Ich kenne meine Rechte, Brudi!");
        }
        Krass.add(2000, 'POLIZEI GHOSTED');
        Game.flyerOnGround = true;
        Boss.end(Math.floor(3000 * Krass.mul()));
      }
    }
  }
  draw(){
    ctx.fillStyle='rgba(0,40,80,0.4)'; ctx.fillRect(0,0,CFG.W,CFG.H);

    const cx = CFG.W*0.55, cy = CFG.GROUND_Y - 80;
