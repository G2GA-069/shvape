    ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"';
    ctx.fillText(`${t.toFixed(1)} s`, CFG.W*0.5, 218);
  }
}

// ===== BOSS 5 — RUDOLF SHVAPE =====
class B5_Rudolf extends BossBase {
  init(){
    this.duration = 45; this.timeLeft = 45;
    this.sighs = []; this.shoes = [];
    this.sighT = 2; this.shoeT = 4;
    this.savedSpeed = Game.speed; Game.speed *= 1.4;
  }
  update(dt){
    super.update(dt);
    this.timeLeft -= dt;
    this.sighT -= dt; this.shoeT -= dt;
    if (this.sighT <= 0){
      // disappointment wave
      this.sighs.push({x:CFG.W-20, y:CFG.GROUND_Y-110, vx:-160, w:40, h:60, life:3, maxLife:3});
      this.sighT = rand(2.0, 3.0);
    }
    if (this.shoeT <= 0){
      this.shoes.push({x:CFG.W-30, y:CFG.GROUND_Y-150, vx:-220, vy:-150, w:30, h:18});
      this.shoeT = rand(2.5, 4.5);
    }
    const hb = Player.hb();
    const krassMul = Krass.isLegende() ? 1.7 : (Krass.tier()>=3 ? 1.4 : 1);
    for (let i=this.sighs.length-1;i>=0;i--){
      const s = this.sighs[i];
      s.x += s.vx*dt; s.life -= dt;
      if (s.life <= 0) { this.sighs.splice(i,1); continue; }
      if (aabb(hb, {x:s.x, y:s.y, w:s.w, h:s.h})){
        Player.hit(15*krassMul, 'SEUFZ');
        Player.x -= 30*krassMul;
        this.sighs.splice(i,1);
      }
    }
    for (let i=this.shoes.length-1;i>=0;i--){
      const sh = this.shoes[i];
      sh.x += sh.vx*dt; sh.y += sh.vy*dt; sh.vy += 600*dt;
      if (sh.y > CFG.GROUND_Y) { this.shoes.splice(i,1); continue; }
      if (aabb(hb, {x:sh.x, y:sh.y, w:sh.w, h:sh.h})){
        Player.hit(15, 'HAUSSCHUH');
        this.shoes.splice(i,1);
      }
    }
    if (this.timeLeft <= 0 && !this.done){
      this.done = true;
      Game.speed = this.savedSpeed;
      HUD.note('VATER ENTTÄUSCHT', '#ff66ff');
      Boss.end(Math.floor(3500 * Krass.mul()));
    }
  }
  draw(){
    // Rudolf at right side
    const rx = CFG.W*0.82, ry = CFG.GROUND_Y - 150;
    ctx.fillStyle='#3a4a30'; ctx.fillRect(rx, ry, 80, 100);
    ctx.fillStyle='#f4c896'; ctx.fillRect(rx+20, ry-40, 40, 40);
    ctx.fillStyle='#f4c896'; ctx.fillRect(rx+20, ry-40, 40, 6);
    // bald (no hair)
    ctx.fillStyle='#000'; ctx.fillRect(rx+28, ry-22, 4,4); ctx.fillRect(rx+48, ry-22, 4,4);
    // bild zeitung in hand
    ctx.fillStyle='#fff'; ctx.fillRect(rx-14, ry+40, 22, 8);
    ctx.fillStyle='#dd0000'; ctx.fillRect(rx-14, ry+40, 22, 3);
    ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.strokeRect(rx, ry, 80, 100);
    ctx.strokeRect(rx+20, ry-40, 40, 40);
    // sighs
    for (const s of this.sighs){
      const x = s.x, a = s.life/s.maxLife;
      ctx.globalAlpha = a*0.7;
      ctx.fillStyle='rgba(180,180,200,0.6)';
      ctx.beginPath(); ctx.ellipse(x+s.w/2, s.y+s.h/2, s.w*0.7, s.h*0.4, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#222'; ctx.font='12px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText('*seufz*', x+s.w/2, s.y+s.h/2);
      ctx.globalAlpha = 1;
    }
    // shoes
    for (const sh of this.shoes){
      ctx.fillStyle='#5a3a14'; ctx.fillRect(sh.x, sh.y, sh.w, sh.h);
      ctx.strokeStyle='#000'; ctx.strokeRect(sh.x, sh.y, sh.w, sh.h);
    }
    // timer
    ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"'; ctx.textAlign='center';
    ctx.strokeStyle='#000'; ctx.lineWidth=3;
    const s = `${Math.ceil(this.timeLeft)} Sek bis Tagesschau`;
    ctx.strokeText(s, CFG.W/2, 100); ctx.fillText(s, CFG.W/2, 100);
  }
}

// ===== BOSS 6 — DER SCHWARZWALD =====
class B6_Schwarzwald extends BossBase {
  init(){
    this.checkpoints = 3; this.collected = 0;
    this.savedDrain = CFG.VAPE_DRAIN_BASE;
    this.spawnT = 0; this.cakeT = 0; this.helmut = {x:CFG.W+200, y:CFG.GROUND_Y-50, w:80, h:50, hp:3, vx:-180};
    this.whisperT = 0;
  }
  update(dt){
    super.update(dt);
    Vape.v = Math.max(0, Vape.v - 1.6*dt); // double drain
    this.spawnT -= dt; this.cakeT -= dt; this.whisperT -= dt;
    // Pfifferling checkpoints
    if (this.spawnT <= 0){
      this.spawnT = rand(3, 5);
      Entities.push({x:Game.scrollX+CFG.W+50, y:CFG.GROUND_Y-rand(80,200), w:30, h:30, type:'pfifferling', pickup:true, alive:true, animT:0,
        onCollect:()=>{ this.collected++; HUD.note(`Pfifferling ${this.collected}/3`, '#ffd633'); }});
    }
    // Cake (looks like pickup, hurts)
    if (this.cakeT <= 0){
      this.cakeT = rand(2, 3.5);
      Entities.push({x:Game.scrollX+CFG.W+50, y:CFG.GROUND_Y-rand(80,180), w:36, h:30, type:'kirschtorte', alive:true, animT:0});
    }
    // Helmut (Wildschwein)
    this.helmut.x += this.helmut.vx*dt;
    if (this.helmut.x < -100) this.helmut.x = CFG.W+200;
    const hb = Player.hb();
    if (aabb(hb, {x:this.helmut.x, y:this.helmut.y, w:this.helmut.w, h:this.helmut.h})){
      if (Player.vy > 200){ this.helmut.hp--; Player.vy = -500; if (this.helmut.hp<=0) this.helmut.x = CFG.W+500; }
      else Player.hit(20, 'WILDSAU');
    }
    // collect pfifferlings via entity hook
    for (const e of Entities){
      if (e.type==='pfifferling' && !e.alive && e.onCollect && !e._consumed){ e.onCollect(); e._consumed=true; }
    }
    if (this.whisperT <= 0){
      HUD.note('"Bin Run..."', '#aabbaa'); this.whisperT = rand(4,7);
    }
    if (this.collected >= this.checkpoints && !this.done){
      this.done = true;
      Boss.end(Math.floor(4000 * Krass.mul()));
    }
  }
  draw(){
    // vignette
    const grd = ctx.createRadialGradient(Player.x+30, Player.y+40, 100, Player.x+30, Player.y+40, 600);
    grd.addColorStop(0, 'rgba(0,0,0,0)');
    grd.addColorStop(1, 'rgba(0,0,0,0.85)');
    ctx.fillStyle=grd; ctx.fillRect(0,0,CFG.W,CFG.H);
    // Helmut
    if (this.helmut.x < CFG.W+50 && this.helmut.x > -100){
      const hx = this.helmut.x;
      ctx.fillStyle='#3a2a18';
      ctx.beginPath(); ctx.ellipse(hx+40, this.helmut.y+25, 40, 20, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillRect(hx+10, this.helmut.y+30, 8, 16); ctx.fillRect(hx+40, this.helmut.y+30, 8, 16); ctx.fillRect(hx+60, this.helmut.y+30, 8, 16);
      // tusks
      ctx.fillStyle='#fff'; ctx.fillRect(hx, this.helmut.y+25, 4, 6);
      // hp bar
      ctx.fillStyle='#ff3030'; ctx.fillRect(hx, this.helmut.y - 14, this.helmut.w*(this.helmut.hp/3), 4);
      ctx.fillStyle='#fff'; ctx.font='6px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText('WILDSAU', hx+40, this.helmut.y - 18);
    }
    // entities (kirschtorte / pfifferling) drawn in normal pipeline
    // counter
    ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"'; ctx.textAlign='left';
    ctx.strokeStyle='#000'; ctx.lineWidth=3;
    const s = `Pfifferling: ${this.collected}/3`;
    ctx.strokeText(s, 30, 100); ctx.fillText(s, 30, 100);
  }
}

const BOSS_CLASSES = [B1_Zeugnis, B2_Clique, B3_Drexler, B4_Polizei, B5_Rudolf, B6_Schwarzwald, B7_Mutter];

// ===== ENCOUNTERS =====
const Encounter = {
  active: null,
  start(name){
    Game.inEncounter = true;
    Game.state = 'ENCOUNTER';
    const cls = ENCOUNTER_CLASSES[name];
    if (!cls){ Game.inEncounter = false; Game.state='PLAY'; return; }
    this.active = new cls();
    this.active.init();
    HUD.note(`!! ${this.active.title} !!`, '#88ccff');
  },
  end(reward){
    if (!this.active) return;
    Game.baseScore += reward;
    HUD.note(`+${reward} — überlebt!`, '#88ccff');
    this.active = null;
    Game.inEncounter = false;
    Game.state = 'PLAY';
    Game.encounterCooldown = rand(45, 75);
  },
  update(dt){ if (this.active) this.active.update(dt); },
  draw(){ if (this.active) this.active.draw(); },
};

class EncBase {
  constructor(){ this.t=0; this.done=false; this.title='ENCOUNTER'; this.duration=15; }
  init(){}
  update(dt){
    this.t += dt;
    Player.update(dt);
    Vape.update(dt);
    Krass.update(dt, false);
  }
  draw(){}
}

// FRAU HERTA
class E_Herta extends EncBase {
  constructor(){ super(); this.title='FRAU HERTA'; this.duration=12; }

    this.bubbleI = 0; this.bubbleT = 2.5;
    this.phoneRingT = -1;
    this.escapeWindow = 0;
    this.slowMul = 1;
  }
  update(dt){
    super.update(dt);
    this.bubbleT -= dt;
    if (this.bubbleT <= 0){
      this.slowMul *= 0.95;
      Game.speed *= 0.97;
      this.bubbleI++;
      if (this.bubbleI >= HERTA_BUBBLES.length){
        this.done = true;
        Encounter.end(500);
        return;
      }
      this.bubbleT = 3.0;
    }

    if (this.phoneRingT < 0 && Math.random() < 0.5*dt){
      this.phoneRingT = 0; this.escapeWindow = 3;
    }
    if (this.escapeWindow > 0){
      this.escapeWindow -= dt;
      if (Input.pressed.jump || Input.pressed.right){
        this.done = true; Encounter.end(500); return;
      }
      if (this.escapeWindow <= 0) this.phoneRingT = -1;
    }
    // vape in face

      Krass.add(300, 'INS GESICHT GEDAMPFT');
      this.bubbleT = 3;
    }

    }
    const hb = Player.hb();
    for (let i=this.wurst.length-1;i>=0;i--){
      const w = this.wurst[i];
      if (w.homing){
        const dx = (Player.x+30) - w.x, dy = Player.y - w.y;
        const d = Math.hypot(dx,dy);
        w.vx += (dx/d)*120*dt; w.vy += (dy/d)*120*dt;
      }
      w.x += w.vx*dt; w.y += w.vy*dt; w.vy += 400*dt;
      if (w.y > CFG.GROUND_Y || w.x < -50) { this.wurst.splice(i,1); continue; }
      if (aabb(hb, {x:w.x, y:w.y, w:w.w, h:w.h})){
        Player.hit(15, w.homing?'MAULTASCHE':'BRATWURST');
        this.wurst.splice(i,1);
      }
    }
    // jump on Bierkasten
    if (aabb(hb, {x:this.kasten.x, y:this.kasten.y, w:this.kasten.w, h:this.kasten.h}) && Player.vy > 100){
      this.kasten.hp = 0; Player.vy = -500;
      this.done = true;
      comicBurst(this.kasten.x, this.kasten.y, 'PROST!');
      HUD.note('"Mein Bier..."', '#ffd633');
      Encounter.end(800);
      return;
    }
    if (this.t > this.duration) { this.done=true; Encounter.end(400); }
  }
  draw(){
    ctx.fillStyle='rgba(255,160,80,0.2)'; ctx.fillRect(0,0,CFG.W,CFG.H);
    // Grill
    const gx = CFG.W*0.78, gy = CFG.GROUND_Y - 130;
    ctx.fillStyle='#5a3520'; ctx.fillRect(gx-10, gy+20, 80, 80);
    ctx.fillStyle='#222'; ctx.fillRect(gx, gy, 60, 24);
    ctx.fillStyle='#ff5500'; ctx.fillRect(gx+4, gy-4, 52, 6);
    // Grillmeister
    ctx.fillStyle='#fff'; ctx.fillRect(gx-50, gy+20, 30, 60);
    ctx.fillStyle='#d33'; ctx.fillRect(gx-48, gy+22, 26, 14);
    ctx.fillStyle='#fff'; ctx.font='6px "Press Start 2P"'; ctx.textAlign='center'; ctx.fillText('GRILLKÖNIG', gx-35, gy+32);
    ctx.fillStyle='#f4c896'; ctx.fillRect(gx-44, gy-10, 18, 22);
    ctx.fillStyle='#000'; ctx.fillRect(gx-40, gy-2, 3,3); ctx.fillRect(gx-32, gy-2, 3,3);
    drawBubble(gx-200, gy-50, 'Hier wird GEGRILLT!', 10);
    // Bierkasten
    if (this.kasten.hp > 0){
      const kx = this.kasten.x;
      ctx.fillStyle='#fce04a'; ctx.fillRect(kx, this.kasten.y, this.kasten.w, this.kasten.h);
      ctx.strokeStyle='#000'; ctx.strokeRect(kx, this.kasten.y, this.kasten.w, this.kasten.h);
      ctx.fillStyle='#fff'; ctx.font='6px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText('BIER', kx+25, this.kasten.y+30);
    }
    // Würste
    for (const w of this.wurst){
      ctx.save();
      ctx.translate(w.x, w.y);
      ctx.rotate(Math.atan2(w.vy, w.vx));
      ctx.fillStyle = w.homing?'#cca85a':'#a85a30';
      ctx.fillRect(-15,-7,30,14);
      ctx.strokeStyle='#000'; ctx.strokeRect(-15,-7,30,14);
      ctx.restore();
    }
  }
}

// BUSHALTESTELLE-PERFORMANCE
class E_Bus extends EncBase {
  constructor(){ super(); this.title='BUSHALTESTELLE'; }
  init(){
    this.beat = 0; this.beatT = 0; this.successes=0; this.target=8;
    this.tricks = ['heart','ring','alda','finger'];
  }
  update(dt){
    super.update(dt);
    this.beatT += dt;
    const beatPeriod = 0.7;
    const inWindow = (this.beatT % beatPeriod) > beatPeriod-0.25;
    if (Input.pressed.vape || Input.pressed.jump){
      if (inWindow){
        this.successes++;
        const trick = this.tricks[this.successes % this.tricks.length];
        const word = trick==='alda'?'ALDA':trick==='finger'?'🖕':null;
        vapeCloud(Player.x+30, Player.y-30, word);
        Krass.add(80, 'TRICK WAHLLAH');
        comicBurst(Player.x+30, Player.y-50, 'KRASS!');
        if (this.successes >= this.target){
          this.done = true; Krass.add(2000, 'BUSHALTESTELLE GOAT');
          HUD.note('Realschüler: "Wahllah, krass digga!"', '#ffd633');
          Encounter.end(1500); return;
        }
      } else {
        Krass.add(-500, 'L, HART CRINGE');
        HUD.note('Justin DM: "Hart L. Raff dich, Brudi."', '#ff5050');
      }
    }
    if (this.t > 15) { this.done=true; Encounter.end(0); }
  }
  draw(){
    // Wartehäuschen
    const wx = CFG.W*0.7, wy = CFG.GROUND_Y - 130;
    ctx.fillStyle='rgba(160,180,200,0.3)';
    ctx.fillRect(wx, wy, 200, 130);
    ctx.fillStyle='#888'; ctx.fillRect(wx, wy, 200, 16);
    // 3 Realschüler
    for (let i=0;i<3;i++){
      ctx.fillStyle = ['#222','#444','#a52'][i];
      ctx.fillRect(wx+30+i*50, wy+50, 30, 60);
      ctx.fillStyle='#f4c896'; ctx.fillRect(wx+34+i*50, wy+30, 22, 22);
      ctx.fillStyle='#000'; ctx.fillRect(wx+38+i*50, wy+38, 3,3); ctx.fillRect(wx+50+i*50, wy+38, 3,3);
    }
    // beat indicator
    const beatPeriod = 0.7;
    const phase = (this.beatT % beatPeriod) / beatPeriod;
    const inWindow = phase > 1 - 0.25/beatPeriod;
    ctx.fillStyle = inWindow ? '#7fff7f' : '#fff';
    ctx.fillRect(CFG.W*0.5 - 100, 130, 200, 12);
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(CFG.W*0.5 - 100 + 200*phase - 4, 124, 8, 24);
    ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"'; ctx.textAlign='center';
    ctx.strokeStyle='#000'; ctx.lineWidth=3;
    const s = `[V/JUMP] BEAT! ${this.successes}/${this.target}`;
    ctx.strokeText(s, CFG.W*0.5, 110); ctx.fillText(s, CFG.W*0.5, 110);
  }
}

// GRAFFITI — THE THESIS MECHANIC
class E_Graffiti extends EncBase {
  constructor(){ super(); this.title='DAS GRAFFITI'; }
  init(){
    this.holdT = 0; this.holding = false;
    this.polizeiT = 0; this.busted=false;
  }
  update(dt){
    super.update(dt);
    const heldNow = Input.keys.jump || Input.touchJump || Input.keys.vape;
    this.holding = heldNow;
    if (heldNow){
      this.holdT += dt;
      this.polizeiT += dt;
      Vape.v = Math.max(0, Vape.v - 4*dt);
      if (Math.random() < 0.4) spawnParticle({x:Player.x+50, y:Player.y+30, vx:rand(-30,30), vy:rand(-20,20), size:rand(2,5), color:'#ff66ff', life:0.5, maxLife:0.5});
      if (this.polizeiT >= 5){
        this.busted = true;
        HUD.note('POLIZEI! YALLAH WEG!', '#ff3030');
        Boss.start(3); // trigger Polizei (idx 3)
        this.done=true; Encounter.end(0); return;
      }
    } else {
      // released — finalize
      if (this.holdT > 0.3){
        let krass=0, tag='';
        if (this.holdT < 1.5){ krass=100; tag='BIN RUN'; }
        else if (this.holdT < 2.5){ krass=300; tag='BIN RUN 04'; }
        else if (this.holdT < 3.5){ krass=600; tag='BIN RUN WAR HIER'; }
        else { krass=1500; tag='SHVAPE GANG 4 LIFE'; }
        Krass.add(krass, `TAG: ${tag}`);
        comicBurst(Player.x+50, Player.y-30, 'TAG!');
        Game.baseScore += krass*2;
        this.done = true; Encounter.end(krass);
        return;
      }
      if (this.t > 8) { this.done=true; Encounter.end(0); }
    }
  }
  draw(){
    // Underpass wall
    ctx.fillStyle='rgba(80,80,100,0.5)'; ctx.fillRect(0,0,CFG.W, CFG.GROUND_Y);
    ctx.fillStyle='#a8a8a8'; ctx.fillRect(0, CFG.GROUND_Y-300, CFG.W, 300);

    ctx.fillStyle='#444'; ctx.font='bold 22px Bangers, sans-serif';
    ctx.fillText('MURAT KA', 80, 200); ctx.fillText('JD ❤ ML', 400, 230);
    // tag in progress
    let tag='';
    if (this.holdT < 1.5) tag='BIN RUN';
    else if (this.holdT < 2.5) tag='BIN RUN 04';
    else if (this.holdT < 3.5) tag='BIN RUN WAR HIER';
    else tag='SHVAPE GANG 4 LIFE';
    if (this.holdT > 0.3){
      ctx.save();
      ctx.fillStyle='#ff66ff';
      ctx.font=`bold ${24 + this.holdT*8}px Bangers, sans-serif`;
      ctx.textAlign='center'; ctx.strokeStyle='#000'; ctx.lineWidth=4;
      const tx = Player.x + 100, ty = 200;
      ctx.strokeText(tag, tx, ty); ctx.fillText(tag, tx, ty);
      ctx.restore();
    }
    // hold meter
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(CFG.W*0.15, 100, CFG.W*0.7, 60);
    ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"'; ctx.textAlign='center';
    ctx.fillText('[JUMP/V HALTEN] länger = krasser, aber POLIZEI kommt!', CFG.W*0.5, 122);
    // hold bar
    ctx.fillStyle='#444'; ctx.fillRect(CFG.W*0.18, 134, CFG.W*0.64, 16);
    const fill = clamp(this.polizeiT/5, 0, 1);
    ctx.fillStyle = this.polizeiT>4 ? '#ff3030' : this.polizeiT>3 ? '#ffaa30' : '#88ff88';
    ctx.fillRect(CFG.W*0.18, 134, CFG.W*0.64*fill, 16);
    if (this.polizeiT > 3.5){
      ctx.fillStyle='#ff3030'; ctx.font='12px "Press Start 2P"';
      ctx.fillText('POLIZEI NÄHERT SICH!', CFG.W*0.5, 178);
    }
  }
}

// ===== HUD =====
const HUD = {
  notes: [],
  popup: null,           // current Sigma/DM popup
  popupT: 0,             // remaining display time
  nextPopupT: 25,        // seconds until next firing
  note(text, color){
    // Suppress an exact duplicate if it's still on screen — keeps the HUD
    // readable when something fires repeatedly (e.g. multiple chain-vapes
    // arriving inside the same 2.5-sec window).
    const top = this.notes[this.notes.length-1];
    if (top && top.text === text){
      top.t = 0; // reset its life so it stays the same single line
      return;
    }
    this.notes.push({text, color: color||'#fff', t:0, life:2.0});
    // Hard cap on visible queue — keeps it from turning into a wall of text.
    if (this.notes.length > 5) this.notes.splice(0, this.notes.length - 5);
  },
  recentPopups: [],   // anti-repeat buffer
  firePopup(){
    // Pick a Sigma rule or DM that ISN'T in the last ~12 we've shown.
    // Prevents the same line firing twice in close succession even though
    // each pool is now 70+ entries.
    const pickFresh = (pool, getKey)=>{
      let pick = pool[Math.floor(Math.random()*pool.length)];
      let tries = 0;
      while (this.recentPopups.indexOf(getKey(pick))>=0 && tries<8){
        pick = pool[Math.floor(Math.random()*pool.length)];
        tries++;
      }
      this.recentPopups.push(getKey(pick));
      if (this.recentPopups.length > 12) this.recentPopups.shift();
      return pick;
    };
    if (Math.random() < 0.5){
      const t = pickFresh(SIGMA_RULES, s=>'S:'+s);
      this.popup = {kind:'sigma', text: t};
    } else {
      const [user, msg] = pickFresh(INSTA_DMS, dm=>'D:'+dm[0]+':'+dm[1]);
      this.popup = {kind:'dm', user, msg};
    }
    this.popupT = 4.5;
  },
  update(dt){
    for (let i=this.notes.length-1;i>=0;i--){
      this.notes[i].t += dt;
      if (this.notes[i].t > this.notes[i].life) this.notes.splice(i,1);
    }
    // Pop-up scheduling — fire frequently in PLAY, less during boss/encounter
    // so the player is never safe from surprise. Skip MENU and DEATH.
    const stateOk = (Game.state==='PLAY' || Game.state==='BOSS' || Game.state==='ENCOUNTER');
    if (stateOk){
      this.nextPopupT -= dt;
      if (this.nextPopupT <= 0){
        this.firePopup();
        // Frequent during normal play, rarer during bosses (don't drown out the fight)
        if (Game.inBoss || Game.inEncounter) this.nextPopupT = rand(28, 55);
        else this.nextPopupT = rand(18, 42);
      }
    }
    if (this.popupT > 0) this.popupT -= dt;
    else this.popup = null;
  },
  drawPopup(){
    if (!this.popup) return;
    const slide = this.popupT > 3.5 ? (4.5 - this.popupT) / 1 : (this.popupT < 0.6 ? this.popupT / 0.6 : 1);
    const targetX = CFG.W - 360, restX = CFG.W + 20;
    const x = lerp(restX, targetX, clamp(slide, 0, 1));
    const y = 110;
    ctx.save();
    if (this.popup.kind === 'sigma'){
      ctx.fillStyle = '#000'; ctx.fillRect(x-4, y-4, 348, 76);
      ctx.fillStyle = '#ffd633'; ctx.fillRect(x, y, 340, 68);
      ctx.fillStyle='#000'; ctx.font='bold 12px "Press Start 2P"'; ctx.textAlign='left';
      ctx.fillText('SIGMA RULE', x+12, y+22);
      ctx.font='9px "Press Start 2P"';
      // Wrap text
      const words = this.popup.text.split(' ');
      let line='', ly = y+42;
      for (const w of words){
        const test = line + w + ' ';
        if (ctx.measureText(test).width > 320){ ctx.fillText(line, x+12, ly); line = w+' '; ly += 13; }
        else line = test;
      }
      if (line) ctx.fillText(line, x+12, ly);
    } else {
      // Insta DM
      ctx.fillStyle = '#000'; ctx.fillRect(x-4, y-4, 348, 76);
      ctx.fillStyle = '#fff'; ctx.fillRect(x, y, 340, 68);
      // gradient pill (insta-purple/pink)
      const g = ctx.createLinearGradient(x, y, x+340, y);
      g.addColorStop(0, '#fdb74e'); g.addColorStop(0.5, '#e93077'); g.addColorStop(1, '#7a3eaa');
      ctx.fillStyle = g; ctx.fillRect(x, y, 6, 68);
      // avatar circle
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x+34, y+34, 18, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x+34, y+34, 14, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#000'; ctx.font='bold 16px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(this.popup.user[0].toUpperCase(), x+34, y+34);
      // text
      ctx.textBaseline='alphabetic'; ctx.textAlign='left';
      ctx.fillStyle='#000'; ctx.font='bold 11px "Press Start 2P"';
      ctx.fillText('@'+this.popup.user, x+62, y+24);
      ctx.font='10px "Press Start 2P"'; ctx.fillStyle='#444';
      ctx.fillText('jetzt', x+62, y+38);
      ctx.font='10px "Press Start 2P"'; ctx.fillStyle='#000';
      // Wrap msg
      const words = this.popup.msg.split(' ');
      let line='', ly = y+58;
      for (const w of words){
        const test = line + w + ' ';
        if (ctx.measureText(test).width > 260){ ctx.fillText(line, x+62, ly); line = w+' '; ly += 13; }
        else line = test;
      }
      if (line) ctx.fillText(line, x+62, ly);
    }
    ctx.restore();
  },
  draw(){
    // top-left: vape battery + LED heart
    const vw = 220, vh = 36;
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.fillRect(20, 20, vw, vh);
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(20, 20, vw, vh);
    // battery cap
    ctx.fillStyle='#fff'; ctx.fillRect(20+vw, 28, 4, 20);
    // fill
    const vp = clamp(Vape.v/100, 0, 1);
    const vc = Vape.v < 25 ? '#ff3030' : Vape.v < 50 ? '#ffaa30' : '#7fff7f';
    ctx.fillStyle = vc; ctx.fillRect(24, 24, (vw-8)*vp, vh-8);
    // text
    ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"'; ctx.textAlign='left';
    ctx.fillText(`VAPE ${Math.floor(Vape.v)}%`, 30, 42);
    // heart
    const pulse = 1 + Math.sin(Vape.heartT * (Vape.v<25?12:6))*0.3;
    ctx.save();
    ctx.translate(vw + 50, 38);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = Vape.v<25 ? '#ff3030' : '#ff66aa';
    drawHeart(0,-6,4);
    ctx.restore();
    // POD EINSETZEN voice indicator
    if (Vape.podVoiceT > 0){
      ctx.fillStyle='#ff3030'; ctx.font='10px "Press Start 2P"';
      ctx.fillText('POD EINSETZEN', 20, 78);
    }

    // top-right: time, score, combo
    const totalScore = Math.floor((Game.baseScore + Game.realT*10) * Krass.mul());
    ctx.textAlign='right'; ctx.fillStyle='#fff'; ctx.font='12px "Press Start 2P"';
    ctx.strokeStyle='#000'; ctx.lineWidth=3;
    const time = `${Math.floor(Game.realT/60)}:${String(Math.floor(Game.realT%60)).padStart(2,'0')}`;
    ctx.strokeText(time, CFG.W-80, 42); ctx.fillText(time, CFG.W-80, 42);
    const sc = `${totalScore}`;
    ctx.font='14px "Press Start 2P"';
    ctx.strokeText(sc, CFG.W-80, 64); ctx.fillText(sc, CFG.W-80, 64);
    if (Game.combo > 1){
      ctx.fillStyle='#ffd633'; ctx.font='10px "Press Start 2P"';
      const cs = `ALDA-COMBO ×${Game.combo}`;
      ctx.strokeText(cs, CFG.W-80, 88); ctx.fillText(cs, CFG.W-80, 88);
    }

    // right side: Aura meter + tier label
    const kx = CFG.W - 60, ky = 120, kw = 36, kh = 360;
    const tier = Krass.tier();
    const tierData = KRASS_TIERS[tier];
    const pulseK = 1 + Krass.pulseT*1.5;
    ctx.save();
    ctx.translate(kx + kw/2, ky + kh/2);
    if (tier >= 3 && !CFG.REDUCED_MOTION) ctx.translate(rand(-2,2), rand(-2,2));
    ctx.scale(pulseK, pulseK);
    ctx.translate(-kw/2, -kh/2);
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, kw, kh);
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(0, 0, kw, kh);
    // fill
    const kp = Krass.v / 100;
    const fillH = kh*kp;
    ctx.fillStyle = tierData.color;
    ctx.fillRect(0, kh-fillH, kw, fillH);
    // flame icon
    ctx.fillStyle='#ff3030';
    ctx.beginPath();
    ctx.moveTo(kw/2, -8); ctx.lineTo(kw/2-8, 6); ctx.lineTo(kw/2, 0); ctx.lineTo(kw/2+8, 6); ctx.closePath(); ctx.fill();
    ctx.restore();
    // tier label
    ctx.textAlign='center';
    ctx.font='12px "Press Start 2P"';
    ctx.fillStyle = tierData.color;
    ctx.strokeStyle='#000'; ctx.lineWidth=3;
    let label = tierData.label;
    if (tier===4){
      ctx.fillStyle = `hsl(${(Game.realT*200)%360}, 100%, 60%)`;
    }
    ctx.strokeText(label, kx + kw/2, ky+kh+24);
    ctx.fillText(label, kx + kw/2, ky+kh+24);
    // multiplier
    ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"';
    ctx.strokeText(`×${tierData.mul}`, kx+kw/2, ky+kh+42);
    ctx.fillText(`×${tierData.mul}`, kx+kw/2, ky+kh+42);
    // face
    ctx.font='10px "Press Start 2P"';
    ctx.strokeText(tierData.face, kx+kw/2, ky-10);
    ctx.fillText(tierData.face, kx+kw/2, ky-10);

    // notes
    ctx.textAlign='center';
    let ny = CFG.H - 40;
    for (let i=this.notes.length-1; i>=0; i--){
      const n = this.notes[i];
      const a = clamp(1 - n.t/n.life, 0, 1);
      ctx.globalAlpha = a;
      ctx.font='12px "Press Start 2P"';
      ctx.fillStyle = n.color;
      ctx.strokeStyle='#000'; ctx.lineWidth=3;
      ctx.strokeText(n.text, CFG.W/2, ny);
      ctx.fillText(n.text, CFG.W/2, ny);
      ny -= 22;
      if (ny < 200) break;
    }
    ctx.globalAlpha = 1;

    // double jump indicator
    if (Game.doubleJumpUnlocked && Game.realT - CFG.DOUBLE_JUMP_UNLOCK_T < 4){
      ctx.fillStyle='#ffd633'; ctx.font='14px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText('Doppel-Sprung freigeschaltet!', CFG.W/2, 130);
    }

    // Catchphrase floating occasionally
    if (Math.floor(Game.realT*0.5) % 8 === 0 && Game.realT > 2 && (Math.floor(Game.realT*2) % 16 === 0)){
      const phrase = choice(Game.catchphrase);
      drawBubble(Player.x + 50, Player.y - 60, phrase, 10);
    }

    // Flyer on ground (after Polizei)
    if (Game.flyerOnGround){

    if (_zoneBannerT > 0){

function saveScore(score){
  try{
    const key = Game.daily ? `shvape_daily_${Game.seedStr}` : 'shvape_best';
    const list = JSON.parse(localStorage.getItem(key) || '[]');
    list.push({score, name: choice(NICKNAMES), date: new Date().toISOString().slice(0,10)});
    list.sort((a,b)=>b.score-a.score);
    list.length = Math.min(10, list.length);
    localStorage.setItem(key, JSON.stringify(list));
    if (Game.daily) Game.bestScoreDaily = list[0].score;
    else Game.bestScore = list[0].score;
  }catch(e){}
}
function loadBest(){
  try{
    const list = JSON.parse(localStorage.getItem('shvape_best') || '[]');
    Game.bestScore = list[0]?.score || 0;
    const key = `shvape_daily_${todaySeed()}`;
    const dl = JSON.parse(localStorage.getItem(key) || '[]');
    Game.bestScoreDaily = dl[0]?.score || 0;
  }catch(e){}
}
function todaySeed(){
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
function getLeaderboard(daily){
  const key = daily ? `shvape_daily_${todaySeed()}` : 'shvape_best';
  return JSON.parse(localStorage.getItem(key) || '[]');
}

    const panels = [
      {title:'SPRUNG',     icon:'jump',   text:'JUMP / SPACE\noder rechts antippen.\nHalten = höher.\nNach 30 Sek:\nDoppel-Sprung.'},
      {title:'VAPE',       icon:'vape',   text:'Akku läuft leer\n→ du erstickst.\nPods aufsammeln.\nPulsendes Herz =\n<25%, raff dich.'},

    ctx.fillRect(-bw/2, -bh/2, bw, bh);
    ctx.strokeStyle='#000'; ctx.lineWidth=6; ctx.strokeRect(-bw/2, -bh/2, bw, bh);
    ctx.fillStyle='#fff'; ctx.font='bold 36px Bangers, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.strokeStyle='#000'; ctx.lineWidth=3;
    ctx.strokeText('RAFF DICH UND LOS!', 0, 2);
    ctx.fillText('RAFF DICH UND LOS!', 0, 2);
    ctx.restore();
    ctx.font='10px "Press Start 2P"'; ctx.fillStyle='#fff';
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.strokeStyle='#000'; ctx.lineWidth=3;
    ctx.strokeText('[SPACE] oder TIPPEN', CFG.W/2, by+bh+28);
    ctx.fillText('[SPACE] oder TIPPEN', CFG.W/2, by+bh+28);
  }
};

function drawTutorialIcon(kind, x, y, t){
  ctx.save();
  ctx.translate(x, y);
  if (kind==='jump'){
    // up arrow + hop dust
    ctx.fillStyle='#000';
    ctx.beginPath();
    ctx.moveTo(0,-22); ctx.lineTo(18,-2); ctx.lineTo(8,-2); ctx.lineTo(8,16); ctx.lineTo(-8,16); ctx.lineTo(-8,-2); ctx.lineTo(-18,-2); ctx.closePath();
    ctx.fill();
    ctx.fillStyle='#888';
    for (let i=0;i<3;i++) ctx.beginPath(), ctx.arc(-22+i*22, 22, 3, 0, Math.PI*2), ctx.fill();
  } else if (kind==='vape'){
    // vape pen with pulsing pink heart
    ctx.fillStyle='#181818'; ctx.fillRect(-22, -6, 36, 12);
    ctx.fillStyle='#3a3a3a'; ctx.fillRect(14, -4, 8, 8);
    ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.strokeRect(-22, -6, 36, 12);
    const pulse = 0.5+0.5*Math.sin(t*8);
    ctx.fillStyle = `rgba(255,${102+pulse*60},${170-pulse*40},${0.7+pulse*0.3})`;
    drawHeart(0, -3, 4);
  } else if (kind==='flame'){
    ctx.fillStyle='#ff3030';
    ctx.beginPath();
    ctx.moveTo(0,-22); ctx.bezierCurveTo(14,-12,16,4,4,18); ctx.bezierCurveTo(-2,4,-12,-2,-8,-12); ctx.bezierCurveTo(-4,-6,0,-12,0,-22);
    ctx.fill();
    ctx.fillStyle='#ffd633';
    ctx.beginPath(); ctx.arc(0,4,5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.stroke();
  } else if (kind==='face'){
    // angry boss face
    ctx.fillStyle='#f4c896'; ctx.fillRect(-18, -18, 36, 36);
    ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.strokeRect(-18, -18, 36, 36);
    ctx.fillStyle='#000';
    // angry eyes
    ctx.beginPath(); ctx.moveTo(-13,-8); ctx.lineTo(-6,-5); ctx.lineTo(-13,-2); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(13,-8); ctx.lineTo(6,-5); ctx.lineTo(13,-2); ctx.closePath(); ctx.fill();
    // frown
    ctx.beginPath(); ctx.arc(0, 14, 8, Math.PI, 2*Math.PI); ctx.lineWidth=2; ctx.stroke();
  }
  ctx.restore();
}

// ===== RESET / RESTART =====
function resetForNewRun(){
  Game.t = 0; Game.realT = 0;
  Game.scrollX = 0;
  Game.speed = CFG.BASE_SPEED;
  Game.baseScore = 0;
  Game.combo = 1; Game.comboTimer = 0;
  Game.shake = 0; Game.hitstop = 0; Game.flash = 0;
  Game.bossIdx = 0; Game.bossDoneCount = 0; Game.inBoss = false;
  Game.inEncounter = false; Game.encounterCooldown = 30;
  Game.showTitleSmash = 0; Game.titleSmashShown = false;
  Game.doubleJumpUnlocked = false;
  Game.jumpsThisRun = 0; Game.legendeWatch = 0;
  Game.deathCause = '';
  Game.flyerOnGround = false;
  Game.konfBibel = false;
  Game.ersatzVape = false;
  Game.catchphrase = ['Alda, ey!','Krass!','Voll geil!','Digga!'];
  Game.good = false; Game.endingShown = false;
  Game.shvCam = 0;
  Game.lastPuffT = -10; Game.chainPuffs = 0;
  Game.paused = false;
  Player.reset();
  Krass.v = 30; Krass.pulseT = 0;
  Vape.v = 40; Vape.warned = false; Vape.podVoiceT = 0; Vape.flavor='erdbeer'; Vape.invertTimer=0;
  Boss.active = null; Encounter.active = null;
  Entities.length = 0; Particles.length = 0;
  Bg.far.length = 0; Bg.mid.length = 0; Bg.near.length = 0;
  Bg.init();
  Director.nextSpawn = 1.2; Director.firstSpawnDone = false;
  HUD.notes.length = 0;
}

function restartGame(){
  Menu.show = false;
  // Only show menu if user pressed Escape after death; otherwise quick restart
  resetForNewRun();
  Game.state = 'PLAY';
}

// Press Escape on death to go to menu
window.addEventListener('keydown', e=>{
  if (e.code==='KeyT' && Game.state==='DEATH'){
    // share — copy canvas image to clipboard
    try{
      canvas.toBlob(b=>{
        if (b && navigator.clipboard && navigator.clipboard.write){
          navigator.clipboard.write([new ClipboardItem({'image/png': b})]).then(()=>{
            HUD.note('Bild in Zwischenablage kopiert!', '#ffd633');
          }).catch(()=>{
            HUD.note('Teilen nicht verfügbar', '#aaa');
          });
        }
      });
    } catch(err){ HUD.note('Teilen nicht verfügbar', '#aaa'); }
  }
});

// ===== ENCOUNTER DIRECTOR =====
const EncDirector = {
  update(dt){
    if (Game.inBoss || Game.inEncounter || Game.state!=='PLAY') return;
    Game.encounterCooldown -= dt;
    if (Game.encounterCooldown <= 0){
      const k = choice(ENCOUNTER_KEYS);
      Encounter.start(k);
    }
  }
};

// ===== MAIN GAME LOOP =====
let lastT = performance.now();
function frame(now){
  let dt = (now - lastT) / 1000;
  if (dt > 0.05) dt = 0.05; // clamp
  lastT = now;
  // hitstop
  if (Game.hitstop > 0){ Game.hitstop -= dt; dt = 0; }
  Game.realT += dt;
  // skip game updates while paused (but keep rendering)
  let updateDt = (Game.paused || Game.state==='DEATH' || Game.state==='ENDING' || Game.state==='MENU') ? 0 : dt;
  // Pressed keys reset (consume one frame)
  // Update touch input
  updateTouchInput();

  // Title smash
  if (!Game.titleSmashShown && Game.realT > 2){
    Game.showTitleSmash = 1.0;
    Game.titleSmashShown = true;
  }
  if (Game.showTitleSmash > 0) Game.showTitleSmash -= dt;
  // Shvape cam timer
  if (Game.shvCam > 0) Game.shvCam -= dt;

  // Run state-specific update
  if (Game.state === 'TUTORIAL'){
    Tutorial.update(dt);
    // animate background while tutorial is up so it's not static
    Game.scrollX += 60 * dt;
    Bg.update(dt);
  } else if (Game.state === 'MENU'){
    Menu.update(dt);
  } else if (Game.state === 'DEATH'){
    Death.update(dt);
  } else if (Game.state === 'ENDING'){
    Ending.update(dt);
  } else if (Game.state === 'PLAY'){
    Game.t += updateDt;
    // scroll
    Game.scrollX += Game.speed * updateDt;
    Player.update(updateDt);
    Vape.update(updateDt);
    // boring detect: no recent puff & no airtime activity
    const isBoring = (Game.realT - Game.lastPuffT > 5) && Player.onGround;
    Krass.update(updateDt, isBoring);
    Bg.update(updateDt);
    Director.update(updateDt);
    EncDirector.update(updateDt);
    updateEntities(updateDt);
    for (const e of Entities) specialEntityHook(e);
    // boss timing
    if (Game.bossIdx < BOSS_TIMES.length && Game.realT >= BOSS_TIMES[Game.bossIdx] && !Game.inBoss && !Game.inEncounter){
      Boss.start(Game.bossIdx);
    }
    // good ending check
    if (Game.realT >= 600 && !Game.endingShown){
      Game.state = 'ENDING';
      Ending.init();
    }
  } else if (Game.state === 'BOSS'){
    Game.t += updateDt;
    Game.scrollX += Game.speed * updateDt;
    Bg.update(updateDt);
    Boss.update(updateDt);
    updateEntities(updateDt);
    for (const e of Entities) specialEntityHook(e);
  } else if (Game.state === 'ENCOUNTER'){
    Game.t += updateDt;
    Game.scrollX += Game.speed * 0.5 * updateDt; // slowed during encounters
    Bg.update(updateDt);
    Encounter.update(updateDt);
    updateEntities(updateDt);
    for (const e of Entities) specialEntityHook(e);
  }

  // particles update always
  updateParticles(dt);
  HUD.update(dt);

  // ===== RENDER =====
  ctx.save();
  // shake
  if (Game.shake > 0 && !CFG.REDUCED_MOTION){
    ctx.translate(rand(-Game.shake, Game.shake), rand(-Game.shake, Game.shake));
    Game.shake *= 0.85;
    if (Game.shake < 0.3) Game.shake = 0;
  }

  if (Game.state === 'TUTORIAL'){
    Tutorial.draw();
  } else if (Game.state === 'MENU'){
    Menu.draw();
  } else if (Game.state === 'ENDING'){
    Ending.draw();
  } else {
    Bg.draw();
    drawEntities();
    drawSpecialEntities();
    drawParticles(0);
    drawBinRun(Player.x, Player.y, Game.realT);
    if (Game.state === 'BOSS') Boss.draw();
    if (Game.state === 'ENCOUNTER') Encounter.draw();
    HUD.draw();
    if (Game.state === 'DEATH') Death.draw();
  }

  // flash
  if (Game.flash > 0){
    ctx.fillStyle = Game.flashColor;
    ctx.globalAlpha = Game.flash * 3.5;
    ctx.fillRect(0,0,CFG.W,CFG.H);
    ctx.globalAlpha = 1;
    Game.flash -= 1/60;
  }

  // === MOBILE-FIRST TOUCH UI ===
  // Persistent visible buttons during gameplay. Larger hit zones, clear icons.
  if (IS_TOUCH && (Game.state==='PLAY'||Game.state==='BOSS'||Game.state==='ENCOUNTER')){
    // very subtle zone tinting (helps proprioception without visual noise)
    ctx.globalAlpha = 0.05; ctx.fillStyle = '#fff';
    ctx.fillRect(CFG.W/2, 0, CFG.W/2, CFG.H);
    ctx.globalAlpha = 0.03; ctx.fillStyle = '#7af';
    ctx.fillRect(0, 0, CFG.W/2, CFG.H);
    ctx.globalAlpha = 1;

    // BIG persistent JUMP button bottom-right
    const jbx = CFG.W - 200, jby = CFG.H - 200, jbr = 140;
    const jPress = !!(Input.touchJump || Input.keys.jump);
    ctx.save();
    ctx.globalAlpha = jPress ? 0.55 : 0.32;
    ctx.fillStyle = '#ff3030';
    ctx.beginPath(); ctx.arc(jbx, jby, jbr, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 0.85;
    ctx.lineWidth = 6; ctx.strokeStyle = '#000';
    ctx.beginPath(); ctx.arc(jbx, jby, jbr, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 56px Bangers, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('JUMP', jbx, jby-6);
    ctx.font='14px "Press Start 2P"'; ctx.fillText('↑', jbx, jby+34);
    ctx.restore();

    // VAPE button bottom-left (smaller circle)
    const vbx = 180, vby = CFG.H - 200, vbr = 110;
    const vPress = !!(Input.vapeBuffer > 0);
    ctx.save();
    ctx.globalAlpha = vPress ? 0.55 : 0.30;
    ctx.fillStyle = '#ff66aa';
    ctx.beginPath(); ctx.arc(vbx, vby, vbr, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 0.85;
    ctx.lineWidth = 5; ctx.strokeStyle = '#000';
    ctx.beginPath(); ctx.arc(vbx, vby, vbr, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 38px Bangers, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('VAPE', vbx, vby-2);
    // tiny vape icon
    ctx.fillStyle='#000'; ctx.fillRect(vbx-22, vby+30, 36, 8);
    ctx.fillStyle='#ff66aa'; ctx.fillRect(vbx+10, vby+32, 4, 4);
    ctx.restore();

    // Small DUCK pill, top-right of jump button
    const dbx = jbx - 30, dby = CFG.H - 90, dbw = 120, dbh = 56;
    ctx.save();
    ctx.globalAlpha = Input.duck ? 0.55 : 0.30;
    ctx.fillStyle = '#88c0e0';
    ctx.fillRect(dbx, dby, dbw, dbh);
    ctx.globalAlpha = 0.85;
    ctx.lineWidth = 4; ctx.strokeStyle = '#000';
    ctx.strokeRect(dbx, dby, dbw, dbh);
    ctx.fillStyle = '#fff'; ctx.font='bold 22px Bangers, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('DUCK ↓', dbx + dbw/2, dby + dbh/2);
    ctx.restore();

    // brief on-boarding text first 6 sec
    if (Game.realT < 6){
      ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='12px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText('LINKS BEWEGEN  •  RECHTS JUMP  •  PINKE TASTE = VAPE', CFG.W/2, 100);
    }
  }

  ctx.restore();

  // Clear pressed (one-frame pulses)
  for (const k in Input.pressed) Input.pressed[k] = false;
  // Re-scheduling is owned by kickFrame() at init; do not call rAF here.
}

// ===== INIT =====
loadBest();
Bg.init();
Menu.init();
Tutorial.init();
// First-load: show the tutorial. Player clicks START to enter PLAY.
Game.state = 'TUTORIAL';
setSeed(seedFromString('tutorial-' + Date.now()));
// Show menu only when explicitly requested via Escape after a death
window.addEventListener('keydown', e=>{
  if (e.code === 'Escape' && Game.state === 'DEATH'){
    Menu.show = true; Game.state = 'MENU';
  }
});

// rAF driver with watchdog — re-kicks on visibility change and via setInterval
// in case the browser pauses rAF (hidden tab / iframe). Frame is idempotent
// and uses lastT for delta calc so it's safe to drive from either source.
let _rafScheduled = false;
function kickFrame(){
  if (_rafScheduled) return;
  _rafScheduled = true;
  requestAnimationFrame(now=>{ _rafScheduled = false; frame(now); kickFrame(); });
}
kickFrame();
// Watchdog: if rAF hasn't fired for >250ms (hidden tab), force a step so
// the game continues to advance and re-renders the moment the tab comes back.
let _lastFrameAt = performance.now();
const _origFrame = frame;
frame = function(now){ _lastFrameAt = performance.now(); _origFrame(now); };
setInterval(()=>{
  if (performance.now() - _lastFrameAt > 250){
    // tab was throttled. Step once with a clamped dt and re-kick rAF.
    frame(performance.now());
    kickFrame();
  }
}, 500);
document.addEventListener('visibilitychange', ()=>{ if (!document.hidden) kickFrame(); });

// Mobile tap on death-screen restart button
canvas.addEventListener('pointerdown', e=>{
  if (Game.state === 'DEATH' && IS_TOUCH){
    const p = pointerToCanvas(e);
    if (p.y > 660 && p.y < 710 && Math.abs(p.x - CFG.W/2) < 120) restartGame();
  }
  if (Game.state === 'ENDING' && IS_TOUCH){
    if (Ending.t > 12) restartGame();
  }
});
