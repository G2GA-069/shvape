  let z = ZONES[0];
  for (const x of ZONES) if (Game.realT >= x.start) z = x;

function pickWeighted(pool){
  let total = 0; for (const [, w] of pool) total += w;
  let r = RNG()*total;
  for (const [t, w] of pool){ r -= w; if (r<=0) return t; }
  return pool[0][0];
}
function shuffleArr(a){
  for (let i=a.length-1;i>0;i--){ const j = Math.floor(RNG()*(i+1)); [a[i],a[j]] = [a[j],a[i]]; }
  return a;
}

// Seeded RNG (mulberry32) for daily challenge
function seedFromString(s){let h=2166136261>>>0;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function mulberry32(seed){return function(){let t=seed+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return ((t^t>>>14)>>>0)/4294967296;};}
let RNG = Math.random;
function setSeed(seed){const r = mulberry32(seed); RNG = r;}
function rrand(a,b){return a+RNG()*(b-a);}
function rchoice(arr){return arr[Math.floor(RNG()*arr.length)];}

function pointerToCanvas(e){
  const rect = canvas.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width) * CFG.W;
  const y = ((e.clientY - rect.top) / rect.height) * CFG.H;
  return {x,y};
}

  const onVape = (dvx*dvx + dvy*dvy) < (vbr*vbr);
  // Persistent DUCK pill above JUMP
  const dbx = (CFG.W - 200) - 30, dby = CFG.H - 90, dbw = 120, dbh = 56;
  const onDuck = (p.x>=dbx && p.x<=dbx+dbw && p.y>=dby && p.y<=dby+dbh);
  // Persistent JUMP big circle bottom-right
  const jbx = CFG.W - 200, jby = CFG.H - 200, jbr = 140;
  const dx = p.x - jbx, dy = p.y - jby;
  const onJump = (dx*dx + dy*dy) < (jbr*jbr);

  activePointers[e.pointerId] = {x:p.x,y:p.y,startX:p.x,startY:p.y,startT:performance.now(),
    onVape, onJump, onDuck};

  if (onVape){
    Input.vapeBuffer = 0.15;
    if (navigator.vibrate) navigator.vibrate(10);
  } else {
    // double-tap fallback for vape (anywhere on screen)
    const now = performance.now();
    if (now - Input.lastTap < 280) { Input.vapeBuffer = 0.15; if (navigator.vibrate) navigator.vibrate(10); }
    Input.lastTap = now;
  }
  if (onDuck){
    Input.duck = true;
  }
  // JUMP — explicit button press OR right-half-anywhere fallback
  if (onJump || (!onVape && !onDuck && p.x > CFG.W/2)){
    Input.touchJump = true;
    Input.jumpBuffer = CFG.JUMP_BUFFER;
    Input.pressed.jump = true;
    if (navigator.vibrate) navigator.vibrate(8);
  }
  Audio.unlock();
});
canvas.addEventListener('pointermove', e=>{
  e.preventDefault();
  const p = pointerToCanvas(e);
  if (activePointers[e.pointerId]) activePointers[e.pointerId].x = p.x, activePointers[e.pointerId].y = p.y;
});
canvas.addEventListener('pointerup', e=>{
  e.preventDefault();
  const ap = activePointers[e.pointerId];
  if (ap){
    const dy = ap.y - ap.startY;
    // swipe down = duck (briefly) — only if NOT on a button
    if (dy > 80 && Math.abs(ap.x-ap.startX) < 80 && !ap.onJump && !ap.onVape){
      Input.duck = true; setTimeout(()=>Input.duck=false, 500);
    }
  }
  delete activePointers[e.pointerId];
  // recompute persistent button state
  let anyJump=false, anyDuck=false;
  for (const id in activePointers){
    const p = activePointers[id];
    if (p.onJump) anyJump = true;
    else if (p.x > CFG.W/2 && !p.onVape && !p.onDuck) anyJump = true;
    if (p.onDuck) anyDuck = true;
  }
  Input.touchJump = anyJump;
  if (!anyJump) Input.keys.jump = false;
  if (!anyDuck) Input.duck = false;
});
canvas.addEventListener('pointercancel', e=>{ delete activePointers[e.pointerId]; Input.touchJump=false; });

// Process touch into Input.keys each frame
function updateTouchInput(){
  let right=false, leftMove=0;
  for (const id in activePointers){
    const p = activePointers[id];
    if (p.x > CFG.W/2) right = true;
    else {
      const mid = CFG.W*0.25;
      if (p.x < mid - 30) leftMove = -1;
      else if (p.x > mid + 30) leftMove = 1;
    }
  }
  Input.keys.jump = right || Input.keys.jump;
  if (right && !Input._wasRight) Input.pressed.jump = true;
  Input._wasRight = right;
  Input.touchLeft = leftMove;
}

  Game.paused = !Game.paused;
}

// ===== AUDIO =====
const Audio = {
  ready: false,
  muted: false,
  unlocked: false,
  layers: {},
  bossMotif: null,
  unlock(){
    if (this.unlocked) return;
    if (typeof Tone === 'undefined' || window.__toneFailed) {
      document.getElementById('toneFail').classList.add('show');
      this.unlocked = true; return;
    }
    Tone.start().then(()=>{
      this.unlocked = true;
      this.init();
    }).catch(()=>{
      document.getElementById('toneFail').classList.add('show');
      this.unlocked = true;
    });
  },
  init(){
    if (this.ready || typeof Tone==='undefined') return;
    try {
      // Master — louder so the music is actually audible over the SFX
      this.master = new Tone.Volume(-3).toDestination();
      // Lead synth (the melody — boosted, this is what carries the tune)
      this.lead = new Tone.PolySynth(Tone.Synth, {oscillator:{type:'square'}, envelope:{attack:0.01,decay:0.08,sustain:0.25,release:0.12}}).connect(this.master);
      this.lead.volume.value = -4;
      // Bass (triangle, prominent groove)
      this.bass = new Tone.MonoSynth({oscillator:{type:'triangle'}, envelope:{attack:0.005,decay:0.15,sustain:0.35,release:0.1}}).connect(this.master);
      this.bass.volume.value = -4;
      // Arp (square, a touch quieter — supportive)
      this.arp = new Tone.Synth({oscillator:{type:'square'}, envelope:{attack:0.01,decay:0.05,sustain:0,release:0.05}}).connect(this.master);
      this.arp.volume.value = -14;
      // Drums
      this.snare = new Tone.NoiseSynth({noise:{type:'white'}, envelope:{attack:0.001,decay:0.1,sustain:0}}).connect(this.master);
      this.snare.volume.value = -22;
      this.hat = new Tone.NoiseSynth({noise:{type:'pink'}, envelope:{attack:0.001,decay:0.04,sustain:0}}).connect(this.master);
      this.hat.volume.value = -28;
      // SFX
      this.sfx = new Tone.PolySynth(Tone.Synth, {oscillator:{type:'square'}, envelope:{attack:0.005,decay:0.1,sustain:0,release:0.05}}).connect(this.master);
      this.sfx.volume.value = -8;
      // Cursed FM voice for "POD EINSETZEN"
      this.voice = new Tone.FMSynth({modulationIndex:18, harmonicity:1.5, oscillator:{type:'sine'}, envelope:{attack:0.01,decay:0.5,sustain:0.4,release:0.2}}).connect(new Tone.BitCrusher(4).connect(this.master));
      this.voice.volume.value = -10;
      // Brass for legende
      this.brass = new Tone.PolySynth(Tone.Synth, {oscillator:{type:'sawtooth'}, envelope:{attack:0.05,decay:0.2,sustain:0.4,release:0.1}}).connect(this.master);
      this.brass.volume.value = -16;

      // === MULTI-TRACK MUSIC ENGINE — Pokémon Gameboy style ===
      // Each track is a 32-step pattern { bpm, bass, lead, arp, snareOn, hatOn }.
      // Drums use simple binary masks (which 16th-note steps fire).
      // Track changes via Audio.setTrack(name); the loop callback reads
      // this.currentTrack each tick for hot-swap, no gap.
      this.TRACKS = makeTracks();
      this.currentTrack = 'mutschelbach';
      this.previousTrack = null;
      this.step = 0;

      this.loop = new Tone.Loop(time=>{
        const T = this.TRACKS[this.currentTrack];
        if (!T) return;
        if (Tone.Transport.bpm.value !== T.bpm) Tone.Transport.bpm.rampTo(T.bpm, 0.1);
        // Auto-detect pattern length (32 or 64 steps) so we can mix old/new tracks
        const len = T.lead ? T.lead.length : 32;
        const i = this.step % len;
        if (T.bass[i]) this.bass.triggerAttackRelease(T.bass[i], '16n', time);
        if (T.lead[i]) this.lead.triggerAttackRelease(T.lead[i], '16n', time, 0.55);
        if (T.arp[i])  this.arp.triggerAttackRelease(T.arp[i], '32n', time);
        if (T.snareOn && T.snareOn[i]) this.snare.triggerAttackRelease('16n', time);
        if (T.hatOn   && T.hatOn[i])   this.hat.triggerAttackRelease('32n', time);
        // GIGACHAD brass — fire 4× per cycle (every 16 steps)
        if (Krass.isLegende() && (i % 16 === 0)) {
          const chord = T.brassChord || ['D4','F#4','A4'];
          this.brass.triggerAttackRelease(chord, '8n', time, 0.4);
        }
        if (Game.realT > 480) this.lead.detune.value = 5;
        this.step++;
      }, '16n').start(0);

      Tone.Destination.mute = this.muted;
      Tone.Transport.start();
      this.ready = true;
    } catch(e){
      document.getElementById('toneFail').classList.add('show');
    }
  },

  // Hot-swap to a named track. Resets the step counter so the new theme starts at bar 1.
  setTrack(name){
    if (!this.ready || this.currentTrack === name) return;
    if (!this.TRACKS[name]) return;
    this.previousTrack = this.currentTrack;
    this.currentTrack = name;
    this.step = 0;
  },
  // === SFX BANK ===
  jump(){ if(!this.ready||this.muted) return; try{this.sfx.triggerAttackRelease('A5','32n');}catch(e){} },
  pickup(){ if(!this.ready||this.muted) return; try{this.sfx.triggerAttackRelease('E5','32n'); setTimeout(()=>this.sfx.triggerAttackRelease('B5','32n'),60);}catch(e){} },
  // Pokémon "item-found" jingle (Doh-Mi-Sol-Doh in eighth-notes)
  itemFound(){ if(!this.ready||this.muted) return; try{
    const seq = ['C5','E5','G5','C6']; for (let i=0;i<seq.length;i++) setTimeout(()=>this.sfx.triggerAttackRelease(seq[i], '16n'), i*90);
  }catch(e){} },
  // Pokémon-style victory fanfare on boss defeat
  victory(){ if(!this.ready||this.muted) return; try{
    const seq = [['C5','E5','G5'],['D5','F#5','A5'],['G5','B5','D6'],['C5','E5','G5','C6']];
    const dur = ['8n','8n','8n','2n']; const delays = [0, 220, 440, 660];
    for (let i=0;i<seq.length;i++) setTimeout(()=>this.brass.triggerAttackRelease(seq[i], dur[i], undefined, 0.6), delays[i]);
  }catch(e){} },
  // Brief "new area" ding when entering a zone (Pokemon route-change)
  zoneEnter(){ if(!this.ready||this.muted) return; try{
    setTimeout(()=>this.sfx.triggerAttackRelease('G5','16n'), 0);
    setTimeout(()=>this.sfx.triggerAttackRelease('B5','16n'), 90);
    setTimeout(()=>this.sfx.triggerAttackRelease('D6','8n'), 180);
  }catch(e){} },
  // Boss intro sting — descending hit
  bossStart(){ if(!this.ready||this.muted) return; try{
    setTimeout(()=>this.brass.triggerAttackRelease(['B4','D5','F5'], '16n', undefined, 0.6), 0);
    setTimeout(()=>this.brass.triggerAttackRelease(['A4','C5','E5'], '16n', undefined, 0.6), 100);
    setTimeout(()=>this.brass.triggerAttackRelease(['F4','A4','D5'], '8n', undefined, 0.6), 200);
  }catch(e){} },
  hit(){ if(!this.ready||this.muted) return; try{this.sfx.triggerAttackRelease('A2','16n');}catch(e){} },
  cough(){ if(!this.ready||this.muted) return; try{this.snare.triggerAttackRelease('16n');}catch(e){} },
  vape(){ if(!this.ready||this.muted) return; try{this.hat.triggerAttackRelease('32n');}catch(e){} },
  podEinsetzen(){ if(!this.ready||this.muted) return; try{
    this.voice.triggerAttackRelease('C2','4n'); setTimeout(()=>this.voice.triggerAttackRelease('A1','4n'),300); setTimeout(()=>this.voice.triggerAttackRelease('F1','2n'),580);
  }catch(e){} },
  tierUp(){ if(!this.ready||this.muted) return; try{ this.sfx.triggerAttackRelease('C5','16n'); setTimeout(()=>this.sfx.triggerAttackRelease('E5','16n'),60); setTimeout(()=>this.sfx.triggerAttackRelease('G5','16n'),120); setTimeout(()=>this.sfx.triggerAttackRelease('C6','8n'),180); }catch(e){} },
  tierDown(){ if(!this.ready||this.muted) return; try{ this.sfx.triggerAttackRelease('G3','8n'); setTimeout(()=>this.sfx.triggerAttackRelease('E3','8n'),100); setTimeout(()=>this.sfx.triggerAttackRelease('C3','4n'),200); }catch(e){} },
  death(){ if(!this.ready||this.muted) return; try{ this.lead.triggerAttackRelease('A3','8n'); setTimeout(()=>this.lead.triggerAttackRelease('G3','8n'),140); setTimeout(()=>this.lead.triggerAttackRelease('F3','8n'),280); setTimeout(()=>this.lead.triggerAttackRelease('D3','4n'),420);}catch(e){} },
  shimmer(){ if(!this.ready||this.muted) return; try{this.arp.triggerAttackRelease('C7','64n'); setTimeout(()=>this.arp.triggerAttackRelease('E7','64n'),40);}catch(e){} },
};

// ===== EFFECTS: PARTICLES, SCREEN SHAKE, HITSTOP, COMIC BURSTS =====
const Particles = [];
function spawnParticle(opt){ Particles.push(Object.assign({life:1,maxLife:1,vx:0,vy:0,size:6,color:'#fff',gravity:0,text:null,rot:0,vrot:0}, opt)); }
function dustBurst(x,y){ for(let i=0;i<5;i++) spawnParticle({x,y,vx:rand(-60,60),vy:rand(-180,-30),size:rand(3,6),color:'#c9b08b',life:0.5,maxLife:0.5,gravity:400}); }
function vapeCloud(x,y,word){
  if (word){
    spawnParticle({x,y:y-10,vx:rand(-20,-60),vy:rand(-30,-10),life:1.6,maxLife:1.6,size:rand(20,30),color:'rgba(220,220,230,0.85)',text:word});
  }
  for (let i=0;i<6;i++) spawnParticle({x:x+rand(-8,8), y:y+rand(-6,6), vx:rand(-50,-100), vy:rand(-30,-10), size:rand(8,16), color:'rgba(220,220,230,0.65)', life:rand(0.8,1.4), maxLife:1.4});
}
function sparkle(x,y){ for(let i=0;i<8;i++) spawnParticle({x,y,vx:rand(-160,160),vy:rand(-160,160),size:rand(3,5),color:'#ffe14a',life:0.4,maxLife:0.4}); }
function comicBurst(x,y,text){ spawnParticle({x,y,vx:0,vy:-20,life:0.7,maxLife:0.7,size:60,color:'#ffd633',text:text,rot:rand(-0.3,0.3),burst:true}); }
function updateParticles(dt){
  for (let i=Particles.length-1;i>=0;i--){
    const p = Particles[i];
    p.life -= dt;
    if (p.life<=0){ Particles.splice(i,1); continue; }
    p.x += p.vx*dt; p.y += p.vy*dt;
    if (p.gravity) p.vy += p.gravity*dt;
    if (p.vrot) p.rot += p.vrot*dt;
  }
}
function drawParticles(camX){
  for (const p of Particles){
    const a = p.life/p.maxLife;
    ctx.save();
    ctx.translate(p.x - camX, p.y);
    if (p.rot) ctx.rotate(p.rot);
    if (p.burst){
      ctx.globalAlpha = a;
      drawComicBurst(0,0,p.size,p.text);
    } else if (p.text){
      ctx.globalAlpha = a*0.95;
      ctx.fillStyle = p.color;
      ctx.font = `bold ${p.size}px Bangers, sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth=3;
      ctx.strokeText(p.text,0,0); ctx.fillText(p.text,0,0);
    } else {
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(0,0,p.size,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawComicBurst(x,y,size,text){
  // yellow starburst with red outline + halftone dots
  const pts = 12, inner = size*0.55, outer = size;
  ctx.beginPath();
  for (let i=0;i<pts*2;i++){
    const r = (i%2===0)?outer:inner;
    const a = (i/(pts*2))*Math.PI*2 - Math.PI/2;
    const px = x + Math.cos(a)*r, py = y + Math.sin(a)*r;
    if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.closePath();
  ctx.fillStyle = COLORS.yellow; ctx.fill();
  ctx.lineWidth = 5; ctx.strokeStyle = COLORS.red; ctx.stroke();
  ctx.lineWidth = 2; ctx.strokeStyle = '#000'; ctx.stroke();
  // halftone
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  for (let i=0;i<8;i++){ const a = i*0.7, r=size*0.4; ctx.beginPath(); ctx.arc(x+Math.cos(a)*r*0.5, y+Math.sin(a)*r*0.5, 2, 0, Math.PI*2); ctx.fill(); }
  // text
  ctx.fillStyle = '#000';
  ctx.font = `bold ${Math.floor(size*0.55)}px Bangers, sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(text, x, y+2);
}

function shake(amt){ if (CFG.REDUCED_MOTION) return; Game.shake = Math.max(Game.shake, amt); }
function hitstop(t){ Game.hitstop = Math.max(Game.hitstop, t); }
function flash(color, t=0.18){ Game.flash = t; Game.flashColor = color; }

// ===== KRASSHEIT SYSTEM =====
const Krass = {
  v: 30, // start at 30%
  pulseT: 0,
  lastTier: 1,
  add(amount, reason){
    const old = this.v;
    this.v = clamp(this.v + amount, 0, 100);
    this.pulseT = 0.4;
    if (amount > 0 && reason) HUD.note(`+${Math.floor(amount)} AURA — ${reason}`, '#ff66ff');
    const newTier = this.tier();
    const oldTier = KRASS_TIERS.findIndex((t,i)=> i===KRASS_TIERS.length-1 ? old>=t.min : (old>=t.min && old<KRASS_TIERS[i+1].min));
    if (newTier > oldTier) { Audio.tierUp(); flash(KRASS_TIERS[newTier].color, 0.2); if (navigator.vibrate) navigator.vibrate([20,40,20]); }
    else if (newTier < oldTier) { Audio.tierDown(); flash('#444', 0.15); if (navigator.vibrate) navigator.vibrate(80); }
    this.lastTier = newTier;
  },
  tier(){
    for (let i=KRASS_TIERS.length-1;i>=0;i--) if (this.v >= KRASS_TIERS[i].min) return i;
    return 0;
  },
  mul(){ return KRASS_TIERS[this.tier()].mul; },
  isLegende(){ return this.tier()===4; },
  update(dt, isBoring){
    this.pulseT = Math.max(0, this.pulseT - dt);
    if (isBoring) this.v = Math.max(0, this.v - CFG.KRASS_DECAY*dt);
    if (this.isLegende()) Game.legendeWatch += dt;
  },
};

// ===== VAPE METER =====
const Vape = {
  v: 40, // cold open at 40
  flavor: 'erdbeer',
  flavorTimer: 0,
  invertTimer: 0, // mystery flavor
  warned: false,
  heartT: 0,
  podVoiceT: 0,
  drainRate(){
    let r = CFG.VAPE_DRAIN_BASE + CFG.VAPE_DRAIN_RAMP*Math.min(20, Game.realT/30);
    if (Krass.isLegende()) r *= 1.5;
    if (Game.ersatzVape) r *= 2;
    return r;
  },
  update(dt){
    if (Game.state==='DEATH' || Game.state==='ENDING') return;
    this.v = Math.max(0, this.v - this.drainRate()*dt);
    this.heartT += dt;
    this.flavorTimer -= dt;
    this.invertTimer = Math.max(0, this.invertTimer - dt);
    if (this.v < 15 && !this.warned){
      Audio.podEinsetzen();
      HUD.note('💀 POD EINSETZEN 💀', '#ff3030');
      this.warned = true;
      this.podVoiceT = 1.2;
    }
    if (this.v >= 30) this.warned = false;
    this.podVoiceT = Math.max(0, this.podVoiceT - dt);
    // grace at 0
    if (this.v <= 0) {
      Player.coughGrace -= dt;
      if (Player.coughGrace <= 0) Player.die('vape');
    } else {
      Player.coughGrace = 3;
    }
  },
  // Manual puff economy:
  //   * Spaced (>2s gap), fresh:    +8 Vape, +20 Aura  ("FLEX-PUFF")
  //   * At 99-100% full:            +0 Vape, +75 Aura  ("PURE FLEX, WAHLLAH")
  //   * Chain x2-x3 within 2s:      +3 Vape, -25 Aura  ("CRINGE CHAIN")
  //   * Chain x4+:                  -2 Vape, -60 Aura  ("HUFFING NOTHING")
  //   * Emergency floor (<6%):      +4 Vape, no Aura   (you can survive)
  // Net effect: pods become the primary refill path, the V button is a
  // STYLE move with risk attached. Spamming = aura tanks fast.
  puff(manual){
    if (!manual) return;             // pickups call refill() directly; this fn is the V-key flex action only
    const now = Game.realT;
    const dt = now - Game.lastPuffT;
    Game.lastPuffT = now;

    // Emergency: vape almost out — give a tiny refill so the player can
    // recover, but no Aura reward. (Otherwise the V button gates Aura
    // behind survival pressure, which kills the comedy.)
    if (this.v <= 6) {
      this.v = Math.min(100, this.v + 4);
      Audio.vape();
      vapeCloud(Player.x + 30, Player.y - 20, 'HILFE');
      return;
    }

    if (this.v >= 99) {
      // Pure flex — overflowing the tank just to look cool
      Krass.add(75, 'PURE FLEX, WAHLLAH');
      Game.chainPuffs = 0;
    } else if (dt > 2) {
      // Fresh single puff — small, satisfying, slight Aura gain
      this.v = Math.min(100, this.v + 8);
      Krass.add(20, 'FLEX-PUFF');
      Game.chainPuffs = 1;
    } else if (Game.chainPuffs < 3) {
      // Chain 2-3: diminishing returns + Aura starts dropping
      Game.chainPuffs++;
      this.v = Math.min(100, this.v + 3);
      Krass.add(-25, 'CRINGE CHAIN');
    } else {
      // Chain 4+: actively cringe. The vape gives nothing; Aura tanks hard.
      Game.chainPuffs++;
      this.v = Math.max(0, this.v - 2);
      Krass.add(-60, 'HUFFING NOTHING');
    }

    Audio.vape();
    // cloud word — keep HILFE as the cursed 1-in-50 easter egg, broaden the rest
    let word = null;
    const r = Math.random();
    if (r < 0.02) word = 'HILFE';
    else if (r < 0.22) word = 'ALDA';
    else if (r < 0.40) word = 'KRASS';
    else if (r < 0.55) word = 'WAHLLAH';
    else if (r < 0.68) word = 'SHEESH';
    else if (r < 0.78) word = 'GYATT';
    else if (r < 0.86) word = 'BRUDI';
    if (word === 'HILFE') Audio.shimmer();
    vapeCloud(Player.x + 30, Player.y - 20, word);
    // small jump boost on manual puff — kept, it's a real mechanic
    if (Player.onGround) Player.vy = -250;
  },
  refill(amt){ this.v = Math.min(100, this.v + amt); },
  setFlavor(f){
    this.flavor = f;
    this.flavorTimer = 8;
    if (f==='mystery') this.invertTimer = 5;
  },
};

// ===== PLAYER (BIN RUN SHVAPE) =====
const Player = {
  x: CFG.PLAYER_X, y: CFG.GROUND_Y - CFG.PLAYER_H,
  w: CFG.PLAYER_W, h: CFG.PLAYER_H,
  vx: 0, vy: 0,
  onGround: true,
  jumpsLeft: 1,
  coyoteT: 0,
  jumpHoldT: 0,
  jumping: false,
  ducking: false,
  duckT: 0,
  facing: 1,
  animT: 0,
  alive: true,
  invuln: 0,
  coughGrace: 3,
  decayStage(){
    const m = Game.realT / 60;
    if (m < 2) return 0;
    if (m < 5) return 1;
    if (m < 8) return 2;
    return 3;
  },
  hb(){ // hitbox accounts for ducking
    const dh = this.ducking ? this.h*0.55 : this.h;
    return {x:this.x+8, y:this.y + (this.h-dh), w:this.w-16, h:dh-4};
  },
  jump(){
    if (this.jumpsLeft<=0 && this.coyoteT<=0) return false;
    const v = Game.konfBibel ? CFG.JUMP_VEL*0.9 : CFG.JUMP_VEL;
    this.vy = v;
    this.jumping = true;
    this.jumpHoldT = CFG.JUMP_HOLD;
    if (this.coyoteT > 0) this.coyoteT = 0;
    else this.jumpsLeft--;
    this.onGround = false;
    Audio.jump();
    dustBurst(this.x+this.w/2, this.y+this.h);
    Game.jumpsThisRun++;
    // Shvape Cam easter egg
    if (Math.random() < 0.01) Game.shvCam = 2;
    return true;
  },
  cutJump(){
    if (this.jumping && this.vy < -200) this.vy *= 0.5;
    this.jumping = false; this.jumpHoldT = 0;
  },
  update(dt){
    if (!this.alive) return;
    this.animT += dt;
    this.invuln = Math.max(0, this.invuln - dt);
    // Speed influence (limited L/R nudge)
    const dir = (Input.keys.left || Input.touchLeft===-1) ? -1 : (Input.keys.right || Input.touchLeft===1) ? 1 : 0;
    let speedNudge = dir * 50;
    if (Vape.invertTimer > 0) speedNudge = -speedNudge;
    Game.speed = clamp(Game.speed + (CFG.SPEED_RAMP*0.5)*dt + speedNudge*dt*4, CFG.BASE_SPEED, CFG.MAX_SPEED);
    // Auto ramp
    Game.speed = Math.min(CFG.MAX_SPEED, Game.speed + CFG.SPEED_RAMP*dt);
    // Jump buffer + coyote
    Input.jumpBuffer = Math.max(0, Input.jumpBuffer - dt);
    if (this.onGround) { this.coyoteT = CFG.COYOTE; this.jumpsLeft = Game.doubleJumpUnlocked ? 2 : 1; }
    else this.coyoteT = Math.max(0, this.coyoteT - dt);
    if (Input.jumpBuffer > 0 && (this.onGround || this.coyoteT > 0 || (Game.doubleJumpUnlocked && this.jumpsLeft>0))){
      if (this.jump()) Input.jumpBuffer = 0;
    }
    // Hold jump
    if ((Input.keys.jump || Input.touchJump) && this.jumpHoldT > 0){
      this.vy -= 1800*dt; // sustained lift
      this.jumpHoldT -= dt;
    } else this.jumpHoldT = 0;
    if (!Input.keys.jump && !Input.touchJump) this.cutJump();
    // Duck
    this.ducking = (Input.keys.down || Input.duck) && this.onGround;
    // Vape buffer
    Input.vapeBuffer = Math.max(0, Input.vapeBuffer - dt);
    if (Input.vapeBuffer > 0) { Vape.puff(true); Input.vapeBuffer = 0; }
    // Physics
    this.vy += CFG.GRAVITY*dt;
    this.y += this.vy*dt;
    if (this.y + this.h >= CFG.GROUND_Y){
      this.y = CFG.GROUND_Y - this.h;
      this.vy = 0; this.onGround = true; this.jumping = false;
    } else this.onGround = false;
    // unlock double jump at 30s
    if (!Game.doubleJumpUnlocked && Game.realT >= CFG.DOUBLE_JUMP_UNLOCK_T){
      Game.doubleJumpUnlocked = true;
      HUD.note('Doppel-Sprung freigeschaltet!', '#ffd633');
    }
    // Cough animation (decay)
    if (this.decayStage() >= 2 && Math.random() < 0.005){
      Audio.cough();
      vapeCloud(this.x+30, this.y-20, null);
    }
  },
  hit(damage, reason){
    if (this.invuln > 0) return;
    this.invuln = 1.0;
    Vape.v = Math.max(0, Vape.v - damage);
    shake(8); hitstop(0.08);
    Audio.hit();
    flash('#ff3030', 0.12);
    Game.combo = 1;
    if (navigator.vibrate) navigator.vibrate([30,30,30]);
    HUD.note(`AUTSCH! ${reason||''}`, '#ff5050');
  },
  die(cause){
    if (!this.alive) return;
    this.alive = false;
    Game.deathCause = cause;
    Audio.death();
    shake(20); hitstop(0.2);
    Game.state = 'DEATH';
    Death.start();
  },
  reset(){
    this.x = CFG.PLAYER_X; this.y = CFG.GROUND_Y - CFG.PLAYER_H;
    this.vx=0; this.vy=0; this.onGround=true; this.alive=true;
    this.invuln=0; this.coughGrace=3; this.ducking=false;
    this.jumpsLeft=1; this.coyoteT=0;
  }
};

// ===== DRAW BIN RUN =====
// Bin Run "Wannabe-Drip" silhouette:
//  - Slimmer body (~22% narrower than v1)
//  - Black "Jogging-Anzug" (matching jacket + pants, white piping, 3 white stripes)
//  - Gucci-style monogram cap (beige + dark-brown GG pattern, curved brim)
//  - Gold chain on chest
//  - White Adiletten + white socks (kept)
//  - Decay stages: pink cheeks -> dark circles -> hunched -> ghostly white + black smoke
function drawBinRun(x,y,t){
  const stage = Player.decayStage();
  const skin = stage===0 ? COLORS.skin : stage===1 ? COLORS.skinPale : stage>=2 ? COLORS.skinGhost : COLORS.skin;
  const cheek = stage===0 ? '#ff8a8a' : null;
  const isDuck = Player.ducking;
  const runF = Math.sin(t*14);
  const ground = Player.onGround;
  const py = isDuck ? y + 28 : y;
  const ph = isDuck ? Player.h-28 : Player.h;

  // Slimmer geometry (was: legs 8-52 wide, body 4-60). New: legs 14-50, body 12-52.
  const LEG_L_X = 14, LEG_R_X = 36, LEG_W = 14;
  const BODY_X = 12,  BODY_W = 40;
  const HEAD_X = 18,  HEAD_W = 28;

  ctx.save();
  ctx.translate(x, py);
  if (Krass.isLegende()){
    ctx.shadowColor = `hsl(${(t*200)%360},100%,60%)`;
    ctx.shadowBlur = 18;
  }

  // ===== TRACKSUIT — PANTS =====
  const legBob = ground && !isDuck ? Math.abs(runF)*4 : 0;
  ctx.fillStyle = COLORS.hoodie; // black tracksuit pants
  ctx.fillRect(LEG_L_X, ph-32+legBob, LEG_W, 32-legBob);
  ctx.fillRect(LEG_R_X, ph-32-legBob, LEG_W, 32+legBob);
  ctx.strokeStyle='#000'; ctx.lineWidth=2;
  ctx.strokeRect(LEG_L_X, ph-32+legBob, LEG_W, 32-legBob);
  ctx.strokeRect(LEG_R_X, ph-32-legBob, LEG_W, 32+legBob);
  // 3 white stripes (now slimmer, but the Adidas reference holds)
  ctx.fillStyle = '#fff';
  for (let i=0;i<3;i++){
    ctx.fillRect(LEG_L_X+1, ph-30+legBob+i*6, 11, 2);
    ctx.fillRect(LEG_R_X+1, ph-30-legBob+i*6, 11, 2);
  }
  // Adiletten + white socks
  ctx.fillStyle = '#fff';
  ctx.fillRect(LEG_L_X-2, ph-4+legBob, 18, 6);
  ctx.fillRect(LEG_R_X-2, ph-4-legBob, 18, 6);
  ctx.fillStyle = '#222';
  ctx.fillRect(LEG_L_X-2, ph, 18, 4);
  ctx.fillRect(LEG_R_X-2, ph, 18, 4);
  ctx.strokeRect(LEG_L_X-2, ph-4+legBob, 18, 8);
  ctx.strokeRect(LEG_R_X-2, ph-4-legBob, 18, 8);

  // ===== TRACKSUIT — JACKET (top half) =====
  ctx.fillStyle = COLORS.hoodie;
  ctx.fillRect(BODY_X, 20, BODY_W, ph-50);
  ctx.strokeStyle='#000'; ctx.lineWidth=2;
  ctx.strokeRect(BODY_X, 20, BODY_W, ph-50);
  // White piping along the zipper line (center vertical)
  ctx.fillStyle = '#fff';
  ctx.fillRect(BODY_X + BODY_W/2 - 1, 22, 1, ph-54);
  // Zipper pull (gold square at chest)
  ctx.fillStyle = '#ffd633';
  ctx.fillRect(BODY_X + BODY_W/2 - 2, 38, 4, 4);
  ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.strokeRect(BODY_X + BODY_W/2 - 2, 38, 4, 4);
  // Stand-up collar (white piping line at top)
  ctx.fillStyle = '#fff';
  ctx.fillRect(BODY_X+2, 20, BODY_W-4, 2);
  // GOLD CHAIN — arcs across chest, with Cuban-link texture
  ctx.strokeStyle = '#ffd633'; ctx.lineWidth = 2.4;
  ctx.beginPath(); ctx.arc(BODY_X + BODY_W/2, 26, 12, 0.1*Math.PI, 0.9*Math.PI); ctx.stroke();
  ctx.strokeStyle = '#000'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.arc(BODY_X + BODY_W/2, 26, 12, 0.1*Math.PI, 0.9*Math.PI); ctx.stroke();
  // little dollar pendant
  ctx.fillStyle = '#ffd633';
  ctx.fillRect(BODY_X + BODY_W/2 - 2, 33, 4, 5);
  ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.strokeRect(BODY_X + BODY_W/2 - 2, 33, 4, 5);
  ctx.fillStyle='#000'; ctx.font='bold 5px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('€', BODY_X + BODY_W/2, 36);

  // ===== HEAD =====
  const headY = stage>=2 ? 14 : 8;
  ctx.fillStyle = skin;
  ctx.fillRect(HEAD_X, headY, HEAD_W, 24);
  ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.strokeRect(HEAD_X, headY, HEAD_W, 24);
  // dark circles stage 1+
  if (stage>=1){
    ctx.fillStyle = 'rgba(50,30,60,0.5)';
    ctx.fillRect(HEAD_X+3, headY+12, 5, 4);
    ctx.fillRect(HEAD_X+20, headY+12, 5, 4);
  }
  // eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(HEAD_X+5, headY+11, 3, 3);
  ctx.fillRect(HEAD_X+20, headY+11, 3, 3);
  if (cheek){
    ctx.fillStyle = cheek;
    ctx.beginPath(); ctx.arc(HEAD_X+3, headY+18, 2.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(HEAD_X+25, headY+18, 2.2, 0, Math.PI*2); ctx.fill();
  }
  // smirk
  ctx.strokeStyle='#000'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(HEAD_X+11, headY+19); ctx.lineTo(HEAD_X+18, headY+19); ctx.stroke();
  // AirPods
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(HEAD_X-1, headY+15, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(HEAD_X+HEAD_W+1, headY+15, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle='#000'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(HEAD_X-1, headY+15, 2.5, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(HEAD_X+HEAD_W+1, headY+15, 2.5, 0, Math.PI*2); ctx.stroke();

  // ===== GUCCI-MONOGRAM CAP =====
  // Sits on top of head, slightly forward, brim curving forward.
  // Beige body with dark-brown GG monogram pattern. Tiny gold trim along brim.
  const capY = headY - 9;
  // crown
  ctx.fillStyle = '#c9b58f'; // beige base (canvas color)
  ctx.fillRect(HEAD_X-1, capY, HEAD_W+2, 9);
  // monogram pattern - subtle interlocking GG diamonds
  ctx.fillStyle = '#7a5a32';
  for (let mx = HEAD_X; mx < HEAD_X+HEAD_W; mx += 5){
    for (let my = capY+1; my < capY+8; my += 4){
      // tiny "G"-ish diamond + dot
      ctx.fillRect(mx, my, 2, 2);
      ctx.fillRect(mx+2, my+1, 1, 1);
    }
  }
  // outline
  ctx.strokeStyle='#000'; ctx.lineWidth=2;
  ctx.strokeRect(HEAD_X-1, capY, HEAD_W+2, 9);
  // gold trim line at brim attachment
  ctx.strokeStyle = '#ffd633'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(HEAD_X-1, capY+9); ctx.lineTo(HEAD_X+HEAD_W+1, capY+9); ctx.stroke();
  // brim — curves forward (over the eyes)
  ctx.fillStyle = '#7a5a32'; // darker tan brim
  ctx.beginPath();
  ctx.moveTo(HEAD_X-2, capY+9);
  ctx.lineTo(HEAD_X+HEAD_W+10, capY+10);
  ctx.lineTo(HEAD_X+HEAD_W+10, capY+13);
  ctx.lineTo(HEAD_X-2, capY+12);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle='#000'; ctx.lineWidth=1.5; ctx.stroke();
  // crown highlight
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(HEAD_X+1, capY+1, HEAD_W, 1);
  // small "GG" emblem on the crown center (parodic, big enough to read)
  ctx.fillStyle = '#3a2810';
  ctx.font = 'bold 6px serif'; ctx.textAlign = 'center'; ctx.textBaseline='middle';
  ctx.fillText('GG', HEAD_X+HEAD_W/2, capY+5);

  // hair-tuft sticking out under cap (undercut shave above ear)
  ctx.fillStyle = COLORS.hair;
  ctx.fillRect(HEAD_X+HEAD_W-3, headY+1, 4, 4);

  // ===== VAPE PEN IN HAND =====
  const handY = 36 + (ground?Math.sin(t*14)*3:0);
  ctx.fillStyle = '#222';
  ctx.fillRect(BODY_X+BODY_W-2, handY, 14, 6);
  ctx.strokeStyle='#000'; ctx.lineWidth=1.5; ctx.strokeRect(BODY_X+BODY_W-2, handY, 14, 6);
  // LED heart
  const pulse = 0.5 + 0.5*Math.sin(Vape.heartT * (Vape.v<25?12:6));
  const ledColor = Vape.v<25 ? `rgba(255,40,40,${0.5+pulse*0.5})` : `rgba(255,80,180,${0.5+pulse*0.5})`;
  ctx.fillStyle = ledColor;
  drawHeart(BODY_X+BODY_W+2, handY+3, 2.5);

  // ghost trembling stage 3
  if (stage>=3 && Math.random()<0.3){ ctx.translate(rand(-1,1), rand(-1,1)); }
  if (stage>=3 && Math.random()<0.05){
    spawnParticle({x:Player.x+30, y:Player.y-8, vx:rand(-30,-80), vy:rand(-20,-5), size:rand(8,16), color:'rgba(20,20,30,0.7)', life:1.4, maxLife:1.4});
  }

  // Drip-Check easter egg: rare cap glint sparkle while at FETT AURA+
  if (Krass.tier()>=3 && Math.random() < 0.008){
    ctx.fillStyle='rgba(255,255,255,0.95)';
    ctx.beginPath(); ctx.arc(HEAD_X+HEAD_W/2+rand(-8,8), capY+rand(2,7), 1.5, 0, Math.PI*2); ctx.fill();
  }

  ctx.restore();

  // halftone dots over jacket
  ctx.save();
  ctx.beginPath();
  ctx.rect(x+BODY_X, py+20, BODY_W, ph-50);
  ctx.clip();
  ctx.fillStyle='rgba(255,255,255,0.06)';
  for (let yy=20;yy<ph-30;yy+=6) for (let xx=BODY_X+1;xx<BODY_X+BODY_W;xx+=6){
    ctx.beginPath(); ctx.arc(x+xx, py+yy, 1.1, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}
function drawHeart(x,y,s){
  ctx.beginPath();
  ctx.moveTo(x, y+s);
  ctx.bezierCurveTo(x, y, x-s*1.5, y, x-s*1.5, y+s*0.6);
  ctx.bezierCurveTo(x-s*1.5, y+s*1.4, x, y+s*1.6, x, y+s*2);
  ctx.bezierCurveTo(x, y+s*1.6, x+s*1.5, y+s*1.4, x+s*1.5, y+s*0.6);
  ctx.bezierCurveTo(x+s*1.5, y, x, y, x, y+s);
  ctx.fill();
}

// ===== BACKGROUND =====
const Bg = {
  far: [],   // mountains, schloss silhouettes
  mid: [],   // houses, trees
  near: [],  // signs, NPCs, fences
  layerSeed: 0,
  // Deck-shuffled queues — drained on spawn, refilled when empty.
  // Keys: shopDecks  -> "<midType>|<zoneName>"
  //       dialogDecks -> NPC type
  //       signDecks   -> zone name
  _shopDecks: {},
  _dialogDecks: {},
  _signDecks: {},
  _drawFromDeck(deckMap, key, fullPool){
    if (!deckMap[key] || deckMap[key].length === 0){
      deckMap[key] = shuffleArr(fullPool.slice());
    }
    return deckMap[key].pop();
  },
  init(){
    // pre-populate
    for (let x=0;x<CFG.W*2;x+=rand(220,360)) this.spawnFar(x);
    for (let x=0;x<CFG.W*2;x+=rand(140,260)) this.spawnMid(x);
    for (let x=0;x<CFG.W*2;x+=rand(180,320)) this.spawnNear(x);
  },
  spawnFar(x){
    const z = currentZone();
    const map = {
      'MUTSCHELBACH':['hills','vineyard','hills'],
      'KARLSBAD-LANGENSTEINBACH':['hills','hills','mountain'],
      'INDUSTRIEGEBIET ITTERSBACH':['factorySkyline','factorySkyline','hills'],
      'WALDBRONN — ALBTAL-THERME':['hills','schwarzwald','hills'],
      'ETTLINGEN — MARKTPLATZ':['schloss','hills','schloss'],
      'VÖLKERSBACH / SCHWARZWALD-RAND':['schwarzwald','schwarzwald','mountain'],
    };
    const pool = map[z.name] || ['hills'];
    const type = pool[Math.floor(RNG()*pool.length)];
    this.far.push({x, type, h: rand(120, 220), seed: RNG()});
  },
  spawnMid(x){
    const z = currentZone();
    const type = pickWeighted(z.midPool);
    // If this shop type has zone-specific real names, pull a unique one
    // from the deck so it doesn't repeat within the same zone visit.
    let name = null;
    const namePool = (SHOP_NAMES[type] || {})[z.name];
    if (namePool && namePool.length){
      name = this._drawFromDeck(this._shopDecks, type+'|'+z.name, namePool);
    }
    this.mid.push({x, type, name, seed: RNG(), animT: RNG()*10});
  },
  spawnNear(x){
    const z = currentZone();
    const type = pickWeighted(z.nearPool);
    // Per-zone sign pool — also deck-shuffled so we don't see the same
    // sign twice while passing through the same zone.
    const signText = this._drawFromDeck(this._signDecks, z.name, z.signs);
    // Per-NPC-type dialogue — pre-assigned at spawn so it's stable across
    // re-renders, and never repeats while there are unused lines.
    let dialog = null;
    const dialogPool = NPC_DIALOG_POOLS[type];
    if (dialogPool && dialogPool.length){
      dialog = this._drawFromDeck(this._dialogDecks, type, dialogPool);
    }
    this.near.push({x, type, text: signText, dialog, seed: RNG(), animT: 0, dialogIdx: Math.floor(RNG()*100)});
  },
  update(dt){
    const sx = Game.scrollX;
    // zone-change banner trigger
    const z = currentZone();
    if (_lastZoneName !== z.name) {
      if (_lastZoneName !== null) {
        _zoneBannerT = 3.0; flash('#ffd633', 0.18);
        Audio.zoneEnter();
        if (!Game.inBoss && ZONE_TRACK[z.name]) Audio.setTrack(ZONE_TRACK[z.name]);
      }
      _lastZoneName = z.name;
    }
    if (_zoneBannerT > 0) _zoneBannerT -= dt;
    // far parallax 0.2x, mid 0.5x, near 0.85x
    for (const o of this.far) o.animT = (o.animT||0)+dt;
    for (const o of this.mid) o.animT += dt;
    for (const o of this.near) o.animT += dt;
    // recycle
    while (this.far[0] && this.far[0].x - sx*0.2 < -400) { this.far.shift(); this.spawnFar(this.far[this.far.length-1].x + rand(220,360)); }
    while (this.mid[0] && this.mid[0].x - sx*0.5 < -300) { this.mid.shift(); this.spawnMid(this.mid[this.mid.length-1].x + rand(140,260)); }
    while (this.near[0] && this.near[0].x - sx*0.85 < -300) { this.near.shift(); this.spawnNear(this.near[this.near.length-1].x + rand(180,320)); }
  },
  skyColor(){
    // Blend zone-specific sky with time-of-day
    const z = currentZone();
    const t = (Game.realT % 600) / 600;
    const tod = blend(COLORS.sky[Math.floor(t*COLORS.sky.length)%COLORS.sky.length], COLORS.sky[(Math.floor(t*COLORS.sky.length)+1)%COLORS.sky.length], (t*COLORS.sky.length)%1);
    return blend(z.sky, tod, 0.5);
  },
  draw(){
    const sky = this.skyColor();
    const grad = ctx.createLinearGradient(0,0,0,CFG.GROUND_Y);
    grad.addColorStop(0, sky);
    grad.addColorStop(1, '#cfe9f7');
    ctx.fillStyle = grad; ctx.fillRect(0,0,CFG.W,CFG.H);
    // sun (drawn before blur)
    ctx.fillStyle = 'rgba(255,235,150,0.7)';
    ctx.beginPath(); ctx.arc(CFG.W*0.78, 130, 50, 0, Math.PI*2); ctx.fill();

    // === ATMOSPHERIC PERSPECTIVE (cheap depth, NOT ctx.filter) ===
    // ctx.filter='blur(...)' is catastrophically slow on Canvas2D because
    // it re-creates a backing surface per draw call. Replaced with two
    // alpha tricks that cost ~zero:
    //   1. far+mid drawn at globalAlpha 0.78 — dimmer = farther
    //   2. After mid, a single semi-transparent sky-tinted gradient
    //      "haze" rect over the upper area — atmospheric perspective
    //   3. Foreground (entities, player) drawn AFTER, untouched, at
    //      full alpha — pops crisply.
    ctx.save();
    ctx.globalAlpha = 0.78;
    for (const o of this.far) drawFar(o);
    ctx.globalAlpha = 0.86;
    for (const o of this.mid) drawMid(o);
    ctx.restore();

    // Single haze fillRect — cheaper than any per-object filter
    const haze = ctx.createLinearGradient(0, 0, 0, CFG.GROUND_Y);
    haze.addColorStop(0, 'rgba(190,210,225,0.35)');
    haze.addColorStop(0.7, 'rgba(190,210,225,0.10)');
    haze.addColorStop(1, 'rgba(190,210,225,0.0)');
    ctx.fillStyle = haze;
    ctx.fillRect(0, 0, CFG.W, CFG.GROUND_Y);

    // Ground stays sharp — it's the play surface
    ctx.fillStyle = COLORS.ground;
    ctx.fillRect(0, CFG.GROUND_Y, CFG.W, CFG.H-CFG.GROUND_Y);
    ctx.fillStyle = '#7d6240';
    ctx.fillRect(0, CFG.GROUND_Y, CFG.W, 8);
    ctx.strokeStyle = '#000'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,CFG.GROUND_Y); ctx.lineTo(CFG.W, CFG.GROUND_Y); ctx.stroke();
    ctx.fillStyle = COLORS.groundDark;
    const gOff = (Game.scrollX*0.85) % 40;
    for (let xx=-gOff; xx<CFG.W; xx+=40){
      ctx.beginPath();
      ctx.moveTo(xx, CFG.GROUND_Y+4); ctx.lineTo(xx+4, CFG.GROUND_Y); ctx.lineTo(xx+8, CFG.GROUND_Y+4); ctx.fill();
    }

    // Near layer at slightly reduced alpha — closer to fg but still "behind"
    ctx.save();
    ctx.globalAlpha = 0.94;
    for (const o of this.near) drawNear(o);
    ctx.restore();
  }
};

function blend(c1, c2, f){
  function hex(c){ return c.startsWith('#') ? [parseInt(c.slice(1,3),16), parseInt(c.slice(3,5),16), parseInt(c.slice(5,7),16)] : [120,160,200]; }
  const a = hex(c1), b = hex(c2);
  const r = Math.round(lerp(a[0],b[0],f)), g = Math.round(lerp(a[1],b[1],f)), bl = Math.round(lerp(a[2],b[2],f));
  return `rgb(${r},${g},${bl})`;
}

function drawFar(o){
  const x = o.x - Game.scrollX*0.2;
  if (x < -400 || x > CFG.W+200) return;
  const baseY = CFG.GROUND_Y - 40;
  ctx.save();
  if (o.type==='mountain'){
    ctx.fillStyle='#7a8da8';
    ctx.beginPath(); ctx.moveTo(x, baseY); ctx.lineTo(x+100, baseY-o.h); ctx.lineTo(x+200, baseY); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.stroke();
    // snow
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.moveTo(x+85, baseY-o.h+15); ctx.lineTo(x+100, baseY-o.h); ctx.lineTo(x+115, baseY-o.h+15); ctx.closePath(); ctx.fill();
  } else if (o.type==='schloss'){
    ctx.fillStyle='#a89a82';
    ctx.fillRect(x, baseY-o.h*0.6, 220, o.h*0.6);
    // towers
    ctx.fillRect(x-10, baseY-o.h*0.8, 30, o.h*0.8);
    ctx.fillRect(x+200, baseY-o.h*0.8, 30, o.h*0.8);
    ctx.fillStyle='#5a3030';
    ctx.beginPath(); ctx.moveTo(x-10, baseY-o.h*0.8); ctx.lineTo(x+5, baseY-o.h*0.95); ctx.lineTo(x+20, baseY-o.h*0.8); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x+200, baseY-o.h*0.8); ctx.lineTo(x+215, baseY-o.h*0.95); ctx.lineTo(x+230, baseY-o.h*0.8); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.strokeRect(x, baseY-o.h*0.6, 220, o.h*0.6);
  } else if (o.type==='vineyard'){
    ctx.fillStyle='#7ea14a';
    for (let i=0;i<8;i++){
      ctx.fillRect(x+i*30, baseY-30, 24, 30);
    }
  } else if (o.type==='schwarzwald'){
    ctx.fillStyle='#1f3320';
    for (let i=0;i<6;i++){
      const tx = x+i*40; const th = o.h*0.7 + Math.sin(i)*15;
      ctx.beginPath(); ctx.moveTo(tx-10,baseY); ctx.lineTo(tx, baseY-th); ctx.lineTo(tx+20,baseY); ctx.closePath(); ctx.fill();
    }
  } else if (o.type==='factorySkyline'){
    // Ittersbach industrial skyline - rectangles with chimneys + smoke
    ctx.fillStyle='#5a6068';
    for (let i=0;i<5;i++){
      const bw = 40+((o.seed*1000)%30)+i*4;
      ctx.fillRect(x+i*45, baseY-90-i%2*20, bw, 90+i%2*20);
    }
    // chimneys
    ctx.fillStyle='#3a3f44';
    ctx.fillRect(x+30, baseY-160, 8, 80);
    ctx.fillRect(x+150, baseY-180, 10, 100);
    // red top stripes
    ctx.fillStyle='#a32020'; ctx.fillRect(x+30, baseY-160, 8, 6); ctx.fillRect(x+150, baseY-180, 10, 6);
    // smoke puffs (animated)
    ctx.fillStyle='rgba(200,200,200,0.6)';
    for (let i=0;i<3;i++) ctx.beginPath(), ctx.arc(x+34+Math.sin(o.animT*0.8+i)*3, baseY-170-i*12, 6+i*2, 0, Math.PI*2), ctx.fill();
    for (let i=0;i<3;i++) ctx.beginPath(), ctx.arc(x+155+Math.sin(o.animT*0.8+i+1)*4, baseY-190-i*12, 6+i*2, 0, Math.PI*2), ctx.fill();
  } else { // hills
    ctx.fillStyle='#9bb872';
    ctx.beginPath(); ctx.arc(x+100, baseY+30, 130, Math.PI, 2*Math.PI); ctx.fill();
  }
  ctx.restore();
}

function drawMid(o){
  const x = o.x - Game.scrollX*0.5;
  if (x < -300 || x > CFG.W+100) return;
  const baseY = CFG.GROUND_Y;
  ctx.save();
  if (o.type==='fachwerk'){
    // walls
    ctx.fillStyle='#fff7e0';
    ctx.fillRect(x, baseY-110, 90, 110);
    // beams
    ctx.fillStyle='#5a2e10';
    ctx.fillRect(x, baseY-110, 90, 6);
    ctx.fillRect(x, baseY-60, 90, 6);
    ctx.fillRect(x, baseY-6, 90, 6);
    ctx.fillRect(x, baseY-110, 6, 110);
    ctx.fillRect(x+84, baseY-110, 6, 110);
    // diagonals
    ctx.strokeStyle='#5a2e10'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(x+8, baseY-60); ctx.lineTo(x+82, baseY-10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+8, baseY-10); ctx.lineTo(x+82, baseY-60); ctx.stroke();
    // roof
    ctx.fillStyle='#8a3a25';
    ctx.beginPath(); ctx.moveTo(x-5, baseY-110); ctx.lineTo(x+45, baseY-150); ctx.lineTo(x+95, baseY-110); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.strokeRect(x, baseY-110, 90, 110); ctx.stroke();
    // window
    ctx.fillStyle='#88c0e0'; ctx.fillRect(x+30, baseY-90, 30, 20);
    ctx.strokeStyle='#000'; ctx.strokeRect(x+30, baseY-90, 30, 20);
  } else if (o.type==='kirche'){
    ctx.fillStyle='#e0ddd0';
    ctx.fillRect(x, baseY-150, 80, 150);
    // spire
    ctx.fillStyle='#c0392b';
    ctx.beginPath(); ctx.moveTo(x+30, baseY-150); ctx.lineTo(x+50, baseY-220); ctx.lineTo(x+50+8, baseY-150); ctx.closePath(); ctx.fill();
    // cross
    ctx.fillStyle='#000'; ctx.fillRect(x+38, baseY-228, 4, 12); ctx.fillRect(x+34, baseY-222, 12, 4);
    ctx.strokeStyle='#000'; ctx.strokeRect(x, baseY-150, 80, 150);
    // door
    ctx.fillStyle='#5a2e10'; ctx.fillRect(x+30, baseY-50, 20, 50);
  } else if (o.type==='tree'){
    ctx.fillStyle='#5a3210'; ctx.fillRect(x+18, baseY-60, 8, 60);
    ctx.fillStyle='#4f8a3c';
    ctx.beginPath(); ctx.arc(x+22, baseY-70, 30, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.stroke();
  } else if (o.type==='s11'){
    // green/yellow Albtalbahn
    ctx.fillStyle='#fce04a';
    ctx.fillRect(x, baseY-70, 220, 50);
    ctx.fillStyle='#0a7a2a';
    ctx.fillRect(x, baseY-30, 220, 12);
    // windows
    ctx.fillStyle='#88c0e0';
    for (let i=0;i<5;i++) ctx.fillRect(x+10+i*42, baseY-58, 30, 18);
    // wheels
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(x+30, baseY-12, 8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+190, baseY-12, 8, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='#000'; ctx.lineWidth=1.5; ctx.strokeRect(x, baseY-70, 220, 50);
    ctx.fillStyle='#000'; ctx.font='10px "Press Start 2P"'; ctx.fillText('S11', x+8, baseY-50);
  } else if (o.type==='edeka'){
    // Real Edeka livery: yellow band + blue text. The 'name' may be Edeka,
    // Penny, Aldi, Rewe, Lidl, dm, Müller, etc. — adjust the band colour
    // to fit obvious chains; otherwise default to Edeka yellow.
    const label = (o.name || 'Edeka').toUpperCase();
    let band = '#fbb71a', textCol = '#1862c5'; // Edeka default
    if (/PENNY/.test(label))       { band='#cc1316'; textCol='#fff'; }
    else if (/ALDI/.test(label))   { band='#1862c5'; textCol='#ffd633'; }
    else if (/REWE/.test(label))   { band='#cc0033'; textCol='#fff'; }
    else if (/LIDL/.test(label))   { band='#003189'; textCol='#ffe14a'; }
    else if (/^DM/.test(label) || /\bDM\b/.test(label)) { band='#fff'; textCol='#003366'; }
    else if (/MÜLLER|MUELLER/.test(label)) { band='#cc0000'; textCol='#fff'; }
    else if (/NORMA/.test(label))  { band='#cc0000'; textCol='#fff'; }
    else if (/ROSSMANN/.test(label)){ band='#c80024'; textCol='#fff'; }
    ctx.fillStyle='#fff'; ctx.fillRect(x, baseY-90, 150, 90);
    ctx.fillStyle = band; ctx.fillRect(x, baseY-90, 150, 24);
    ctx.fillStyle = textCol; ctx.font = `bold ${label.length > 10 ? 10 : 13}px "Press Start 2P"`; ctx.textAlign='center';
    ctx.fillText(label, x+75, baseY-72);
    ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.strokeRect(x, baseY-90, 150, 90);
    ctx.fillStyle='#88c0e0'; ctx.fillRect(x+10, baseY-60, 60, 40); ctx.fillRect(x+80, baseY-60, 60, 40);
  } else if (o.type==='gasthof'){
    // Gasthof Krone — half-timbered with wooden sign hanging
    ctx.fillStyle='#fff7e0'; ctx.fillRect(x, baseY-110, 110, 110);
    ctx.fillStyle='#5a2e10'; ctx.fillRect(x, baseY-110, 110, 6); ctx.fillRect(x, baseY-6, 110, 6);
    ctx.fillStyle='#a8542a'; // tile roof
    ctx.beginPath(); ctx.moveTo(x-6,baseY-110); ctx.lineTo(x+55,baseY-150); ctx.lineTo(x+116,baseY-110); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#000'; ctx.lineWidth=1.5; ctx.strokeRect(x, baseY-110, 110, 110);
    // hanging sign
    ctx.fillStyle='#3a2310'; ctx.fillRect(x+50, baseY-90, 4, 30);
    ctx.fillStyle='#fce04a'; ctx.fillRect(x+30, baseY-60, 50, 18);
    ctx.strokeRect(x+30, baseY-60, 50, 18);

function drawNear(o){
  const x = o.x - Game.scrollX*0.85;
  if (x < -200 || x > CFG.W+50) return;
  const baseY = CFG.GROUND_Y;
  ctx.save();
  if (o.type==='sign'){
    ctx.fillStyle='#fff'; ctx.fillRect(x, baseY-50, 100, 26);
    ctx.fillStyle='#222'; ctx.fillRect(x+47, baseY-24, 6, 24);
    ctx.strokeStyle='#000'; ctx.lineWidth=1.5; ctx.strokeRect(x, baseY-50, 100, 26);
    ctx.fillStyle='#000'; ctx.font='8px "Press Start 2P"'; ctx.textAlign='center'; ctx.fillText(o.text, x+50, baseY-32);
  } else if (o.type==='oma'){
    // oma with rollator
    ctx.fillStyle='#a85a8a'; ctx.fillRect(x, baseY-50, 18, 30);
    ctx.fillStyle='#e0c8a0'; ctx.fillRect(x+2, baseY-60, 14, 12);
    ctx.fillStyle='#fff'; ctx.fillRect(x+1, baseY-62, 16, 4); // hair
    ctx.strokeStyle='#000'; ctx.strokeRect(x, baseY-50, 18, 30);
    // rollator
    ctx.strokeStyle='#888'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x+18, baseY-30); ctx.lineTo(x+34, baseY-30); ctx.lineTo(x+34, baseY-2); ctx.moveTo(x+18, baseY-30); ctx.lineTo(x+18, baseY-2); ctx.stroke();
    ctx.beginPath(); ctx.arc(x+18, baseY-2, 4, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(x+34, baseY-2, 4, 0, Math.PI*2); ctx.stroke();
    if (Krass.isLegende() && Math.random()<0.02){
      // drops rollator
      o.drop = true;
    }
    if (Math.sin(o.animT*1.3) > 0.95 || Krass.isLegende()){
      drawBubble(x-5, baseY-90, 'So eine Schande!', 11);
    }
  } else if (o.type==='dog'){
    ctx.fillStyle='#aa8855'; ctx.fillRect(x, baseY-26, 30, 16);
    ctx.fillRect(x+22, baseY-34, 12, 12);
    ctx.fillStyle='#000'; ctx.fillRect(x+30, baseY-30, 2,2);
    // legs
    ctx.fillRect(x+2, baseY-10, 4, 10); ctx.fillRect(x+22, baseY-10, 4, 10);
    if (Math.sin(o.animT*2) > 0.7 && !Krass.isLegende()){
      drawBubble(x+10, baseY-60, 'WUFF!', 10);
    }
  } else if (o.type==='lederhose'){
    ctx.fillStyle='#5a2e10'; ctx.fillRect(x+2, baseY-50, 18, 24);
    ctx.fillStyle='#f4c896'; ctx.fillRect(x+4, baseY-60, 14, 12);
    ctx.fillStyle='#5a2e10'; ctx.fillRect(x+2, baseY-26, 8, 26); ctx.fillRect(x+12, baseY-26, 8, 26);
    // grill
    ctx.fillStyle='#222'; ctx.fillRect(x+25, baseY-20, 30, 18);
    ctx.fillStyle='#ff5500'; ctx.fillRect(x+27, baseY-22, 26, 4);
    ctx.strokeStyle='#000'; ctx.strokeRect(x+25, baseY-20, 30, 18);
    if (Math.random()<0.02) spawnParticle({x:x+40,y:baseY-30,vx:0,vy:-30,size:6,color:'rgba(150,150,150,0.7)',life:1.2,maxLife:1.2});
  } else if (o.type==='realschüler'){

    // peace sign hand
    ctx.strokeStyle='#000'; ctx.lineWidth=1.5;
    ctx.fillStyle='#f4c896';
    ctx.fillRect(x+14, baseY-44, 4, 6);

  } else if (o.type==='gartenzwerg'){

function drawBubble(x,y,text,size){
  size = size||10;
  ctx.font = `${size}px "Press Start 2P", monospace`;
  const w = ctx.measureText(text).width + 14;
  const h = size + 12;
  ctx.fillStyle='#fff';
  ctx.strokeStyle='#000'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(x, y); ctx.lineTo(x+w, y); ctx.lineTo(x+w, y+h); ctx.lineTo(x+12, y+h); ctx.lineTo(x+8, y+h+6); ctx.lineTo(x+8, y+h); ctx.lineTo(x, y+h); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.fillStyle='#000'; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillText(text, x+6, y+5);
}

// ===== OBSTACLES & PICKUPS =====
const Entities = []; // dynamic obstacles + pickups
const OBSTACLE_TYPES = ['misthaufen','igel','traktor','bierbank','strommast','s11car','gartenzwerg'];

function spawnObstacle(type, xRel){
  const x = Game.scrollX + CFG.W + (xRel||rand(60,200));
  let e = {x, y:0, w:0, h:0, type, hostile:true, alive:true, animT:0};
  if (type==='misthaufen'){
    e.w=70; e.h=44; e.y=CFG.GROUND_Y-44;
    e.fly = {a:Math.random()*Math.PI*2};
  } else if (type==='igel'){
    e.w=42; e.h=26; e.y=CFG.GROUND_Y-26;
  } else if (type==='traktor'){
    e.w=130; e.h=70; e.y=CFG.GROUND_Y-70;
  } else if (type==='bierbank'){
    e.w=100; e.h=34; e.y=CFG.GROUND_Y-34;
  } else if (type==='strommast'){
    e.w=80; e.h=10; e.y=CFG.GROUND_Y-150; // overhead cable -> must duck
    e.duck = true;
  } else if (type==='s11car'){
    e.w=180; e.h=80; e.y=CFG.GROUND_Y-80;
  } else if (type==='gartenzwerg'){
    e.w=24; e.h=22; e.y=CFG.GROUND_Y-22;
  }
  Entities.push(e);
}
function spawnPickup(type, xRel){
  const x = Game.scrollX + CFG.W + (xRel||rand(60,200));
  const y = CFG.GROUND_Y - rand(80, 200);
  const e = {x, y, w:30, h:30, type, pickup:true, alive:true, animT:0};
  if (type==='vape-pod') e.flavor = choice(['erdbeer','bubblegum','tabak','mystery']);
  Entities.push(e);
}

// Obstacle spawn director
const Director = {
  nextSpawn: 1.2,
  firstSpawnDone: false,
  update(dt){
    if (Game.inBoss || Game.inEncounter || Game.state!=='PLAY') return;
    this.nextSpawn -= dt;
    if (this.nextSpawn <= 0){
      // first obstacle is ALWAYS misthaufen with fly
      if (!this.firstSpawnDone){
        spawnObstacle('misthaufen', 200);
        this.firstSpawnDone = true;
        this.nextSpawn = rand(1.4, 2.0);
        return;
      }
      // pickup or obstacle
      const r = Math.random();
      if (r < 0.18) spawnPickup('vape-pod');
      else if (r < 0.24) spawnPickup('energy');
      else if (r < 0.34) spawnPickup('pfand');
      else {
        const t = choice(OBSTACLE_TYPES);
        spawnObstacle(t);
      }
      // density scales with time
      this.nextSpawn = rand(0.8, 1.6) - Math.min(0.5, Game.realT/600);
    }
  }
};

function updateEntities(dt){
  for (let i=Entities.length-1;i>=0;i--){
    const e = Entities[i];
    e.animT += dt;
    // off-screen left = remove
    if (e.x - Game.scrollX < -200) { Entities.splice(i,1); continue; }
    if (!e.alive) { Entities.splice(i,1); continue; }
    // collision with player
    const hb = Player.hb();
    const eb = {x:e.x - Game.scrollX, y:e.y, w:e.w, h:e.h};
    if (Player.alive && aabb(hb, eb)){
      if (e.pickup){
        e.alive = false;
        if (e.type==='vape-pod'){
          Vape.refill(50); Game.baseScore += 50;
          comicBurst(e.x - Game.scrollX, e.y, 'POD!');
          Audio.itemFound(); sparkle(e.x - Game.scrollX, e.y);
          if (navigator.vibrate) navigator.vibrate(20);
          Game.combo = Math.min(10, Game.combo+1); Game.comboTimer = 4;
          Vape.setFlavor(e.flavor);
          if (e.flavor==='mystery'){ HUD.note('Mystery Geschmack — Steuerung invertiert!', '#ff66ff'); }
          else if (e.flavor==='bubblegum') HUD.note('Bubblegum — leichter Sprung', '#88c0e0');
          else if (e.flavor==='tabak') HUD.note('Tabak Klassik — Bonus', '#aaa');
        } else if (e.type==='energy'){
          Game.baseScore += 100;
          Player.invuln = Math.max(Player.invuln, 2);
          comicBurst(e.x - Game.scrollX, e.y, 'PUSH!');
          Audio.pickup(); sparkle(e.x - Game.scrollX, e.y);
          Game.combo = Math.min(10, Game.combo+1); Game.comboTimer = 4;
        } else if (e.type==='pfand'){
          Game.baseScore += 25;
          Audio.pickup(); sparkle(e.x - Game.scrollX, e.y);
          Game.combo = Math.min(10, Game.combo+1); Game.comboTimer = 4;
        }
      } else {
        // obstacle hit
        if (e.type==='strommast' && Player.ducking) { /* OK, ducked under cable */ }
        else {
          // Only credit Aura / fire comic burst if the hit actually lands.
          // Player.hit() short-circuits during the 1-sec invuln window, but we
          // used to call Krass.add() unconditionally — that stacked +150 AURA
          // every frame of overlap for an entire second.
          const hitLanded = Player.invuln <= 0;
          Player.hit(20, e.type);
          if (hitLanded){
            if (e.type==='bierbank') Krass.add(150, 'BIERBANK ZERLEGT, BRUDI');
            if (e.type==='misthaufen' && Krass.tier()>=2) Krass.add(200, 'MIST GEYEETET');
            if (e.type==='gartenzwerg') Krass.add(100, 'GARTENZWERG GEYEETET, SHEESH');
            comicBurst(Player.x + 30, Player.y, choice(COMIC_SFX));
          }
        }
      }
    }
    // dodged cleanly: detect when entity passed player without hitting
    if (!e.dodged && !e.pickup && (e.x - Game.scrollX) + e.w < Player.x){
      e.dodged = true;
      Game.baseScore += 200;
      Game.combo = Math.min(10, Game.combo+1); Game.comboTimer = 3;
    }
  }
  // combo decay
  Game.comboTimer -= dt;
  if (Game.comboTimer <= 0) Game.combo = 1;
}

function drawEntities(){
  for (const e of Entities){
    const x = e.x - Game.scrollX;
    if (x < -100 || x > CFG.W + 50) continue;
    // Drop-shadow on the ground so obstacles pop off the playfield
    if (!e.pickup){
      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.beginPath();
      ctx.ellipse(x + e.w/2, CFG.GROUND_Y + 4, e.w*0.45, 5, 0, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.save();
    if (e.type==='misthaufen'){
      ctx.fillStyle='#5a3a14';
      ctx.beginPath(); ctx.ellipse(x+e.w/2, e.y+e.h-4, e.w/2, e.h*0.7, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#3a2310';
      ctx.beginPath(); ctx.ellipse(x+e.w/2, e.y+e.h-10, e.w/2.5, e.h*0.5, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle='#000'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.ellipse(x+e.w/2, e.y+e.h-4, e.w/2, e.h*0.7, 0, 0, Math.PI*2); ctx.stroke();
      // straw
      ctx.strokeStyle='#a86a20'; ctx.lineWidth=1.5;
      for (let i=0;i<5;i++){
        ctx.beginPath();
        ctx.moveTo(x+10+i*12, e.y+e.h-12);
        ctx.lineTo(x+10+i*12+rand(-3,3), e.y+e.h-22);
        ctx.stroke();
      }
      // fly
      const fa = e.fly.a + e.animT*4;
      const fx = x+e.w/2 + Math.cos(fa)*18, fy = e.y - 6 + Math.sin(fa*1.7)*6;
      ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(fx, fy, 1.5, 0, Math.PI*2); ctx.fill();
    } else if (e.type==='igel'){
      ctx.fillStyle='#7a5a30';
      ctx.beginPath(); ctx.ellipse(x+e.w/2, e.y+e.h-4, e.w/2, e.h*0.7, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle='#000'; ctx.lineWidth=1.5; ctx.stroke();
      // spikes
      ctx.strokeStyle='#000'; ctx.lineWidth=1;
      for (let i=0;i<10;i++){
        const a = -Math.PI + i*(Math.PI/10);
        const sx = x+e.w/2 + Math.cos(a)*e.w*0.4, sy = e.y+e.h-4 + Math.sin(a)*e.h*0.5;
        const ex = x+e.w/2 + Math.cos(a)*e.w*0.55, ey = e.y+e.h-4 + Math.sin(a)*e.h*0.7;
        ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(ex,ey); ctx.stroke();
      }
      // face
      ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(x+5, e.y+e.h-12, 2,0,Math.PI*2); ctx.fill();
    } else if (e.type==='traktor'){
      ctx.fillStyle='#1ea84a'; ctx.fillRect(x+10, e.y+10, 110, 40);
      ctx.fillStyle='#fce04a'; ctx.fillRect(x+30, e.y, 60, 14);
      ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(x+25, e.y+e.h-10, 14, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+105, e.y+e.h-10, 22, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle='#000'; ctx.lineWidth=1.5; ctx.strokeRect(x+10, e.y+10, 110, 40);
    } else if (e.type==='bierbank'){
      ctx.fillStyle='#fce04a'; ctx.fillRect(x, e.y, e.w, 8);
      ctx.fillStyle='#222'; ctx.fillRect(x+10, e.y+8, 6, 26); ctx.fillRect(x+e.w-16, e.y+8, 6, 26);
      ctx.strokeStyle='#000'; ctx.strokeRect(x, e.y, e.w, 8);
    } else if (e.type==='strommast'){
      // pole and cable overhead
      ctx.strokeStyle='#444'; ctx.lineWidth=4;
      ctx.beginPath(); ctx.moveTo(x, e.y); ctx.lineTo(x+e.w, e.y); ctx.stroke();
      ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.stroke();
      ctx.fillStyle='#000'; ctx.fillRect(x-4, e.y-4, 6, e.h+10);
      ctx.fillRect(x+e.w-2, e.y-4, 6, e.h+10);
    } else if (e.type==='s11car'){
      ctx.fillStyle='#fce04a'; ctx.fillRect(x, e.y, e.w, e.h*0.7);
      ctx.fillStyle='#0a7a2a'; ctx.fillRect(x, e.y+e.h*0.7, e.w, e.h*0.15);
      ctx.fillStyle='#88c0e0'; for (let i=0;i<4;i++) ctx.fillRect(x+10+i*40, e.y+8, 28, 18);
      ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(x+30, e.y+e.h-8, 10, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+e.w-30, e.y+e.h-8, 10, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle='#000'; ctx.lineWidth=1.5; ctx.strokeRect(x, e.y, e.w, e.h*0.7);
    } else if (e.type==='gartenzwerg'){
      ctx.fillStyle='#c93030';
      ctx.beginPath(); ctx.moveTo(x, e.y+e.h); ctx.lineTo(x+e.w/2, e.y); ctx.lineTo(x+e.w, e.y+e.h); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#f4c896'; ctx.fillRect(x+4, e.y+8, e.w-8, 8);
      ctx.fillStyle='#fff'; ctx.fillRect(x+4, e.y+14, e.w-8, 4);
      ctx.fillStyle='#1864c0'; ctx.fillRect(x+2, e.y+e.h-6, e.w-4, 6);
      ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.strokeRect(x+2, e.y+8, e.w-4, e.h-8);
    }
    // pickups
    else if (e.type==='vape-pod'){
      const bob = Math.sin(e.animT*4)*3;
      ctx.translate(x, e.y+bob);
      const flavorColor = e.flavor==='erdbeer'?'#ff6699':e.flavor==='bubblegum'?'#66ccff':e.flavor==='tabak'?'#888':`hsl(${(e.animT*150)%360},80%,60%)`;
      ctx.fillStyle = flavorColor;
      ctx.fillRect(0,0, 24, 30);
      ctx.fillStyle='#222'; ctx.fillRect(0,-6,24,8);
      ctx.strokeStyle='#000'; ctx.lineWidth=1.5; ctx.strokeRect(0,-6,24,36);
      ctx.fillStyle='#fff'; ctx.font='6px "Press Start 2P"'; ctx.fillText('POD', 2, 18);
      // halo
      ctx.strokeStyle = `rgba(255,200,80,${0.6+Math.sin(e.animT*8)*0.3})`;
      ctx.lineWidth=2; ctx.beginPath(); ctx.arc(12, 14, 22, 0, Math.PI*2); ctx.stroke();
    } else if (e.type==='energy'){
      const bob = Math.sin(e.animT*4)*3;
      ctx.translate(x, e.y+bob);
      ctx.fillStyle='#3030d0'; ctx.fillRect(0,0,28,40);
      ctx.fillStyle='#ffe14a'; ctx.fillRect(2,2,24,10);
      ctx.fillStyle='#ff3030'; ctx.font='bold 8px "Press Start 2P"'; ctx.fillText('!', 12, 28);
      ctx.strokeStyle='#000'; ctx.lineWidth=1.5; ctx.strokeRect(0,0,28,40);
    } else if (e.type==='pfand'){
      const bob = Math.sin(e.animT*4)*3;
      ctx.translate(x, e.y+bob);
      ctx.fillStyle='#88c8a8'; ctx.fillRect(4,4,20,30);
      ctx.fillStyle='#dd0000'; ctx.fillRect(6,6,16,4);
      ctx.fillStyle='#fff'; ctx.font='5px "Press Start 2P"'; ctx.fillText('PFAND', 5, 22);
      ctx.strokeStyle='#000'; ctx.strokeRect(4,4,20,30);
    }
    ctx.restore();
  }
}

// ===== BOSSES =====
const Boss = {
  active: null,
  start(idx){
    Game.inBoss = true;
    Game.state = 'BOSS';
    const cls = BOSS_CLASSES[idx];
    this.active = new cls(idx);
    this.active.init();
    HUD.note(`!! ${BOSS_NAMES[idx]} !!`, '#ff66ff');
    flash('#ff66ff', 0.3);
    shake(8);
    Audio.bossStart();
    Audio.setTrack('boss');
  },
  end(reward){
    if (!this.active) return;
    const idx = this.active.idx;
    Game.baseScore += reward;
    HUD.note(`+${reward} — ${BOSS_NAMES[idx]} besiegt!`, '#ffd633');
    Game.bossDoneCount++;
    Game.bossIdx = idx+1;
    this.active = null;
    Game.inBoss = false;
    Game.state = 'PLAY';
    Vape.refill(30);
    Audio.victory();
    // restore zone music after boss
    const zname = currentZone().name;
    if (ZONE_TRACK[zname]) Audio.setTrack(ZONE_TRACK[zname]);
  },
  update(dt){ if (this.active) this.active.update(dt); },
  draw(){ if (this.active) this.active.draw(); },
};

// Boss base
class BossBase {
  constructor(idx){ this.idx = idx; this.t = 0; this.phase = 0; this.done = false; }
  init(){}
  update(dt){
    this.t += dt;
    // Standard player update during boss (most bosses are overlay)
    Player.update(dt);
    Vape.update(dt);
    Krass.update(dt, false);
  }
  draw(){}
}

// ===== BOSS 1 — DAS ZEUGNIS =====
class B1_Zeugnis extends BossBase {
  init(){
    this.notesNeeded = 5; this.notesCollected = 0;
    this.projectiles = []; this.notes = [];
    this.spawnT = 0; this.noteT = 1.5;
    this.lines = ["Mathematik... eine Fünf.","Deutsch... eine Fünf.","Sport — Sport, Bin Run?! — eine Vier minus.","Religion... eine Sechs. Wie ist das überhaupt möglich?"];
    this.lineI = 0; this.lineT = 0; this.lineShowT = 0;
  }
  update(dt){
    super.update(dt);
    this.spawnT -= dt; this.noteT -= dt; this.lineT -= dt; this.lineShowT = Math.max(0, this.lineShowT - dt);
    if (this.spawnT <= 0){
      const grade = Math.random()<0.3?6:5;
      this.projectiles.push({x:rand(CFG.W*0.5, CFG.W*0.95), y:-30, vy:rand(120,260), vx:rand(-40, 30), grade, w:30, h:34});
      this.spawnT = rand(0.5, 1.0);
    }
    if (this.noteT <= 0 && this.notesCollected < this.notesNeeded){
      this.notes.push({x:CFG.W+50, y:CFG.GROUND_Y-rand(80,200), vx:-220, w:30, h:36, animT:0});
      this.noteT = rand(2, 3.4);
    }
    // dialogue
    if (this.lineT <= 0 && this.lineI < this.lines.length){
      this.lineShowT = 3.0;
      this.lineT = 4.0;
      this.lineI++;
    }
    // update projectiles
    const hb = Player.hb();
    for (let i=this.projectiles.length-1;i>=0;i--){
      const p = this.projectiles[i];
      p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 200*dt;
      if (p.y > CFG.GROUND_Y) { this.projectiles.splice(i,1); continue; }
      if (aabb(hb, {x:p.x, y:p.y, w:p.w, h:p.h})){
        if (Krass.isLegende()){
          // INVERSION: heal + krass
          Vape.refill(15);
          Krass.add(500, `GIGACHAD-INVERSION: ${p.grade}`);
          comicBurst(p.x, p.y, 'NICE!');
          Audio.pickup();
        } else {
          Player.hit(15, `Note ${p.grade}`);
        }
        this.projectiles.splice(i,1);
      }
    }
    // update notes
    for (let i=this.notes.length-1;i>=0;i--){
      const n = this.notes[i];
      n.x += n.vx*dt; n.animT += dt;
      if (n.x < -50) { this.notes.splice(i,1); continue; }
      if (aabb(hb, {x:n.x, y:n.y, w:n.w, h:n.h})){
        this.notes.splice(i,1);
        this.notesCollected++;
        Audio.pickup(); sparkle(n.x, n.y);
        comicBurst(n.x, n.y, 'JA!');
      }
    }
    // win
    if (this.notesCollected >= this.notesNeeded && !this.done){
      this.done = true;
      const reward = Math.floor(1500 * Krass.mul());
      Boss.end(reward);
    }
  }
  draw(){
    // floating Zeugnis on right side
    const zx = CFG.W*0.78, zy = 130 + Math.sin(this.t*1.5)*8;
    ctx.save();
    ctx.fillStyle='#fff8d8'; ctx.fillRect(zx-80, zy-60, 160, 120);
    ctx.strokeStyle='#000'; ctx.lineWidth=3; ctx.strokeRect(zx-80, zy-60, 160, 120);
    ctx.fillStyle='#000'; ctx.font='bold 12px "Press Start 2P"'; ctx.textAlign='center';
    ctx.fillText('SCHULZEUGNIS', zx, zy-40);
    ctx.font='10px "Press Start 2P"'; ctx.fillText('BIN RUN SHVAPE', zx, zy-20);
    ctx.fillText('Mathe: 5', zx, zy);
    ctx.fillText('Deutsch: 5', zx, zy+18);
    ctx.fillText('Sport: 4-', zx, zy+36);
    // projectiles
    for (const p of this.projectiles){
      ctx.fillStyle='#cc2233'; ctx.font='bold 36px Bangers, sans-serif'; ctx.textAlign='center';
      ctx.strokeStyle='#000'; ctx.lineWidth=3;
      ctx.strokeText(p.grade, p.x, p.y); ctx.fillText(p.grade, p.x, p.y);
    }
    // notes
    for (const n of this.notes){
      const y = n.y + Math.sin(n.animT*4)*4;
      ctx.fillStyle='#fff'; ctx.fillRect(n.x, y, n.w, n.h);
      ctx.strokeStyle='#000'; ctx.strokeRect(n.x, y, n.w, n.h);
      ctx.fillStyle='#000'; ctx.font='5px "Press Start 2P"'; ctx.textAlign='center';
      ctx.fillText('Mama', n.x+15, y+10);
      ctx.fillText('OK?', n.x+15, y+22);
    }
    // dialogue
    if (this.lineShowT > 0){
      const txt = this.lines[Math.min(this.lineI-1, this.lines.length-1)];
      drawBubble(CFG.W*0.3, 80, txt, 11);
    }
    // counter
    ctx.fillStyle='#fff'; ctx.font='12px "Press Start 2P"'; ctx.textAlign='left';
    ctx.strokeStyle='#000'; ctx.lineWidth=3;
    const s = `Entschuldigungen: ${this.notesCollected}/${this.notesNeeded}`;
    ctx.strokeText(s, 30, 100); ctx.fillText(s, 30, 100);
    ctx.restore();
  }
}

// ===== BOSS 2 — DIE CLIQUE =====
class B2_Clique extends BossBase {
  init(){
    this.qte = []; this.qteIdx = 0; this.successes = 0; this.target = 8; this.timer = 0;
    this.spawnQ();
    this.tiktokT = 0;
    this.startKrass = Krass.v;
    this.cringe = Krass.v < 50;
    if (this.cringe) {
      Vape.v = Math.max(0, Vape.v - 20);
      HUD.note('Chantal: "Lol Bin Run hart L, cringe"', '#ff66ff');
    } else if (Krass.isLegende()){
      Krass.add(1500, 'GIGACHAD-EINTRITT: Wahllah Bin Run goes HART');
    }
  }
  spawnQ(){
    const arrows = ['←','↑','→','↓'];
    this.qte = []; this.qteIdx=0;
    for (let i=0;i<4;i++) this.qte.push(choice(arrows));
    this.timer = 4.0;
  }
  update(dt){
    super.update(dt);
    this.timer -= dt; this.tiktokT += dt;
    // input
    let pressed=null;
    if (Input.pressed.left) pressed='←';
    else if (Input.pressed.right) pressed='→';
    else if (Input.pressed.jump) pressed='↑';
    else if (Input.pressed.down) pressed='↓';
    if (pressed){
      if (pressed === this.qte[this.qteIdx]){
        this.qteIdx++;
        Audio.pickup();
        if (this.qteIdx >= this.qte.length){
          this.successes++;
          comicBurst(Player.x + 30, Player.y - 40, 'TRICK!');
          vapeCloud(Player.x+30, Player.y-30, 'KRASS');
          Krass.add(80, 'TRICKSHOT, SHEESH');
          Game.baseScore += 250;
          this.spawnQ();
        }
      } else {
        Vape.v = Math.max(0, Vape.v - 5);
        HUD.note('L, BRUDI! VERHAUEN!', '#ff5050');
        this.qteIdx = 0;
      }
    }
    if (this.timer <= 0){ Vape.v = Math.max(0, Vape.v - 8); this.spawnQ(); }
    if (this.successes >= this.target && !this.done){
      this.done = true;
      let reward = 2000;
      if (Krass.isLegende()) reward *= 2;
      Boss.end(Math.floor(reward * Krass.mul()));
    }
  }
  draw(){
    // Edeka bench backdrop
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(0,0,CFG.W,CFG.H);
    // 3 friends on bench
    const bx = CFG.W*0.6, by = CFG.H*0.42;
    drawCliqueMember(bx, by, 'JUSTIN', '#a52', 'Bro.');
    drawCliqueMember(bx+90, by, 'MARVIN', '#26a', '📱');
    drawCliqueMember(bx+180, by, 'CHANTAL', '#d3a', this.successes>=this.target/2?'😂':'💀');
    // QTE
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(CFG.W*0.2, 100, CFG.W*0.6, 80);
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(CFG.W*0.2, 100, CFG.W*0.6, 80);
    ctx.font='40px Bangers, sans-serif'; ctx.textAlign='center';
    for (let i=0;i<this.qte.length;i++){
      ctx.fillStyle = i<this.qteIdx?'#ffd633':'#fff';
      ctx.fillText(this.qte[i], CFG.W*0.5 - (this.qte.length-1)*30 + i*60, 145);
    }
    ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"';
    ctx.fillText(`TRICKS: ${this.successes}/${this.target}`, CFG.W*0.5, 175);
    // Marvin POV occasionally
    if (this.tiktokT % 4 < 1.2) drawTikTokOverlay();
  }
}

// ===== BOSS 3 — HERR DREXLER =====
class B3_Drexler extends BossBase {
  init(){
    this.phase = 1; this.taps = 0; this.tapTarget = 12;
    this.tapWindow = 0; this.tapBeat = 0;
    this.bubbleT = 3; this.line = "Bin Run. In mein Büro. SOFORT.";
  }
  update(dt){
    super.update(dt);
    this.bubbleT -= dt;
    if (this.bubbleT < 0 && this.line === "Bin Run. In mein Büro. SOFORT."){
      this.line = "Ich habe auch mal geraucht, Bin Run. Es ist keine Lösung.";
      this.bubbleT = 4;
    }
    // Phase 1: rhythm tap
    if (this.phase === 1){
      this.tapBeat -= dt;
      if (this.tapBeat <= 0){ this.tapBeat = 0.6; this.tapWindow = 0.25; }
      this.tapWindow -= dt;
      if (Input.pressed.jump || Input.pressed.vape){
        if (this.tapWindow > 0){
          this.taps++;
          Audio.pickup(); sparkle(Player.x + 30, Player.y - 40);
          this.tapWindow = -1;
        } else {
          Vape.v = Math.max(0, Vape.v - 4);
          this.taps = Math.max(0, this.taps - 1);
        }
      }
      if (this.taps >= this.tapTarget && !this.done){
        this.done = true;
        Boss.end(Math.floor(2500 * Krass.mul()));
      }
    }
  }
  draw(){
    ctx.fillStyle='rgba(20,30,40,0.7)'; ctx.fillRect(0,0,CFG.W,CFG.H);
    // Drexler
    const dx = CFG.W*0.65, dy = CFG.H*0.4;
    ctx.fillStyle='#a08c5c'; ctx.fillRect(dx, dy, 80, 120);
    ctx.fillStyle='#f4c896'; ctx.fillRect(dx+18, dy-32, 44, 32);
    ctx.fillStyle='#999'; ctx.fillRect(dx+18, dy-32, 44, 8); // grey hair
    ctx.fillStyle='#000'; ctx.fillRect(dx+25, dy-18, 4,4); ctx.fillRect(dx+47, dy-18, 4,4);
    // beige sandals + white socks
    ctx.fillStyle='#fff'; ctx.fillRect(dx+10, dy+125, 24, 8); ctx.fillRect(dx+46, dy+125, 24, 8);
    ctx.fillStyle='#a08550'; ctx.fillRect(dx+8, dy+130, 28, 6); ctx.fillRect(dx+44, dy+130, 28, 6);
    ctx.strokeStyle='#000'; ctx.lineWidth=1.5; ctx.strokeRect(dx, dy, 80, 120);
    // thermos
    ctx.fillStyle='#222'; ctx.fillRect(dx-14, dy+20, 12, 30);
    // bubble
    if (this.bubbleT > 0) drawBubble(CFG.W*0.3, 80, this.line, 11);
    // tap meter
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(CFG.W*0.2, 150, CFG.W*0.6, 60);
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(CFG.W*0.2, 150, CFG.W*0.6, 60);
    ctx.fillStyle='#fff'; ctx.font='10px "Press Start 2P"'; ctx.textAlign='center';
    ctx.fillText('Unterschrift fälschen — Tap im Beat!', CFG.W*0.5, 170);
    const bw = (CFG.W*0.55)*(this.taps/this.tapTarget);

// ===== BOSS 4 — DIE POLIZEI =====
class B4_Polizei extends BossBase {
  init(){
    this.phase = 1; this.holdT = 0; this.holding=false; this.confiscated=false;
    this.line = "Junger Mann. Halt mal kurz an, ja?";
    this.lineT = 3;
  }
  update(dt){
    super.update(dt);
    this.lineT -= dt;
    // hold spacebar mini-game
    const heldNow = Input.keys.jump || Input.touchJump;
    if (heldNow && !this.holding){ this.holding = true; this.holdT = 0; }
    if (this.holding && heldNow) this.holdT += dt;
    if (this.holding && !heldNow){
      this.holding = false;
      const t = this.holdT;
      if (t < 3.7){ this.line = "Nochmal, bitte."; this.lineT = 2; this.holdT = 0; }
      else if (t > 4.3){ this.line = "Übertreib's nicht."; this.lineT = 2; this.holdT = 0; }
      else {
        // success
        this.done = true;
        if (Krass.isLegende()){
          Krass.add(500, "Ich kenne meine Rechte, Brudi!");
        }
        Krass.add(2000, 'POLIZEI GHOSTED');
        Game.flyerOnGround = true;
        Boss.end(Math.floor(3000 * Krass.mul()));
      }
    }
  }
  draw(){
    ctx.fillStyle='rgba(0,40,80,0.4)'; ctx.fillRect(0,0,CFG.W,CFG.H);

    ctx.beginPath(); ctx.arc(cx+200, cy+62, 12, 0, Math.PI*2); ctx.fill();

    ctx.fillStyle='#3050ff'; ctx.fillRect(cx+100, cy-12, 14, 8);
    ctx.fillStyle='#ff3030'; ctx.fillRect(cx+120, cy-12, 14, 8);
    ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.strokeRect(cx, cy, 240, 60);
    // Nowak
    ctx.fillStyle='#0a7a2a'; ctx.fillRect(cx+50, cy+8, 18, 22);
    ctx.fillStyle='#f4c896'; ctx.fillRect(cx+52, cy-2, 14, 10);
    // Bubble
    if (this.lineT > 0) drawBubble(CFG.W*0.18, 80, this.line, 11);
    // Hold meter
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(CFG.W*0.15, 150, CFG.W*0.7, 80);
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(CFG.W*0.15, 150, CFG.W*0.7, 80);

    ctx.fillText('"Kurz mal pusten." — Halten für GENAU 4.0 Sek', CFG.W*0.5, 172);

    const fill = clamp(t/5, 0, 1);

    ctx.fillStyle = '#444'; ctx.fillRect(CFG.W*0.18, 188, CFG.W*0.64, 16);
    ctx.fillStyle = '#9eff9e'; ctx.fillRect(CFG.W*0.18 + CFG.W*0.64*sweetMin, 188, CFG.W*0.64*(sweetMax-sweetMin), 16);
