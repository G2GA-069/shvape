<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- comic-yellow background, red border ring -->
  <rect width="64" height="64" rx="10" ry="10" fill="#ffd633"/>
  <rect x="2" y="2" width="60" height="60" rx="9" ry="9" fill="none" stroke="#000" stroke-width="3"/>
  <!-- starburst behind -->
  <polygon points="32,8 36,20 48,18 40,28 52,32 40,36 48,46 36,44 32,56 28,44 16,46 24,36 12,32 24,28 16,18 28,20"
           fill="#ffe96b" stroke="#000" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- exhale cloud with "AY" -->
  <ellipse cx="32" cy="22" rx="16" ry="9" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <ellipse cx="20" cy="20" rx="6" ry="4" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <ellipse cx="44" cy="20" rx="5" ry="3" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="32" y="26" font-family="Bangers, Impact, 'Arial Black', sans-serif" font-size="13"
        font-weight="900" text-anchor="middle" fill="#000">AY</text>
  <!-- vape pen body -->
  <rect x="14" y="40" width="30" height="11" rx="2" fill="#181818" stroke="#000" stroke-width="2"/>
  <!-- mouthpiece -->
  <rect x="44" y="42" width="6" height="7" rx="1" fill="#3a3a3a" stroke="#000" stroke-width="2"/>
  <!-- LED heart (pink) -->
  <path d="M 36 45.5 q -2 -3 -4 -1 q -2 -2 -4 1 q 0 3 4 5 q 4 -2 4 -5 z" fill="#ff66aa" stroke="#000" stroke-width="1"/>
  <!-- 3 stripes (Adidas reference) -->
  <line x1="16" y1="53" x2="20" y2="53" stroke="#fff" stroke-width="1.5"/>
  <line x1="22" y1="53" x2="26" y2="53" stroke="#fff" stroke-width="1.5"/>
  <line x1="28" y1="53" x2="32" y2="53" stroke="#fff" stroke-width="1.5"/>
</svg>
